<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">SerDes Note</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
:root {
  --bg:        #121212;
  --bg2:       #1a1a1a;
  --grid:      rgba(0,255,60,0.03);
  --phosphor:  #39e87a;
  --phosphor2: #1fa84e;
  --text:      #D1D5DB;
  --amber:     #f5a623;
  --dim:       #2a4a2a;
  --border:    rgba(57,232,122,0.18);
  --font-mono: 'Share Tech Mono', monospace;
  --font-ui:   'Rajdhani', sans-serif;
  --scan-size: 3px;
}

/* Light theme */
body.light {
  --bg:        #FFFFFF;
  --bg2:       #F9FAFB;
  --grid:      rgba(0,0,0,0.04);
  --text:      #111827;
  --dim:       #9CA3AF;
  --border:    #E5E7EB;
  --phosphor:  #059669;
  --phosphor2: #047857;
  --amber:     #D97706;
  --scan-size: 0px;
}

body.light .section.math .section-body,
body.light .section.units .section-body,
body.light .section.qa .section-body,
body.light .card-a,
body.light .qa-item-a,
body.light .modal-answer,
body.light .ai-feedback,
body.light .section.units .chart-infer { color: #374151; }

body.light .title,
body.light .section.mnemonic .section-body { text-shadow: none; }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* CRT scanlines */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent calc(var(--scan-size) - 1px),
    rgba(0,0,0,0.08) var(--scan-size)
  );
  pointer-events: none;
  z-index: 1000;
}

/* Grid background */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 920px;
  margin: 0 auto;
  padding: 2rem 1.5rem 6rem;
  position: relative;
  z-index: 1;
}

/* ── Header ── */
.header {
  border-bottom: 1px solid var(--border);
  padding-bottom: 1.2rem;
  margin-bottom: 2rem;
}

.header-top {
  display: flex;
  align-items: baseline;
  gap: 1.5rem;
  flex-wrap: wrap;
}

.tag {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--phosphor2);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.title {
  font-family: var(--font-ui);
  font-size: 2.4rem;
  font-weight: 700;
  color: var(--phosphor);
  letter-spacing: 0.05em;
  text-shadow: 0 0 20px rgba(57,232,122,0.4);
}

.date-line {
  margin-top: 0.4rem;
  font-size: 0.75rem;
  color: var(--phosphor2);
  display: flex;
  gap: 2rem;
}

/* ── Image viewer ── */
.image-wrap {
  position: relative;
  margin-bottom: 2.5rem;
  cursor: zoom-in;
  border: 1px solid var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.image-wrap::before {
  content: '[ RAW_SCAN ]';
  position: absolute;
  top: 0.5rem; left: 0.7rem;
  font-size: 0.65rem;
  color: var(--phosphor2);
  letter-spacing: 0.1em;
  z-index: 2;
}

.image-wrap::after {
  content: '⊕ ZOOM';
  position: absolute;
  bottom: 0.5rem; right: 0.7rem;
  font-size: 0.65rem;
  color: var(--amber);
  letter-spacing: 0.1em;
  z-index: 2;
}

.note-img {
  width: 100%;
  max-height: 420px;
  object-fit: cover;
  display: block;
  filter: brightness(0.92) contrast(1.1);
  transition: filter 0.2s;
}
.image-wrap:hover .note-img { filter: brightness(1) contrast(1.15); }

/* Lightbox */
.lightbox {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 2000;
  cursor: zoom-out;
  align-items: center;
  justify-content: center;
}
.lightbox.open { display: flex; }
.lightbox img {
  max-width: 95vw;
  max-height: 95vh;
  object-fit: contain;
  border: 1px solid var(--border);
}

/* ── Section ── */
.section {
  margin-bottom: 2rem;
  border: 1px solid var(--border);
  border-radius: 2px;
  overflow: hidden;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.4s, transform 0.4s;
}
.section.visible { opacity: 1; transform: none; }

.section-header {
  background: var(--bg2);
  padding: 0.55rem 1rem;
  display: flex;
  align-items: center;
  gap: 0.7rem;
  border-bottom: 1px solid var(--border);
}

.section-icon {
  font-size: 0.9rem;
  color: var(--amber);
}

.section-title {
  font-family: var(--font-ui);
  font-size: 0.85rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--amber);
}

.section-body {
  padding: 1.2rem 1.2rem;
  line-height: 1.8;
  font-size: 0.88rem;
}

/* intro special */
.section.intro .section-body {
  color: var(--phosphor);
  border-left: 3px solid var(--amber);
  font-size: 0.9rem;
}

/* math section */
.section.math .section-body { color: #b8e8c8; }

/* ── Unit analysis sub-section ── */
.section.units {
  margin-top: -1.2rem;
  margin-bottom: 2rem;
  border: 1px solid rgba(245,166,35,0.15);
  border-top: none;
  border-radius: 0 0 2px 2px;
  margin-left: 1.5rem;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.4s, transform 0.4s;
}
.section.units.visible { opacity: 1; transform: none; }
.section.units .section-header {
  background: rgba(245,166,35,0.05);
  border-bottom: 1px solid rgba(245,166,35,0.12);
}
.section.units .section-title {
  font-size: 0.72rem;
  color: var(--amber);
  opacity: 0.85;
}
.section.units .section-body {
  font-size: 0.82rem;
  color: #c8d8c8;
  line-height: 1.75;
}
.section.units .unit-block {
  background: rgba(0,0,0,0.2);
  border: 1px solid rgba(245,166,35,0.1);
  border-radius: 2px;
  padding: 0.6rem 0.9rem;
  margin: 0.5rem 0;
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: var(--amber);
  line-height: 1.7;
}
.section.units .chart-infer {
  background: rgba(57,232,122,0.04);
  border: 1px solid rgba(57,232,122,0.12);
  border-radius: 2px;
  padding: 0.6rem 0.9rem;
  margin: 0.5rem 0;
  font-size: 0.78rem;
  color: #8be8aa;
  line-height: 1.7;
}

/* ── Q&A append section ── */
.section.qa .section-body {
  color: #b8d8e8;
}
.qa-item {
  margin-bottom: 1.2rem;
  border-left: 2px solid var(--phosphor2);
  padding-left: 0.9rem;
}
.qa-item-q {
  font-weight: 600;
  color: var(--phosphor);
  margin-bottom: 0.3rem;
  font-size: 0.85rem;
}
.qa-item-a {
  font-size: 0.82rem;
  color: #8be8aa;
  line-height: 1.75;
}

.section-body ol {
  padding-left: 1.4rem;
}

.section-body ol li, .section-body ul li {
  margin-bottom: 0.5rem;
}

.section-body strong {
  color: var(--phosphor);
}

/* ── Quiz flashcards ── */
.quiz-list { display: flex; flex-direction: column; gap: 0.9rem; }

.card {
  border: 1px solid var(--dim);
  border-radius: 2px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.2s;
}
.card:hover { border-color: var(--phosphor2); }
.card.open  { border-color: var(--phosphor); }

.card-q {
  padding: 0.7rem 1rem;
  display: flex;
  gap: 0.8rem;
  align-items: flex-start;
  font-size: 0.85rem;
}

.card-num {
  color: var(--amber);
  min-width: 1.5rem;
  font-weight: bold;
}

.card-q-text { flex: 1; color: var(--phosphor); }

.card-toggle {
  color: var(--phosphor2);
  font-size: 0.7rem;
  min-width: 1.5rem;
  text-align: right;
  margin-top: 0.1rem;
  transition: transform 0.25s;
}
.card.open .card-toggle { transform: rotate(90deg); color: var(--phosphor); }

.card-a {
  display: none;
  padding: 0.7rem 1rem 0.9rem 3.3rem;
  font-size: 0.83rem;
  line-height: 1.75;
  color: #8be8aa;
  background: rgba(57,232,122,0.03);
  border-top: 1px solid var(--dim);
}
.card.open .card-a { display: block; }

/* ── Mnemonic ── */
.section.mnemonic .section-body {
  font-family: var(--font-ui);
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--amber);
  letter-spacing: 0.05em;
  text-align: center;
  padding: 1.5rem;
  text-shadow: 0 0 10px rgba(245,166,35,0.3);
}

/* ── Feynman FAB ── */
.fab {
  position: fixed;
  bottom: 2rem; right: 2rem;
  z-index: 500;
  background: var(--bg2);
  border: 1px solid var(--amber);
  color: var(--amber);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  padding: 0.7rem 1.1rem;
  cursor: pointer;
  border-radius: 2px;
  transition: background 0.2s, box-shadow 0.2s;
  box-shadow: 0 0 12px rgba(245,166,35,0.15);
}
.fab:hover {
  background: rgba(245,166,35,0.08);
  box-shadow: 0 0 20px rgba(245,166,35,0.3);
}

/* ── Feynman Modal ── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.88);
  z-index: 1500;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--bg2);
  border: 1px solid var(--amber);
  border-radius: 2px;
  padding: 2rem;
  max-width: 620px;
  width: 90%;
  position: relative;
}

.modal-label {
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  color: var(--amber);
  text-transform: uppercase;
  margin-bottom: 1rem;
}

.modal-question {
  font-family: var(--font-ui);
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--phosphor);
  line-height: 1.6;
  margin-bottom: 1.5rem;
}

.modal-input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--phosphor);
  font-family: var(--font-mono);
  font-size: 0.85rem;
  padding: 0.5rem 0;
  outline: none;
  margin-bottom: 1.2rem;
  caret-color: var(--phosphor);
}
.modal-input::placeholder { color: var(--dim); }

.modal-actions {
  display: flex;
  gap: 0.8rem;
  justify-content: flex-end;
}

.btn {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  padding: 0.5rem 1rem;
  border: 1px solid;
  border-radius: 2px;
  cursor: pointer;
  background: transparent;
  transition: background 0.2s;
}
.btn-reveal { border-color: var(--phosphor2); color: var(--phosphor2); }
.btn-reveal:hover { background: rgba(57,232,122,0.08); }
.btn-next   { border-color: var(--amber); color: var(--amber); }
.btn-next:hover { background: rgba(245,166,35,0.08); }
.btn-close  { border-color: var(--dim); color: var(--dim); }
.btn-close:hover { border-color: var(--phosphor2); color: var(--phosphor2); }

.modal-answer {
  display: none;
  font-size: 0.82rem;
  color: #8be8aa;
  line-height: 1.75;
  border-top: 1px solid var(--dim);
  margin-top: 0.5rem;
  padding-top: 0.8rem;
}
.modal-answer.show { display: block; }

/* scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

/* ── Theme / Settings buttons ── */
.theme-btn, .settings-btn {
  background: transparent;
  border: 1px solid var(--dim);
  color: var(--dim);
  font-family: var(--font-mono);
  font-size: 0.68rem;
  padding: 0.3rem 0.6rem;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s;
  letter-spacing: 0.08em;
}
.theme-btn { margin-left: auto; }
.theme-btn:hover, .settings-btn:hover { border-color: var(--phosphor2); color: var(--phosphor2); }
.settings-btn.active { border-color: var(--phosphor); color: var(--phosphor); }

/* ── Chat FAB ── */
.chat-fab {
  position: fixed;
  bottom: 2rem; right: 10.5rem;
  z-index: 500;
  background: var(--bg2);
  border: 1px solid var(--phosphor);
  color: var(--phosphor);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  padding: 0.7rem 1.1rem;
  cursor: pointer;
  border-radius: 2px;
  transition: background 0.2s, box-shadow 0.2s;
  box-shadow: 0 0 12px rgba(57,232,122,0.15);
}
.chat-fab:hover {
  background: rgba(57,232,122,0.08);
  box-shadow: 0 0 20px rgba(57,232,122,0.3);
}

/* ── Chat Panel ── */
.chat-panel {
  position: fixed;
  top: 0; right: -420px;
  width: 400px;
  height: 100vh;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  z-index: 800;
  display: flex;
  flex-direction: column;
  transition: right 0.3s ease;
}
.chat-panel.open { right: 0; }

.chat-panel-header {
  padding: 0.9rem 1rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.chat-panel-title {
  font-family: var(--font-ui);
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  color: var(--phosphor);
  text-transform: uppercase;
}
.chat-close-btn {
  background: transparent;
  border: none;
  color: var(--phosphor2);
  cursor: pointer;
  font-size: 0.85rem;
  font-family: var(--font-mono);
  padding: 0.2rem;
}
.chat-close-btn:hover { color: var(--phosphor); }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}
.chat-empty {
  color: var(--dim);
  font-size: 0.75rem;
  text-align: center;
  margin-top: 2rem;
  line-height: 1.8;
  letter-spacing: 0.05em;
}

.chat-msg {
  max-width: 88%;
  padding: 0.6rem 0.8rem;
  border-radius: 2px;
  font-size: 0.8rem;
  line-height: 1.65;
  word-break: break-word;
}
.chat-msg.user {
  align-self: flex-end;
  background: rgba(57,232,122,0.07);
  border: 1px solid var(--phosphor2);
  color: var(--phosphor);
}
.chat-msg.ai {
  align-self: flex-start;
  background: rgba(245,166,35,0.04);
  border: 1px solid rgba(245,166,35,0.25);
  color: #c8dac8;
  white-space: pre-wrap;
}

.chat-input-row {
  padding: 0.8rem 1rem;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 0.5rem;
  flex-shrink: 0;
}
.chat-input {
  flex: 1;
  background: transparent;
  border: 1px solid var(--dim);
  color: var(--phosphor);
  font-family: var(--font-mono);
  font-size: 0.78rem;
  padding: 0.45rem 0.7rem;
  outline: none;
  border-radius: 2px;
  caret-color: var(--phosphor);
}
.chat-input:focus { border-color: var(--phosphor2); }
.chat-input::placeholder { color: var(--dim); }
.chat-send-btn {
  background: transparent;
  border: 1px solid var(--phosphor2);
  color: var(--phosphor2);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  padding: 0.45rem 0.8rem;
  cursor: pointer;
  border-radius: 2px;
  transition: background 0.2s;
  white-space: nowrap;
}
.chat-send-btn:hover { background: rgba(57,232,122,0.08); }
.chat-send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* ── API Key Modal ── */
.apikey-modal {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.88);
  z-index: 2000;
  align-items: center;
  justify-content: center;
}
.apikey-modal.open { display: flex; }
.apikey-modal .modal { border-color: var(--phosphor); max-width: 480px; }
.apikey-input {
  width: 100%;
  background: transparent;
  border: 1px solid var(--dim);
  color: var(--phosphor);
  font-family: var(--font-mono);
  font-size: 0.78rem;
  padding: 0.5rem 0.7rem;
  outline: none;
  border-radius: 2px;
  margin-bottom: 0.6rem;
  caret-color: var(--phosphor);
}
.apikey-input:focus { border-color: var(--phosphor2); }
.apikey-hint {
  font-size: 0.68rem;
  color: var(--phosphor2);
  margin-bottom: 1.2rem;
  line-height: 1.6;
}
.apikey-status {
  font-size: 0.68rem;
  margin-bottom: 0.8rem;
  height: 1rem;
}
.apikey-status.ok  { color: var(--phosphor2); }
.apikey-status.err { color: #e87a7a; }

/* ── AI Score in Feynman ── */
.ai-feedback {
  display: none;
  margin-top: 0.8rem;
  padding: 0.7rem 0.9rem;
  border: 1px solid rgba(57,232,122,0.22);
  border-radius: 2px;
  font-size: 0.78rem;
  color: #b8e8c8;
  line-height: 1.72;
  background: rgba(57,232,122,0.03);
  white-space: pre-wrap;
  word-break: break-word;
}
.ai-feedback.show { display: block; }
.ai-feedback-label {
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  color: var(--phosphor2);
  margin-bottom: 0.5rem;
  text-transform: uppercase;
}

.btn-ai   { border-color: var(--phosphor); color: var(--phosphor); }
.btn-ai:hover { background: rgba(57,232,122,0.08); }
.btn-ai:disabled { opacity: 0.35; cursor: not-allowed; }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="header-top">
      <span class="tag">SERDES // IC DESIGN</span>
      <h1 class="title" id="note-title">—</h1>
      <button class="theme-btn" id="theme-btn">◐ THEME</button>
      <button class="settings-btn" id="settings-btn">⚙ API KEY</button>
    </div>
    <div class="date-line">
      <span id="note-date">—</span>
      <span id="note-src">—</span>
    </div>
  </div>

  <div id="img-wrap"></div>

  <div id="sections-container"></div>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <img id="lb-img" src="" alt="">
</div>

<!-- Chat FAB -->
<button class="chat-fab" id="chat-btn">[ AI 問答 ]</button>

<!-- Feynman FAB -->
<button class="fab" id="feynman-btn">[ 費曼測試 ]</button>

<!-- API Key Modal -->
<div class="apikey-modal" id="apikey-modal">
  <div class="modal">
    <div class="modal-label">⚙ ANTHROPIC API KEY 設定</div>
    <p class="apikey-hint">Key 僅存於本機 localStorage，不上傳任何伺服器。<br>取得金鑰：<strong style="color:var(--phosphor)">aistudio.google.com</strong> → Get API key（免費）</p>
    <input type="password" class="apikey-input" id="apikey-input" placeholder="AIza...">
    <div class="apikey-status" id="apikey-status"></div>
    <div class="modal-actions">
      <button class="btn btn-close" id="apikey-close">✕ 取消</button>
      <button class="btn btn-next" id="apikey-save">✓ 儲存</button>
    </div>
  </div>
</div>

<!-- Chat Panel -->
<div class="chat-panel" id="chat-panel">
  <div class="chat-panel-header">
    <span class="chat-panel-title">◈ AI CHAT — gemini-2.5-flash</span>
    <button class="chat-close-btn" id="chat-close">✕</button>
  </div>
  <div class="chat-messages" id="chat-messages">
    <div class="chat-empty">筆記內容已載入為系統上下文。<br>直接提問吧。</div>
  </div>

<script>

const NOTE_DATA = {"date":"2026-04-04","title":"TIA-L8-P1","sections":[{"content":"Feedback TIA (轉阻放大器) 頻率響應與二階系統分析","type":"intro"},{"title":"數學推導","content":"這份筆記詳盡分析了使用理想放大器模型（具備有限增益 $A_0$、主極點 $\\omega_0$ 與輸出阻抗 $R_{out}$）所建構的 Feedback TIA 的直流特性與高頻二階響應。\r\n\r\n**1. 直流/低頻特性推導：**\r\n*   **轉阻增益 ($R_T$)**：\r\n    依據節點電流定律 (KCL)。假設光電流 $I_{in}$ 流入輸入節點。因為運算放大器輸入阻抗無限大，電流全數流經 $R_F$。\r\n    在輸出節點進行 KCL，離開節點的電流總和等於進入的電流：\r\n    $$I_{in} = g_m V_{in} + \\frac{V_{out}}{R_{out}}$$\r\n    （這裡筆記等式 $I_{in} = \\frac{V_{in} - V_{out}}{R_F}$ 代表流入 $R_F$ 的電流，以此代換可解出增益）\r\n    將 $V_{in} = V_{out} + I_{in} R_F$ 代入上式：\r\n    $$I_{in} = g_m(V_{out} + I_{in} R_F) + \\frac{V_{out}}{R_{out}}$$\r\n    $$I_{in}(1 - g_m R_F) = V_{out}\\left(g_m + \\frac{1}{R_{out}}\\right)$$\r\n    $$R_T = \\frac{V_{out}}{I_{in}} = \\frac{R_{out}(1 - g_m R_F)}{1 + g_m R_{out}}$$\r\n    當放大器增益極大 ($g_m R_{out} \\gg 1$ 且 $g_m R_F \\gg 1$) 時，$R_T \\approx -R_F$。\r\n\r\n*   **輸入阻抗 ($R_{in}$)**：\r\n    於輸入端施加測試電流 $I_t$，產生電壓 $V_t$。此時 $I_t$ 穿過 $R_F$ 進入輸出節點。\r\n    輸出節點 KCL：$I_t = g_m V_t + \\frac{V_{out}}{R_{out}}$\r\n    又因為 $V_{out} = V_t - I_t R_F$，代入上式：\r\n    $$I_t = g_m V_t + \\frac{V_t - I_t R_F}{R_{out}}$$\r\n    整理後得到：\r\n    $$R_{in} = \\frac{V_t}{I_t} = \\frac{R_F + R_{out}}{1 + g_m R_{out}} \\approx \\frac{1}{g_m} \\quad \\text{(@ low f, 假設 } R_F, R_{out} \\text{ 比例關係)}$$\r\n\r\n*   **輸出阻抗 ($R_{out}\u0027$)**：\r\n    輸入端開路 ($I_{in}=0$)，於輸出端施加測試電壓 $V_t$。\r\n    因無電流流過 $R_F$，$V_{in} = V_{out} = V_t$。\r\n    測試電流 $I_t$ 分流至 $R_{out}$ 與相依電流源：\r\n    $$I_t = \\frac{V_t}{R_{out}} + g_m V_{in} = V_t \\left( \\frac{1}{R_{out}} + g_m \\right)$$\r\n    $$R_{out}\u0027 = \\frac{V_t}{I_t} = \\frac{1}{1/R_{out} + g_m} \\approx \\frac{1}{g_m}$$\r\n\r\n**2. 高頻二階響應推導：**\r\n*   **輸入極點**：$\\omega_i = \\frac{1}{C_{in} R_F}$。筆記特別註明這單獨存在時「沒物理意義」，因為閉迴路會讓極點互相耦合。\r\n*   **放大器轉移函數**：$A(s) = \\frac{A_0}{1 + s/\\omega_0}$，其中 $GBW = A_0 \\cdot \\omega_0$。\r\n*   **閉迴路轉移函數 $R_T(s)$**：\r\n    綜合 $C_{in}$ 效應與 $A(s)$，系統形成二階響應：\r\n    $$R_T(s) = \\frac{-R_F A_0 \\omega_0 \\omega_i}{s^2 + (\\omega_0 + \\omega_i)s + (A_0 + 1)\\omega_0\\omega_i} \\equiv \\frac{K_1}{s^2 + (\\frac{\\omega_n}{Q})s + \\omega_n^2}$$\r\n*   **重要參數萃取**：\r\n    對比係數，我們能求出自然頻率 $\\omega_n$ 與品質因子 $Q$：\r\n    $$\\omega_n^2 = (A_0 + 1)\\omega_0\\omega_i \\approx A_0\\omega_0\\omega_i = GBW \\cdot \\omega_i \\Rightarrow \\omega_n = \\sqrt{GBW \\cdot \\omega_i}$$\r\n    $$\\frac{\\omega_n}{Q} = \\omega_0 + \\omega_i \\Rightarrow Q = \\frac{\\omega_n}{\\omega_0 + \\omega_i} \\approx \\frac{\\sqrt{GBW \\cdot \\omega_i}}{\\omega_i} \\quad \\text{(@ } \\omega_0 \\ll \\omega_i \\text{)}$$\r\n    $$Q \\approx \\sqrt{\\frac{GBW}{\\omega_i}}$$\r\n\r\n*   **Peaking 分析**：\r\n    當 $Q \u003e 1/\\sqrt{2}$ 時，二階系統會在頻域出現共振峰 (Peaking)。\r\n    共振峰值為：$\\text{Peak Value} = \\frac{R_F Q}{\\sqrt{1 - 1/(4Q^2)}}$\r\n    共振頻率：$\\omega_{max} = \\omega_n \\sqrt{1 - \\frac{1}{2Q^2}}$","type":"math"},{"title":"單位解析","content":"**公式單位消去：**\r\n*   **$GBW$**：$A_0 \\cdot \\omega_0 \\rightarrow [V/V] \\times [\\text{rad}/s] = [\\text{rad}/s]$ (或以 Hz 表示，除以 $2\\pi$)\r\n*   **$\\omega_n$**：$\\sqrt{GBW \\cdot \\omega_i} \\rightarrow \\sqrt{[\\text{rad}/s] \\times [\\text{rad}/s]} = [\\text{rad}/s]$\r\n*   **$Q$**：$\\sqrt{\\frac{GBW}{\\omega_i}} \\rightarrow \\sqrt{\\frac{[\\text{rad}/s]}{[\\text{rad}/s]}} = [\\text{無單位}]$ (Dimensionless，品質因子)\r\n\r\n**圖表單位推斷：**\r\n*   **圖 1：Op-amp Bode Plot (中段)**\r\n    *   X 軸：頻率 (Frequency) [rad/s] 或 [Hz] (對數刻度)，典型範圍 $10^3 \\sim 10^{10}$ rad/s。\r\n    *   Y 軸：增益大小 $|A|$ [dB]，典型範圍 0 ~ 80 dB。\r\n*   **圖 2：s-plane Pole Locations (右上)**\r\n    *   X 軸：實部 $\\sigma$ [rad/s]。\r\n    *   Y 軸：虛部 $j\\omega$ [rad/s]。\r\n    *   標示：共軛複數極點，落在左半平面，顯示系統二階特性。\r\n*   **圖 3：TIA 頻率響應與 Peaking (下段)**\r\n    *   X 軸：頻率 $\\omega$ [rad/s] (對數刻度)。\r\n    *   Y 軸：轉阻增益大小 $|R_T|$ [dB$\\Omega$] 或 [$\\Omega$]，典型範圍 $1\\text{k}\\Omega \\sim 100\\text{k}\\Omega$。\r\n    *   標示：$\\omega_{max}$ (peak frequency) 和 $\\omega_n$ (natural frequency)。","type":"units"},{"title":"白話物理意義","content":"將放大器加上回授電阻做成 TIA 後，原本各自獨立的「輸入端 RC 極點」與「放大器內部極點」會互相耦合形成一個二階系統；當放大器頻寬 ($GBW$) 過大而輸入電容 ($C_{in}$) 很大時，反而會造成閉迴路增益產生劇烈的高頻突波 (Peaking)。","type":"plain"},{"title":"生活化比喻","content":"想像你開著一台大馬力跑車 (Op-amp) 拖著一台裝滿貨物的笨重尾車 ($C_{in}$ 代表負載)。連接跑車與尾車的拖車桿是彈簧做的 ($R_F$)。如果你開得太快、方向盤打得太猛 (GBW 過高，系統反應太快)，尾車的巨大慣性會讓彈簧來回拉扯，導致整輛車失控般左右搖晃 (Peaking/Ringing)。要避免搖晃，你只能開慢一點 (降低 GBW) 或者換一個更粗的彈簧/減輕尾車重量 (提高 $\\omega_i$)。","type":"analogy"},{"title":"面試必考點","items":[{"question":"在設計 TIA 時，為什麼光電二極體寄生電容 ($C_{in}$) 會造成頻率響應的 Peaking？","answer":"** $C_{in}$ 與回授電阻 $R_F$ 會產生一個極點 $\\omega_i$。在閉迴路中，這個極點會與 Op-amp 內部的主極點 $\\omega_0$ 耦合形成二階系統。由於品質因子 $Q \\approx \\sqrt{GBW/\\omega_i}$，當 $C_{in}$ 很大導致 $\\omega_i$ 變小時，$Q$ 值會變大（超過 $1/\\sqrt{2}$），進而在頻域響應產生突波 (Peaking)，並在時域產生震盪 (Ringing)。"},{"question":"為了減少 TIA 的 Peaking，工程師通常會調整哪兩個參數？代價是什麼？","answer":"** (1) 降低放大器的 GBW，代價是系統整體頻寬 $\\omega_n$ 變小，影響資料傳輸率；(2) 提高 $\\omega_i$（例如減小 $R_F$ 或使用更小面積的二極體以減小 $C_{in}$），代價是減小轉阻增益（若動 $R_F$）或 SNR 變差。這呼應了筆記中 \"Bandwidth extends in a cost of Peaking\" 的核心 trade-off。"},{"question":"在推導中，為何 TIA 的輸入阻抗 $R_{in}$ 在低頻時會大幅下降至近似 $1/g_m$？這對電路有何幫助？","answer":"** 這是因為採用了 shunt-shunt 負回授架構。回授機制會將原本的阻抗 ($R_F$) 減小 $1+A$ 倍。極低的輸入阻抗不僅能將光電流更有效地吸入 TIA 中，還能將由 $C_{in}$ 造成的輸入端極點往高頻推，有助於擴展整體系統頻寬。"}],"type":"quiz"},{"content":"\"大C生小ω，小ω養大Q，大Q必起秋 (Peaking)！\" (大 $C_{in}$ 造成小 $\\omega_i$，小 $\\omega_i$ 養出大 $Q$，大 $Q$ 必然導致 Peaking！)","type":"mnemonic"}],"imageUrl":"../images/done/TIA-L8-P1.jpg"};

function renderUnits(text) {
  // Split into unit-block (公式消去) and chart-infer (圖表推斷) sub-blocks
  let html = mdToHtml(text);
  // Wrap lines starting with 📈 in chart-infer div
  html = html.replace(/<p>(📈[\s\S]*?)<\/p>/g, '<div class="chart-infer">$1</div>');
  // Wrap lines containing [X] × [Y] style unit derivations in unit-block div
  html = html.replace(/<p>([^<]*\[[\w\/]+\][^<]*=[^<]*)<\/p>/g, '<div class="unit-block">$1</div>');
  return html;
}

function renderQA(items) {
  if (!items || !items.length) return '<p style="color:var(--dim)">尚無延伸問題</p>';
  return items.map((q, i) => `
    <div class="qa-item">
      <div class="qa-item-q">Q${i+1}：${escHtml(q.question)}</div>
      <div class="qa-item-a">${mdToHtml(q.answer)}</div>
    </div>`).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function mdToHtml(text) {
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Numbered list items
  text = text.replace(/^(\d+)\.\s+(.+)$/gm, '<li data-ol>$2</li>');
  // Bullet list items
  text = text.replace(/^\*\s+(.+)$/gm, '<li data-ul>$1</li>');
  // Wrap ol items
  text = text.replace(/(<li data-ol>[^\n]*\n?)+/g, m => '<ol>' + m.replace(/ data-ol/g,'') + '</ol>');
  // Wrap ul items
  text = text.replace(/(<li data-ul>[^\n]*\n?)+/g, m => '<ul>' + m.replace(/ data-ul/g,'') + '</ul>');
  // Horizontal rule
  text = text.replace(/^---$/gm, '<hr style="border-color:var(--dim);margin:0.8rem 0">');
  // Paragraphs (split by double newline)
  text = text.split(/\n{2,}/).map(p => {
    p = p.trim();
    if (!p || p.startsWith('<ol>') || p.startsWith('<ul>') || p.startsWith('<hr')) return p;
    return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
  }).join('\n');
  return text;
}

function buildSystemPrompt() {

  sys += `以下是筆記的完整內容：\n`;
  NOTE_DATA.sections.forEach(sec => {
    if (sec.type === 'quiz') {
      sys += `\n## 面試必考點\n`;
      sec.items.forEach((q, i) => {
        sys += `Q${i+1}: ${q.question}\nA: ${q.answer}\n`;
      });
    } else if (sec.content) {
      const t = sec.title || ({ intro:'概覽', math:'數學推導', plain:'白話物理意義', analogy:'生活化比喻', mnemonic:'記憶口訣' })[sec.type] || sec.type;

// Gemini 用 "model" 而非 "assistant"
function toGeminiHistory(messages) {
  return messages.map(m => ({
    role: m.role === 'assistant' ? 'model' : m.role,
    parts: [{ text: m.content }]
  }));
}

async function streamClaude(messages, onChunk, onDone, onError) {
  const apiKey = getApiKey();
  if (!apiKey) {
    document.getElementById('apikey-modal').classList.add('open');

    if (onError) onError('請先設定 Gemini API Key');
    return;
  }

  let resp;
  try {
    resp = await fetch(GEMINI_API + '?alt=sse&key=' + encodeURIComponent(apiKey), {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: buildSystemPrompt() }] },
        contents: toGeminiHistory(messages),
        generationConfig: { maxOutputTokens: 1024 }
      })
    });
  } catch (e) {
    if (onError) onError('網路錯誤：' + e.message);
    onDone();
    return;
  }

  if (!resp.ok) {
    let errMsg = resp.statusText;
    try { const j = await resp.json(); errMsg = j.error?.message || errMsg; } catch {}
    if (onError) onError('[' + resp.status + '] ' + errMsg);
    onDone();
    return;
  }

  const reader = resp.body.getReader();
  const dec = new TextDecoder();
  let buf = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const d = line.slice(6).trim();
      if (!d || d === '[DONE]') continue;
      try {
        const evt = JSON.parse(d);
        const text = evt.candidates?.[0]?.content?.parts?.[0]?.text;
        if (text) onChunk(text);
      } catch {}
    }
  }
  onDone();
}

const apikeyStatus  = document.getElementById('apikey-status');
const apikeyClose   = document.getElementById('apikey-close');

});

// ── Chat Panel ──
const chatBtn      = document.getElementById('chat-btn');
const chatPanel    = document.getElementById('chat-panel');
const chatClose    = document.getElementById('chat-close');
const chatMessages = document.getElementById('chat-messages');
const chatInput    = document.getElementById('chat-input');
const chatSend     = document.getElementById('chat-send');

let chatHistory = [];
let chatStreaming = false;

chatBtn.addEventListener('click', () => chatPanel.classList.toggle('open'));
chatClose.addEventListener('click', () => chatPanel.classList.remove('open'));

function appendChatMsg(role, text) {
  const empty = chatMessages.querySelector('.chat-empty');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.className = 'chat-msg ' + role;
  div.textContent = text;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  return div;
}

async function sendChat() {
  const q = chatInput.value.trim();
  if (!q || chatStreaming) return;
  chatInput.value = '';
  chatStreaming = true;
  chatSend.disabled = true;

  chatHistory.push({ role: 'user', content: q });
  appendChatMsg('user', q);

  const aiDiv = appendChatMsg('ai', '');
  let buf = '';

  await streamClaude(
    chatHistory,
    (chunk) => {
      buf += chunk;
      aiDiv.textContent = buf;
      chatMessages.scrollTop = chatMessages.scrollHeight;
    },
    () => {
      chatHistory.push({ role: 'assistant', content: buf });
      chatStreaming = false;
      chatSend.disabled = false;
      chatInput.focus();
    },
    (err) => {
      aiDiv.textContent = '⚠ ' + err;
      chatStreaming = false;
      chatSend.disabled = false;
    }
  );
}

chatSend.addEventListener('click', sendChat);
chatInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); } });

// ── AI Score in Feynman ──
const fmAiScore    = document.getElementById('fm-ai-score');
const aiFeedback   = document.getElementById('ai-feedback');
const aiFeedbackTx = document.getElementById('ai-feedback-text');
let aiScoring = false;

fmAiScore.addEventListener('click', async () => {
  const q = document.getElementById('fm-question').textContent;
  const userAns = document.getElementById('fm-input').value.trim();
  const correctAns = document.getElementById('fm-answer').textContent ||
    (NOTE_DATA.sections.find(s => s.type === 'quiz')?.items[window._fmIdx || 0]?.answer || '');

  if (!userAns) {
    aiFeedbackTx.textContent = '請先輸入你的答案。';
    aiFeedback.classList.add('show');
    return;
  }
  if (aiScoring) return;
  aiScoring = true;
  fmAiScore.disabled = true;

  aiFeedbackTx.textContent = '評分中...';
  aiFeedback.classList.add('show');
  let buf = '';

  const evalMessages = [{
    role: 'user',
    content: `問題：${q}\n\n學生的回答：${userAns}\n\n參考答案：${correctAns}\n\n請評分（1-10分）並給出具體改進建議，說明哪裡答對了、哪裡還不夠精確。請用繁體中文，簡潔有力。`
  }];

  await streamClaude(
    evalMessages,
    (chunk) => {
      buf += chunk;
      aiFeedbackTx.textContent = buf;
    },
    () => {
      aiScoring = false;
      fmAiScore.disabled = false;
    },
    (err) => {
      aiFeedbackTx.textContent = '⚠ ' + err;
      aiScoring = false;
      fmAiScore.disabled = false;
    }
  );
});

// reset AI feedback when question changes
const origShowFeynman = window._showFeynmanOrig;
document.getElementById('fm-next').addEventListener('click', () => {
  aiFeedback.classList.remove('show');
  aiFeedbackTx.textContent = '';
  fmAiScore.disabled = false;
  aiScoring = false;
}, true);
document.getElementById('fm-close').addEventListener('click', () => {
  aiFeedback.classList.remove('show');
  aiScoring = false;
  fmAiScore.disabled = false;
}, true);
</script>
