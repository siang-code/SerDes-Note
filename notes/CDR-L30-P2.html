<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">SerDes Note</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
:root {
  --bg:        #121212;
  --bg2:       #1a1a1a;
  --grid:      rgba(0,255,60,0.03);
  --phosphor:  #39e87a;
  --phosphor2: #1fa84e;
  --text:      #D1D5DB;
  --amber:     #f5a623;
  --dim:       #2a4a2a;
  --border:    rgba(57,232,122,0.18);
  --font-mono: 'Share Tech Mono', monospace;
  --font-ui:   'Rajdhani', sans-serif;
  --scan-size: 3px;
}

/* Light theme */
body.light {
  --bg:        #FFFFFF;
  --bg2:       #F9FAFB;
  --grid:      rgba(0,0,0,0.04);
  --text:      #111827;
  --dim:       #9CA3AF;
  --border:    #E5E7EB;
  --phosphor:  #059669;
  --phosphor2: #047857;
  --amber:     #D97706;
  --scan-size: 0px;
}

body.light .section.math .section-body,
body.light .section.units .section-body,
body.light .section.qa .section-body,
body.light .card-a,
body.light .qa-item-a,
body.light .modal-answer,
body.light .ai-feedback,
body.light .section.units .chart-infer { color: #374151; }

body.light .title,
body.light .section.mnemonic .section-body { text-shadow: none; }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* CRT scanlines */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent calc(var(--scan-size) - 1px),
    rgba(0,0,0,0.08) var(--scan-size)
  );
  pointer-events: none;
  z-index: 1000;
}

/* Grid background */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 920px;
  margin: 0 auto;
  padding: 2rem 1.5rem 6rem;
  position: relative;
  z-index: 1;
}

/* ── Header ── */
.header {
  border-bottom: 1px solid var(--border);
  padding-bottom: 1.2rem;
  margin-bottom: 2rem;
}

.header-top {
  display: flex;
  align-items: baseline;
  gap: 1.5rem;
  flex-wrap: wrap;
}

.tag {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--phosphor2);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.title {
  font-family: var(--font-ui);
  font-size: 2.4rem;
  font-weight: 700;
  color: var(--phosphor);
  letter-spacing: 0.05em;
  text-shadow: 0 0 20px rgba(57,232,122,0.4);
}

.date-line {
  margin-top: 0.4rem;
  font-size: 0.75rem;
  color: var(--phosphor2);
  display: flex;
  gap: 2rem;
}

/* ── Image viewer ── */
.image-wrap {
  position: relative;
  margin-bottom: 2.5rem;
  cursor: zoom-in;
  border: 1px solid var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.image-wrap::before {
  content: '[ RAW_SCAN ]';
  position: absolute;
  top: 0.5rem; left: 0.7rem;
  font-size: 0.65rem;
  color: var(--phosphor2);
  letter-spacing: 0.1em;
  z-index: 2;
}

.image-wrap::after {
  content: '⊕ ZOOM';
  position: absolute;
  bottom: 0.5rem; right: 0.7rem;
  font-size: 0.65rem;
  color: var(--amber);
  letter-spacing: 0.1em;
  z-index: 2;
}

.note-img {
  width: 100%;
  max-height: 420px;
  object-fit: cover;
  display: block;
  filter: brightness(0.92) contrast(1.1);
  transition: filter 0.2s;
}
.image-wrap:hover .note-img { filter: brightness(1) contrast(1.15); }

/* Lightbox */
.lightbox {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 2000;
  cursor: zoom-out;
  align-items: center;
  justify-content: center;
}
.lightbox.open { display: flex; }
.lightbox img {
  max-width: 95vw;
  max-height: 95vh;
  object-fit: contain;
  border: 1px solid var(--border);
}

/* ── Section ── */
.section {
  margin-bottom: 2rem;
  border: 1px solid var(--border);
  border-radius: 2px;
  overflow: hidden;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.4s, transform 0.4s;
}
.section.visible { opacity: 1; transform: none; }

.section-header {
  background: var(--bg2);
  padding: 0.55rem 1rem;
  display: flex;
  align-items: center;
  gap: 0.7rem;
  border-bottom: 1px solid var(--border);
}

.section-icon {
  font-size: 0.9rem;
  color: var(--amber);
}

.section-title {
  font-family: var(--font-ui);
  font-size: 0.85rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--amber);
}

.section-body {
  padding: 1.2rem 1.2rem;
  line-height: 1.8;
  font-size: 0.88rem;
}

/* intro special */
.section.intro .section-body {
  color: var(--phosphor);
  border-left: 3px solid var(--amber);
  font-size: 0.9rem;
}

/* math section */
.section.math .section-body { color: #b8e8c8; }

/* ── Unit analysis sub-section ── */
.section.units {
  margin-top: -1.2rem;
  margin-bottom: 2rem;
  border: 1px solid rgba(245,166,35,0.15);
  border-top: none;
  border-radius: 0 0 2px 2px;
  margin-left: 1.5rem;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.4s, transform 0.4s;
}
.section.units.visible { opacity: 1; transform: none; }
.section.units .section-header {
  background: rgba(245,166,35,0.05);
  border-bottom: 1px solid rgba(245,166,35,0.12);
}
.section.units .section-title {
  font-size: 0.72rem;
  color: var(--amber);
  opacity: 0.85;
}
.section.units .section-body {
  font-size: 0.82rem;
  color: #c8d8c8;
  line-height: 1.75;
}
.section.units .unit-block {
  background: rgba(0,0,0,0.2);
  border: 1px solid rgba(245,166,35,0.1);
  border-radius: 2px;
  padding: 0.6rem 0.9rem;
  margin: 0.5rem 0;
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: var(--amber);
  line-height: 1.7;
}
.section.units .chart-infer {
  background: rgba(57,232,122,0.04);
  border: 1px solid rgba(57,232,122,0.12);
  border-radius: 2px;
  padding: 0.6rem 0.9rem;
  margin: 0.5rem 0;
  font-size: 0.78rem;
  color: #8be8aa;
  line-height: 1.7;
}

/* ── Q&A append section ── */
.section.qa .section-body {
  color: #b8d8e8;
}
.qa-item {
  margin-bottom: 1.2rem;
  border-left: 2px solid var(--phosphor2);
  padding-left: 0.9rem;
}
.qa-item-q {
  font-weight: 600;
  color: var(--phosphor);
  margin-bottom: 0.3rem;
  font-size: 0.85rem;
}
.qa-item-a {
  font-size: 0.82rem;
  color: #8be8aa;
  line-height: 1.75;
}

.section-body ol {
  padding-left: 1.4rem;
}

.section-body ol li, .section-body ul li {
  margin-bottom: 0.5rem;
}

.section-body strong {
  color: var(--phosphor);
}

/* ── Quiz flashcards ── */
.quiz-list { display: flex; flex-direction: column; gap: 0.9rem; }

.card {
  border: 1px solid var(--dim);
  border-radius: 2px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.2s;
}
.card:hover { border-color: var(--phosphor2); }
.card.open  { border-color: var(--phosphor); }

.card-q {
  padding: 0.7rem 1rem;
  display: flex;
  gap: 0.8rem;
  align-items: flex-start;
  font-size: 0.85rem;
}

.card-num {
  color: var(--amber);
  min-width: 1.5rem;
  font-weight: bold;
}

.card-q-text { flex: 1; color: var(--phosphor); }

.card-toggle {
  color: var(--phosphor2);
  font-size: 0.7rem;
  min-width: 1.5rem;
  text-align: right;
  margin-top: 0.1rem;
  transition: transform 0.25s;
}
.card.open .card-toggle { transform: rotate(90deg); color: var(--phosphor); }

.card-a {
  display: none;
  padding: 0.7rem 1rem 0.9rem 3.3rem;
  font-size: 0.83rem;
  line-height: 1.75;
  color: #8be8aa;
  background: rgba(57,232,122,0.03);
  border-top: 1px solid var(--dim);
}
.card.open .card-a { display: block; }

/* ── Mnemonic ── */
.section.mnemonic .section-body {
  font-family: var(--font-ui);
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--amber);
  letter-spacing: 0.05em;
  text-align: center;
  padding: 1.5rem;
  text-shadow: 0 0 10px rgba(245,166,35,0.3);
}

/* ── Feynman FAB ── */
.fab {
  position: fixed;
  bottom: 2rem; right: 2rem;
  z-index: 500;
  background: var(--bg2);
  border: 1px solid var(--amber);
  color: var(--amber);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  padding: 0.7rem 1.1rem;
  cursor: pointer;
  border-radius: 2px;
  transition: background 0.2s, box-shadow 0.2s;
  box-shadow: 0 0 12px rgba(245,166,35,0.15);
}
.fab:hover {
  background: rgba(245,166,35,0.08);
  box-shadow: 0 0 20px rgba(245,166,35,0.3);
}

/* ── Feynman Modal ── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.88);
  z-index: 1500;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--bg2);
  border: 1px solid var(--amber);
  border-radius: 2px;
  padding: 2rem;
  max-width: 620px;
  width: 90%;
  position: relative;
}

.modal-label {
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  color: var(--amber);
  text-transform: uppercase;
  margin-bottom: 1rem;
}

.modal-question {
  font-family: var(--font-ui);
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--phosphor);
  line-height: 1.6;
  margin-bottom: 1.5rem;
}

.modal-input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--phosphor);
  font-family: var(--font-mono);
  font-size: 0.85rem;
  padding: 0.5rem 0;
  outline: none;
  margin-bottom: 1.2rem;
  caret-color: var(--phosphor);
}
.modal-input::placeholder { color: var(--dim); }

.modal-actions {
  display: flex;
  gap: 0.8rem;
  justify-content: flex-end;
}

.btn {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  padding: 0.5rem 1rem;
  border: 1px solid;
  border-radius: 2px;
  cursor: pointer;
  background: transparent;
  transition: background 0.2s;
}
.btn-reveal { border-color: var(--phosphor2); color: var(--phosphor2); }
.btn-reveal:hover { background: rgba(57,232,122,0.08); }
.btn-next   { border-color: var(--amber); color: var(--amber); }
.btn-next:hover { background: rgba(245,166,35,0.08); }
.btn-close  { border-color: var(--dim); color: var(--dim); }
.btn-close:hover { border-color: var(--phosphor2); color: var(--phosphor2); }

.modal-answer {
  display: none;
  font-size: 0.82rem;
  color: #8be8aa;
  line-height: 1.75;
  border-top: 1px solid var(--dim);
  margin-top: 0.5rem;
  padding-top: 0.8rem;
}
.modal-answer.show { display: block; }

/* scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

/* ── Theme / Settings buttons ── */
.theme-btn, .settings-btn {
  background: transparent;
  border: 1px solid var(--dim);
  color: var(--dim);
  font-family: var(--font-mono);
  font-size: 0.68rem;
  padding: 0.3rem 0.6rem;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s;
  letter-spacing: 0.08em;
}
.theme-btn { margin-left: auto; }
.theme-btn:hover, .settings-btn:hover { border-color: var(--phosphor2); color: var(--phosphor2); }
.settings-btn.active { border-color: var(--phosphor); color: var(--phosphor); }

/* ── Chat FAB ── */
.chat-fab {
  position: fixed;
  bottom: 2rem; right: 10.5rem;
  z-index: 500;
  background: var(--bg2);
  border: 1px solid var(--phosphor);
  color: var(--phosphor);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  padding: 0.7rem 1.1rem;
  cursor: pointer;
  border-radius: 2px;
  transition: background 0.2s, box-shadow 0.2s;
  box-shadow: 0 0 12px rgba(57,232,122,0.15);
}
.chat-fab:hover {
  background: rgba(57,232,122,0.08);
  box-shadow: 0 0 20px rgba(57,232,122,0.3);
}

/* ── Chat Panel ── */
.chat-panel {
  position: fixed;
  top: 0; right: -420px;
  width: 400px;
  height: 100vh;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  z-index: 800;
  display: flex;
  flex-direction: column;
  transition: right 0.3s ease;
}
.chat-panel.open { right: 0; }

.chat-panel-header {
  padding: 0.9rem 1rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.chat-panel-title {
  font-family: var(--font-ui);
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  color: var(--phosphor);
  text-transform: uppercase;
}
.chat-close-btn {
  background: transparent;
  border: none;
  color: var(--phosphor2);
  cursor: pointer;
  font-size: 0.85rem;
  font-family: var(--font-mono);
  padding: 0.2rem;
}
.chat-close-btn:hover { color: var(--phosphor); }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}
.chat-empty {
  color: var(--dim);
  font-size: 0.75rem;
  text-align: center;
  margin-top: 2rem;
  line-height: 1.8;
  letter-spacing: 0.05em;
}

.chat-msg {
  max-width: 88%;
  padding: 0.6rem 0.8rem;
  border-radius: 2px;
  font-size: 0.8rem;
  line-height: 1.65;
  word-break: break-word;
}
.chat-msg.user {
  align-self: flex-end;
  background: rgba(57,232,122,0.07);
  border: 1px solid var(--phosphor2);
  color: var(--phosphor);
}
.chat-msg.ai {
  align-self: flex-start;
  background: rgba(245,166,35,0.04);
  border: 1px solid rgba(245,166,35,0.25);
  color: #c8dac8;
  white-space: pre-wrap;
}

.chat-input-row {
  padding: 0.8rem 1rem;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 0.5rem;
  flex-shrink: 0;
}
.chat-input {
  flex: 1;
  background: transparent;
  border: 1px solid var(--dim);
  color: var(--phosphor);
  font-family: var(--font-mono);
  font-size: 0.78rem;
  padding: 0.45rem 0.7rem;
  outline: none;
  border-radius: 2px;
  caret-color: var(--phosphor);
}
.chat-input:focus { border-color: var(--phosphor2); }
.chat-input::placeholder { color: var(--dim); }
.chat-send-btn {
  background: transparent;
  border: 1px solid var(--phosphor2);
  color: var(--phosphor2);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  padding: 0.45rem 0.8rem;
  cursor: pointer;
  border-radius: 2px;
  transition: background 0.2s;
  white-space: nowrap;
}
.chat-send-btn:hover { background: rgba(57,232,122,0.08); }
.chat-send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* ── API Key Modal ── */
.apikey-modal {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.88);
  z-index: 2000;
  align-items: center;
  justify-content: center;
}
.apikey-modal.open { display: flex; }
.apikey-modal .modal { border-color: var(--phosphor); max-width: 480px; }
.apikey-input {
  width: 100%;
  background: transparent;
  border: 1px solid var(--dim);
  color: var(--phosphor);
  font-family: var(--font-mono);
  font-size: 0.78rem;
  padding: 0.5rem 0.7rem;
  outline: none;
  border-radius: 2px;
  margin-bottom: 0.6rem;
  caret-color: var(--phosphor);
}
.apikey-input:focus { border-color: var(--phosphor2); }
.apikey-hint {
  font-size: 0.68rem;
  color: var(--phosphor2);
  margin-bottom: 1.2rem;
  line-height: 1.6;
}
.apikey-status {
  font-size: 0.68rem;
  margin-bottom: 0.8rem;
  height: 1rem;
}
.apikey-status.ok  { color: var(--phosphor2); }
.apikey-status.err { color: #e87a7a; }

/* ── AI Score in Feynman ── */
.ai-feedback {
  display: none;
  margin-top: 0.8rem;
  padding: 0.7rem 0.9rem;
  border: 1px solid rgba(57,232,122,0.22);
  border-radius: 2px;
  font-size: 0.78rem;
  color: #b8e8c8;
  line-height: 1.72;
  background: rgba(57,232,122,0.03);
  white-space: pre-wrap;
  word-break: break-word;
}
.ai-feedback.show { display: block; }
.ai-feedback-label {
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  color: var(--phosphor2);
  margin-bottom: 0.5rem;
  text-transform: uppercase;
}

.btn-ai   { border-color: var(--phosphor); color: var(--phosphor); }
.btn-ai:hover { background: rgba(57,232,122,0.08); }
.btn-ai:disabled { opacity: 0.35; cursor: not-allowed; }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="header-top">
      <span class="tag">SERDES // IC DESIGN</span>
      <h1 class="title" id="note-title">—</h1>
      <button class="theme-btn" id="theme-btn">◐ THEME</button>
      <button class="settings-btn" id="settings-btn">⚙ API KEY</button>
    </div>
    <div class="date-line">
      <span id="note-date">—</span>
      <span id="note-src">—</span>
    </div>
  </div>

  <div id="img-wrap"></div>

  <div id="sections-container"></div>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <img id="lb-img" src="" alt="">
</div>

<!-- Chat FAB -->
<button class="chat-fab" id="chat-btn">[ AI 問答 ]</button>

<!-- Feynman FAB -->
<button class="fab" id="feynman-btn">[ 費曼測試 ]</button>

<!-- API Key Modal -->
<div class="apikey-modal" id="apikey-modal">
  <div class="modal">
    <div class="modal-label">⚙ ANTHROPIC API KEY 設定</div>
    <p class="apikey-hint">Key 僅存於本機 localStorage，不上傳任何伺服器。<br>取得金鑰：<strong style="color:var(--phosphor)">aistudio.google.com</strong> → Get API key（免費）</p>
    <input type="password" class="apikey-input" id="apikey-input" placeholder="AIza...">
    <div class="apikey-status" id="apikey-status"></div>
    <div class="modal-actions">
      <button class="btn btn-close" id="apikey-close">✕ 取消</button>
      <button class="btn btn-next" id="apikey-save">✓ 儲存</button>
    </div>
  </div>
</div>

<!-- Chat Panel -->
<div class="chat-panel" id="chat-panel">
  <div class="chat-panel-header">
    <span class="chat-panel-title">◈ AI CHAT — gemini-2.5-flash</span>
    <button class="chat-close-btn" id="chat-close">✕</button>
  </div>
  <div class="chat-messages" id="chat-messages">

const NOTE_DATA = {"date":"2026-04-05","title":"CDR-L30-P2","sections":[{"content":"[PLL-Based BB CDR] Jitter Generation (J_G) 於線性區之行為分析","type":"intro"},{"title":"數學推導","content":"本頁筆記主要探討當 PLL-based Bang-Bang CDR (BB-CDR) 接收到極度乾淨的訊號時，系統產生的固有抖動 (Jitter Generation, $J_G$) 該如何分析。\r\n\r\n1. **線性化假設 (Linear Approximation)**：\r\n   對於一個極度乾淨的輸入 (extremely clear input)，系統追蹤的相位誤差極小。\r\n   假設 BB-PD 的線性區間為 $\\phi_m = \\pm 0.03 \\text{ UI}$，而系統的 RMS 抖動 $J_{rms} = 0.01 \\text{ UI}$。\r\n   根據常態分佈，$\\pm 3\\sigma$ (即 $\\pm 0.03 \\text{ UI}$) 包含了 99.9% 的機率分佈。這意味著高達 99.9% 的取樣相位誤差都落在 BB-PD 的線性區間內 (Linear region)。因此，原本非線性的 BB-CDR 可以被近似為一個純線性 PLL 來分析。\r\n\r\n2. **轉移函數與主導雜訊 (Transfer Function \u0026 Dominant Noise)**：\r\n   在線性區操作下，來自 PD 與 CP 的雜訊相對微小可忽略 (Negligible)。\r\n   因此，大部分的抖動雜訊來自 VCO 本身 (Most noise comes from VCO)。\r\n   VCO 雜訊到輸出端的轉移函數為一個高通濾波器 (High-Pass Filter, HPF)：\r\n   $$ \\frac{\\phi_{out}}{\\phi_{vco}} \\cong \\frac{s}{s + 2\\xi\\omega_n} $$\r\n   *(註：此處為單極點高通之簡化模型，強調在頻寬附近的衰減特性)*\r\n\r\n3. **迴路參數推導 (Loop Parameters)**：\r\n   在線性區，等效 PD 增益為 $\\frac{I_p}{\\phi_m}$。代入標準二階 PLL 公式：\r\n   - 自然頻率：$\\omega_n = \\sqrt{\\frac{I_p K_{vco}}{\\phi_m C_p}}$\r\n   - 阻尼因數：$\\xi = \\frac{R_p}{2}\\sqrt{\\frac{I_p C_p K_{vco}}{\\phi_m}}$\r\n   - 迴路頻寬：由於通常設計為過阻尼 ($\\xi \\ge 1$)，頻寬可近似為 $\\omega_{BW} = 2\\xi\\omega_n$。\r\n   $$ \\omega_{BW,BB} = 2\\pi f_{BW,BB} = 2 \\left( \\frac{R_p}{2}\\sqrt{\\frac{I_p C_p K_{vco}}{\\phi_m}} \\right) \\left( \\sqrt{\\frac{I_p K_{vco}}{\\phi_m C_p}} \\right) = \\frac{I_p R_p K_{vco}}{\\phi_m} $$\r\n   *(註：若使用 JTRAN 模擬分析 slew 效應，頻寬模型會引入係數變為 $\\frac{2 I_p R_p K_{vco}}{\\pi \\phi_m}$)*\r\n\r\n4. **Jitter Generation 計算公式**：\r\n   將 VCO 的 $1/f^2$ 相位雜訊頻譜對此 HPF 進行積分，可得出 RMS 抖動的工程近似公式：\r\n   $$ J_{rms,BB} \\cong \\frac{f_0}{2} \\sqrt{\\frac{S_{\\phi,vco}(f_0)}{\\pi f_{BW,BB}}} \\text{ (UI)} $$\r\n   *(其中 $f_0$ 為評估相位雜訊的參考偏移頻率)*","type":"math"},{"title":"單位解析","content":"**公式單位消去：**\r\n- **迴路頻寬 $\\omega_{BW,BB}$**：\r\n  $$ \\frac{I_p \\times R_p \\times K_{vco}}{\\phi_m} \\Rightarrow \\frac{\\text{[A]} \\times \\text{[V/A]} \\times \\text{[rad/(s} \\cdot \\text{V)]}}{\\text{[rad]}} = \\frac{\\text{[V]} \\times \\text{[rad/(s} \\cdot \\text{V)]}}{\\text{[rad]}} = \\frac{\\text{[rad/s]}}{\\text{[rad]}} = \\text{[1/s]} = \\text{[rad/s]} $$\r\n  （嚴格來說，$\\omega$ 為角頻率，單位為 rad/s，物理量綱為 $1/s$，單位消去完美吻合）\r\n\r\n這是一個非常經典、無數類比與射頻工程師（包含我菜鳥時期）都踩過的坑！你的推導在物理跟數學上**完全正確**，但它在工程直覺上隱藏著一個致命的「$2\\pi$ 陷阱」。\r\n\r\n**直接回答問題**\r\n單位本身**沒有錯**。問題出在：**Radian（弧度）在物理學上是「無因次量」（Dimensionless, $[\\text{rad}] = 1$）**。\r\n\r\n因為弧度的定義是「弧長除以半徑」（$\\frac{\\text{m}}{\\text{m}}$），所以它是一個純比例。在單位推導時，分子跟分母的 $[\\text{rad}]$ 互消，得到 $[1/\\text{s}]$ 是非常合理的。**真正的問題在於：這算出來的 $[1/\\text{s}]$，到底是指 $\\omega_{BW}$ (角頻率) 還是 $f_{BW}$ (一般頻率)？**\r\n\r\n---\r\n\r\n**物理意義與電路設計考量拆解**\r\n\r\n讓我們用設計 BB-CDR (Bang-Bang CDR) 迴路頻寬的視角，把這個單位的來龍去脈拆解清楚：\r\n\r\n**1. 為什麼 $[\\text{rad}]$ 會不見？**\r\n這條公式本質上是在算開迴路增益 $L(s) = K_{PD} \\cdot R_p \\cdot \\frac{K_{vco}}{s}$ 等於 1 的地方。\r\n* **$K_{PD, eq}$ (等效相位偵測器增益)：** $\\frac{I_p}{\\phi_m}$。意思是「每單位相位誤差 $[\\text{rad}]$，Charge Pump 會打出多少電流 $[\\text{A}]$」。單位是 $[\\text{A/rad}]$。\r\n* **$K_{vco}$ (壓控振盪器增益)：** 意思是「每單位控制電壓 $[\\text{V}]$，能改變多少角頻率 $[\\text{rad/s}]$」。單位是 $[\\text{rad/(s}\\cdot\\text{V)}]$。\r\n* **相乘的結果：** 當這兩者與濾波器電阻 $R_p$ 乘在一起，PD 分母的 $[\\text{rad}]$ 與 VCO 分子的 $[\\text{rad}]$ **互相抵銷了**。\r\n    * $[\\text{A/rad}] \\times [\\text{V/A}] \\times [\\text{rad/(s}\\cdot\\text{V)}] = [1/\\text{s}]$\r\n\r\n**2. 工程上的「死亡陷阱」**\r\n算出 $[1/\\text{s}]$ 後，很多工程師會直覺認為：「單位是 $1/\\text{s}$，那就是 $\\text{Hz}$，所以算出來的數字是 $f_{BW}$。」**大錯特錯！**\r\n\r\n在控制系統中，積分器 $\\frac{1}{s}$ 的 $s$ 是複變頻率 ($s = j\\omega$)，它的隱含單位是角頻率 $[\\text{rad/s}]$。當我們解 $|L(j\\omega_{BW})| = 1$ 時：\r\n$$\\omega_{BW} = \\frac{I_p \\cdot R_p \\cdot K_{vco}}{\\phi_m}$$\r\n\r\n因為等式左邊是 $\\omega_{BW}$，算出來的這個數字本質上是**角頻率**。為了避免搞混，資深工程師在算出這個數值後，會**「手動把 $[\\text{rad}]$ 貼回去」**，寫成 $[\\text{rad/s}]$。\r\n\r\n**3. 實務設計的 Rule of Thumb**\r\n在做 SerDes 系統架構評估 (System Architecture) 時，客戶或標準（如 PCIe, USB）開出來的 Jitter Tolerance 頻寬規格，一律都是給 **$f_{BW}$ (單位 $\\text{Hz}$)**。\r\n\r\n如果你用上述公式算出了 $\\omega_{BW}$ 卻忘了除以 $2\\pi$，你會以為你的頻寬已經夠大了，但實際上你設計出來的 CDR 頻寬比預期**窄了整整 6.28 倍**！這會導致你的 CDR 根本追不上 Data 的 Jitter，眼圖直接閉合，晶片回來量測時就會動不起來。\r\n\r\n**總結這筆記的單位糾結：**\r\n你寫的 $[1/\\text{s}] = [\\text{rad/s}]$ 在物理因次上是絕對成立的。只要在心裡默念三遍：**「公式拆解出來的 $[1/\\text{s}]$ 是 $\\omega$ 不是 $f$，要對應系統規格必須再除以 $2\\pi$」**，你就徹底跨過這個設計陷阱了。\r\n\r\n這頁筆記非常精彩！它完美展示了如何將非線性的 Bang-Bang CDR (BB-CDR) 在特定條件下，簡化成可以用線性系統分析的模型。\r\n\r\n既然你正在建構用來模擬 PLL/CDR 行為的 Web App，這段推導與單位的邏輯絕對是你底層程式碼的核心，變數一寫錯，模擬出來的抖動與眼圖就會完全失真。我們直接來拆解這張圖的推導邏輯，並解答你對單位的疑惑。\r\n\r\n---\r\n\r\n**第一部分：神之公式的推導教學**\r\n\r\n筆記中 $\\omega_{BW} = \\frac{I_p \\cdot R_p \\cdot K_{vco}}{\\phi_m}$ 是怎麼來的？\r\n\r\n**核心假設：Bang-Bang PD 的「線性化」**\r\n看圖片左邊的 $I_{av}$ 與 $\\Delta\\phi$ 關係圖。BB-CDR 的 Phase Detector 正常來說是「非線性」的（超過 $\\phi_m$ 電流就飽和在 $I_p$）。\r\n但筆記上寫了一個關鍵條件：`for extremely clear input, the loop operates at linear region`。\r\n因為我們現在算的是 **Jitter Generation (JG)**，假設輸入端完全沒有雜訊 ($\\phi_{in}=0$)，系統抖動很小（例如 $J_{rms} = 0.01\\text{ UI}$），所以超過 99.9% 的相位誤差都會落在中間那個斜坡上。\r\n因此，我們可以將 BBPD 視為一個**線性等效增益**：\r\n$$K_{PD} = \\text{斜率} = \\frac{I_p}{\\phi_m} \\quad \\text{[A/rad]}$$\r\n\r\n**代入二階 PLL 標準公式**\r\n將等效的 $K_{PD}$ 代入經典的 Charge-Pump PLL 二階參數公式中：\r\n* **自然頻率 (Natural Frequency)：** $\\omega_n = \\sqrt{\\frac{K_{PD} K_{vco}}{C_p}} = \\sqrt{\\frac{I_p K_{vco}}{\\phi_m C_p}}$\r\n* **阻尼係數 (Damping Factor)：** $\\zeta = \\frac{R_p}{2} \\sqrt{K_{PD} K_{vco} C_p} = \\frac{R_p}{2} \\sqrt{\\frac{I_p C_p K_{vco}}{\\phi_m}}$\r\n\r\n**頻寬近似推導**\r\n在設計這類 CDR 時，為了確保穩定度，通常會設計成**過阻尼 (Over-damped, $\\zeta \\gg 1$)**。在 $\\zeta$ 很大的情況下，系統的閉迴路頻寬 $\\omega_{BW}$ 會由零點 (Zero) 主導，其近似值為 $2\\zeta\\omega_n$。\r\n現在把上面的 $\\zeta$ 和 $\\omega_n$ 乘起來：\r\n$$\\omega_{BW} \\approx 2\\zeta\\omega_n = 2 \\cdot \\left( \\frac{R_p}{2} \\sqrt{\\frac{I_p C_p K_{vco}}{\\phi_m}} \\right) \\cdot \\left( \\sqrt{\\frac{I_p K_{vco}}{\\phi_m C_p}} \\right)$$\r\n把括號拆開，根號內的 $C_p$ 互相消掉：\r\n$$\\omega_{BW} \\approx R_p \\cdot \\frac{I_p K_{vco}}{\\phi_m} = \\mathbf{\\frac{I_p \\cdot R_p \\cdot K_{vco}}{\\phi_m}}$$\r\n推導完成！\r\n\r\n---\r\n\r\n**第二部分：單位到底哪裡有問題？**\r\n\r\n直接回答你：**你的單位消去過程，在「數學上」完全正確，沒有任何問題！**\r\n$[A] \\times [V/A] \\times [\\text{rad/(s}\\cdot\\text{V)}] / [\\text{rad}] = [1/\\text{s}]$。\r\n\r\n**那為什麼我之前說這是個「陷阱」？**\r\n問題出在物理因次 (Dimension) 的解讀。在國際單位制 (SI) 中，**「弧度 (rad)」和「週期 (cycle)」都是無因次量 (Dimensionless)**。這代表它們在方程式消去後，都會變成隱形的 `1`。\r\n\r\n這就導致了工程上最容易出錯的盲點：\r\n* 角頻率 $\\omega$ 的單位是 $[\\text{rad/s}]$，消掉 rad 後，因次是 $\\mathbf{[1/\\text{s}]}$。\r\n* 頻率 $f$ 的單位是 $\\text{Hz}$ 或 $[\\text{cycles/s}]$，消掉 cycle 後，因次也是 $\\mathbf{[1/\\text{s}]}$。\r\n\r\n這兩者的數學因次一模一樣，但在物理世界上差了 $2\\pi$ 倍。\r\n\r\n**實務上的風險：**\r\n當你在程式碼裡寫下 `let bandwidth = (Ip * Rp * Kvco) / phi_m;`，系統算出來一個數值（例如 $6.28 \\times 10^7$）。\r\n因為你做過單位消去，心裡想著「單位是 $1/\\text{s}$，那就是 $\\text{Hz}$ 囉」，然後就把它當成 $62.8\\text{ MHz}$ 的頻寬去跟系統規格 (Specification) 比對。\r\n但實際上，因為公式源頭的 $K_{vco}$ 帶有 $[\\text{rad}]$，這個算出來的數值其實是 $\\omega_{BW}$ (角頻率)。真正的頻寬 $f_{BW}$ 只有 $10\\text{ MHz}$！\r\n\r\n**總結：**\r\n你的消去法完全正確。但身為 IC 設計工程師，我們習慣在心裡強制把那個被消掉的 $[\\text{rad}]$ 給「補回來」，寫成 $[\\text{rad/s}]$。這不是為了滿足數學，而是為了保護自己不在驗證規格時，被那該死的 $2\\pi$ 給衝康。盲點其實出在**「物理因次（Dimension）與工程單位（Unit）的混淆」**。\r\n\r\n在國際單位制 (SI) 的底層邏輯裡，數學是不管「形狀」的。不論是「每秒轉多少**圈 (cycles)**」還是「每秒轉多少**弧度 (radians)**」，因為「圈」和「弧度」都是純粹的比例（無因次量），在數學消去後，它們統統都會變成 `[1/s]`。\r\n\r\n你的盲點在於：**看到消去後剩下 `[1/s]`，大腦就自動把它跟 $\\text{Hz}$ 畫上等號。** 要避免這個坑，在推導電路或寫 Web App 模擬器底層程式碼時，你必須在以下三個地方「提早修正」並建立防呆機制：\r\n\r\n**提早修正點一：確認 $K_{vco}$ 的「出生證明」**\r\n這是最常翻車的地方。當你拿到一顆 VCO，或者在模擬器裡宣告變數時，第一步就是搞清楚它的單位：\r\n* **學術派 / 控制理論 (你筆記上的)：** $K_{vco}$ 定義為 $K_{vco,\\omega}$，單位是 **$[\\text{rad/(s}\\cdot\\text{V)}]$**。\r\n    * 代入公式 $\\frac{I_p R_p K_{vco}}{\\phi_m}$ 算出來的結果是 **角頻率 $\\omega_{BW}$**。\r\n* **業界實務 / VCO Designer 給的 spec：** $K_{vco}$ 通常定義為 $K_{vco,f}$，單位是 **$[\\text{Hz/V}]$** 或 **$[\\text{MHz/V}]$**（因為沒有人量測時看示波器會去讀 rad/s）。\r\n    * 這兩者的關係是：$K_{vco,\\omega} = 2\\pi \\cdot K_{vco,f}$。\r\n\r\n**提早修正點二：公式左邊 (LHS) 絕對不只寫 Bandwidth**\r\n在筆記或黑板上推導時，嚴格區分變數名稱。\r\n* 永遠不要只寫 $BW = \\dots$\r\n* 一定要明確寫出 $\\omega_{BW} = \\dots$ 或 $f_{BW} = \\dots$\r\n\r\n如果你的前提是使用學術派的 $K_{vco,\\omega}$ $[\\text{rad/(s}\\cdot\\text{V)}]$，那你的公式推導第一行就應該長這樣，把 $2\\pi$ 的橋樑直接寫死：\r\n$$f_{BW} = \\frac{\\omega_{BW}}{2\\pi} = \\mathbf{\\frac{I_p \\cdot R_p \\cdot K_{vco,\\omega}}{2\\pi \\cdot \\phi_m}}$$\r\n只要你一開始就把左邊定為 $f_{BW}$ 並補上 $2\\pi$ 分母，後面代數字就絕對不會錯。\r\n\r\n**提早修正點三：業界超好用的「單位直通捷徑」**\r\n如果今天 VCO 設計師給你的規格是實務上的 $K_{vco,f} [\\text{Hz/V}]$，你可以直接用一個超爽的捷徑。\r\n把 $K_{vco,\\omega} = 2\\pi \\cdot K_{vco,f}$ 代入剛才的公式：\r\n$$f_{BW} = \\frac{I_p \\cdot R_p \\cdot (2\\pi \\cdot K_{vco,f})}{2\\pi \\cdot \\phi_m}$$\r\n上下 $2\\pi$ 完美消掉！\r\n$$f_{BW} = \\mathbf{\\frac{I_p \\cdot R_p \\cdot K_{vco,f}}{\\phi_m}}$$\r\n\r\n**發現了嗎？** 只要你確認帶入的 $K_{vco}$ 是 $\\text{Hz/V}$，算出來的數字**直接就是 $f_{BW} (\\text{Hz})$**，完全不用再去除以 $2\\pi$！\r\n\r\n**總結你的 Action Item**\r\n下次面試被問到或是自己在刻 Web App 的行為模型時，只要遇到 $K_{vco}$，先問自己（或面試官）一句：**「請問這裡的 $K_{vco}$ 單位是 $\\text{rad/s/V}$ 還是 $\\text{Hz/V}$？」**\r\n\r\n* 如果是 $\\text{rad/s/V}$ $\\rightarrow$ 算出來是 $\\omega_{BW}$，要轉 $\\text{Hz}$ 記得**除以 $2\\pi$**。\r\n* 如果是 $\\text{Hz/V}$ $\\rightarrow$ 算出來直接就是 $f_{BW}$，**不用動**。\r\n\r\n這句話問出來，不僅能提早避開計算盲點，更能展現你銜接「課本理論」與「業界實務」的 Senior 工程師直覺。\r\n\r\n---\r\n\r\n- **RMS Jitter $J_{rms,BB}$**（工程公式轉換）：\r\n  等號右邊的根號內部為 $\\frac{\\text{[rad}^2\\text{/Hz]}}{\\text{[Hz]}} = \\text{[rad}^2 \\cdot \\text{s}^2]$，開根號後為 $\\text{[rad} \\cdot \\text{s]}$。乘上外面的頻率參數 $f_0 \\text{ [1/s]}$ 後，得到 $\\text{[rad]}$。公式中直接標註 (UI)，代表該工程公式已隱含了將弧度 (rad) 除以 $2\\pi$ 轉換為 Unit Interval (UI) 的縮放常數。\r\n\r\n**圖表單位推斷：**\r\n📈 左上圖表 ($I_{av}$ vs $\\Delta\\phi$)：\r\n- X 軸：相位誤差 $\\Delta\\phi \\text{ [UI] 或 [rad]}$，典型範圍 $-\\phi_m \\sim +\\phi_m$ (約 $\\pm 0.03 \\text{ UI}$)。\r\n- Y 軸：平均充放電電流 $I_{av} \\text{ [}\\mu\\text{A]}$，典型範圍 $\\pm I_p$。\r\n\r\n📈 右上圖表 ($S_{\\phi,vco}$ vs $\\omega$)：\r\n- X 軸：偏移角頻率 $\\omega \\text{ [rad/s]}$（對數座標）。\r\n- Y 軸：相位雜訊 PSD $S_{\\phi,vco}(\\omega) \\text{ [rad}^2\\text{/Hz]}$，呈現 $\\propto 1/\\omega^2$ 之斜率。\r\n\r\n📈 下方圖表 (Phase Noise Profile $S_{\\phi}(f)$ vs $f$)：\r\n- X 軸：頻率 $f \\text{ [Hz]}$（對數座標），典型範圍 100 kHz ~ 100 MHz。\r\n- Y 軸：相位雜訊 $S_{\\phi}(f) \\text{ [dBc/Hz]}$ 或 $\\text{[rad}^2\\text{/Hz]}$，典型範圍 -80 ~ -120 dBc/Hz。\r\n- 物理意義：展示 CDR 輸出 (ckout) 雜訊在 $f_{BW}$ 前面以 1:1 低通 (LPF) 跟隨輸入資料雜訊，在 $f_{BW}$ 後面以 1:1 高通 (HPF) 跟隨 VCO free-running 雜訊。","type":"units"},{"title":"白話物理意義","content":"當輸入訊號乾淨到幾乎沒有抖動時，BB-CDR 的相位追蹤會侷限在極小的線性微調區內；此時系統自己產生的抖動 (Jitter Generation) 幾乎全都是「VCO 本身在高頻抑制不掉的雜訊」所貢獻的。","type":"plain"},{"title":"生活化比喻","content":"想像你是一個司機（CDR），開著一台引擎有點震動的車（VCO）跟著前面的引導車（Input Data）。如果引導車開得非常平穩（Clean input），你幾乎不需要猛打方向盤，只會在車道內極小幅度地微調方向（操作在線性區）。這時候，車子整體的晃動感（Jitter Generation），主要就是來自你這台車本身的引擎震動（VCO phase noise），而不是因為你跟錯車。","type":"analogy"},{"title":"面試必考點","items":[{"question":"在量測 BB-CDR 的 Jitter Generation (J_G) 時，為何可以用線性 PLL 模型來分析？","answer":"因為量測 J_G 時會給予一個極度乾淨 (Jitter-free) 的輸入訊號。此時系統的相位誤差變異數極小，高達 99.9% 的時間都落在 BB-PD 狹窄的線性區間內，因此非線性行為被弱化，可視為線性系統。"},{"question":"BB-CDR 操作在線性區時，J_G 的主要雜訊貢獻來源是哪個 Block？為什麼？","answer":"是 VCO。因為輸入端乾淨且誤差小，PD/CP 貢獻的雜訊可忽略；而 VCO 的雜訊透過 High-Pass Filter 轉移函數傳遞到輸出端，頻寬外的低頻雜訊被壓抑，但高頻雜訊會直接漏到輸出端成為 J_G。"},{"question":"要如何從系統層級降低 CDR 的 Jitter Generation？","answer":"根據公式 $J_{rms} \\propto 1/\\sqrt{f_{BW}}$，可以透過增加迴路頻寬 ($f_{BW,BB}$) 來擴大 HPF 對 VCO 雜訊的抑制範圍；或者直接採用 Phase noise 更優良的 VCO ($S_{\\phi,vco}$ 較小)。"}],"type":"quiz"},{"content":"","type":"mnemonic"}],"imageUrl":"../images/done/CDR-L30-P2.jpg"};

function renderUnits(text) {
  // Split into unit-block (公式消去) and chart-infer (圖表推斷) sub-blocks
  let html = mdToHtml(text);
  // Wrap lines starting with 📈 in chart-infer div
  html = html.replace(/<p>(📈[\s\S]*?)<\/p>/g, '<div class="chart-infer">$1</div>');
  // Wrap lines containing [X] × [Y] style unit derivations in unit-block div
  html = html.replace(/<p>([^<]*\[[\w\/]+\][^<]*=[^<]*)<\/p>/g, '<div class="unit-block">$1</div>');
  return html;
}

function renderQA(items) {
  if (!items || !items.length) return '<p style="color:var(--dim)">尚無延伸問題</p>';
  return items.map((q, i) => `
    <div class="qa-item">
      <div class="qa-item-q">Q${i+1}：${escHtml(q.question)}</div>
      <div class="qa-item-a">${mdToHtml(q.answer)}</div>
    </div>`).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function mdToHtml(text) {
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Numbered list items
  text = text.replace(/^(\d+)\.\s+(.+)$/gm, '<li data-ol>$2</li>');
  // Bullet list items
  text = text.replace(/^\*\s+(.+)$/gm, '<li data-ul>$1</li>');
  // Wrap ol items
  text = text.replace(/(<li data-ol>[^\n]*\n?)+/g, m => '<ol>' + m.replace(/ data-ol/g,'') + '</ol>');
  // Wrap ul items
  text = text.replace(/(<li data-ul>[^\n]*\n?)+/g, m => '<ul>' + m.replace(/ data-ul/g,'') + '</ul>');
  // Horizontal rule
  text = text.replace(/^---$/gm, '<hr style="border-color:var(--dim);margin:0.8rem 0">');
  // Paragraphs (split by double newline)
  text = text.split(/\n{2,}/).map(p => {
    p = p.trim();
    if (!p || p.startsWith('<ol>') || p.startsWith('<ul>') || p.startsWith('<hr')) return p;
    return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
  }).join('\n');
  return text;
}

const GEMINI_MODEL = 'gemini-2.5-flash';
const GEMINI_API   = 'https://generativelanguage.googleapis.com/v1beta/models/' + GEMINI_MODEL + ':streamGenerateContent';

function getApiKey() { return localStorage.getItem('gemini_api_key') || ''; }
function setApiKey(k) { localStorage.setItem('gemini_api_key', k); }

function buildSystemPrompt() {
  let sys = `你是一位嚴格的 IC 設計助教，專精高速 SerDes / PLL / CDR / TIA 等電路設計（55nm及以下製程）。\n`;
  sys += `現在的學習筆記：${NOTE_DATA.title}（${NOTE_DATA.date}）\n\n`;
  sys += `以下是筆記的完整內容：\n`;
  NOTE_DATA.sections.forEach(sec => {
    if (sec.type === 'quiz') {
      sys += `\n## 面試必考點\n`;
      sec.items.forEach((q, i) => {
        sys += `Q${i+1}: ${q.question}\nA: ${q.answer}\n`;
      });
    } else if (sec.content) {
      const t = sec.title || ({ intro:'概覽', math:'數學推導', plain:'白話物理意義', analogy:'生活化比喻', mnemonic:'記憶口訣' })[sec.type] || sec.type;
      sys += `\n## ${t}\n${sec.content}\n`;
    }
  });
  sys += `\n請以繁體中文回答，精準且言簡意賅。`;
  return sys;
}

// Gemini 用 "model" 而非 "assistant"
function toGeminiHistory(messages) {
  return messages.map(m => ({
    role: m.role === 'assistant' ? 'model' : m.role,
    parts: [{ text: m.content }]
  }));
}

async function streamClaude(messages, onChunk, onDone, onError) {
  const apiKey = getApiKey();
  if (!apiKey) {
    document.getElementById('apikey-modal').classList.add('open');
    document.getElementById('apikey-input').focus();
    if (onError) onError('請先設定 Gemini API Key');
    return;
  }

  let resp;
  try {
    resp = await fetch(GEMINI_API + '?alt=sse&key=' + encodeURIComponent(apiKey), {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: buildSystemPrompt() }] },
        contents: toGeminiHistory(messages),
        generationConfig: { maxOutputTokens: 1024 }
      })
    });
  } catch (e) {
    if (onError) onError('網路錯誤：' + e.message);
    onDone();
    return;
  }

  if (!resp.ok) {
    let errMsg = resp.statusText;
    try { const j = await resp.json(); errMsg = j.error?.message || errMsg; } catch {}
    if (onError) onError('[' + resp.status + '] ' + errMsg);
    onDone();
    return;
  }

  const reader = resp.body.getReader();
  const dec = new TextDecoder();
  let buf = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const d = line.slice(6).trim();
      if (!d || d === '[DONE]') continue;
      try {
        const evt = JSON.parse(d);
        const text = evt.candidates?.[0]?.content?.parts?.[0]?.text;
        if (text) onChunk(text);
      } catch {}
    }
  }
  onDone();
}

// ── Chat Panel ──
const chatBtn      = document.getElementById('chat-btn');
const chatPanel    = document.getElementById('chat-panel');
const chatClose    = document.getElementById('chat-close');
const chatMessages = document.getElementById('chat-messages');
const chatInput    = document.getElementById('chat-input');
const chatSend     = document.getElementById('chat-send');

let chatHistory = [];
let chatStreaming = false;

chatBtn.addEventListener('click', () => chatPanel.classList.toggle('open'));
chatClose.addEventListener('click', () => chatPanel.classList.remove('open'));

function appendChatMsg(role, text) {
  const empty = chatMessages.querySelector('.chat-empty');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.className = 'chat-msg ' + role;
  div.textContent = text;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  return div;
}

async function sendChat() {
  const q = chatInput.value.trim();
  if (!q || chatStreaming) return;
  chatInput.value = '';
  chatStreaming = true;
  chatSend.disabled = true;

  chatHistory.push({ role: 'user', content: q });
  appendChatMsg('user', q);

  const aiDiv = appendChatMsg('ai', '');
  let buf = '';

  await streamClaude(
    chatHistory,
    (chunk) => {
      buf += chunk;
      aiDiv.textContent = buf;
      chatMessages.scrollTop = chatMessages.scrollHeight;
    },
    () => {
      chatHistory.push({ role: 'assistant', content: buf });
      chatStreaming = false;
      chatSend.disabled = false;
      chatInput.focus();
    },
    (err) => {
      aiDiv.textContent = '⚠ ' + err;
      chatStreaming = false;
      chatSend.disabled = false;
    }
  );
}

chatSend.addEventListener('click', sendChat);
chatInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); } });

// ── AI Score in Feynman ──
const fmAiScore    = document.getElementById('fm-ai-score');
const aiFeedback   = document.getElementById('ai-feedback');
const aiFeedbackTx = document.getElementById('ai-feedback-text');
let aiScoring = false;

fmAiScore.addEventListener('click', async () => {
  const q = document.getElementById('fm-question').textContent;
  const userAns = document.getElementById('fm-input').value.trim();
  const correctAns = document.getElementById('fm-answer').textContent ||
    (NOTE_DATA.sections.find(s => s.type === 'quiz')?.items[window._fmIdx || 0]?.answer || '');

  if (!userAns) {
    aiFeedbackTx.textContent = '請先輸入你的答案。';
    aiFeedback.classList.add('show');
    return;
  }
  if (aiScoring) return;
  aiScoring = true;
  fmAiScore.disabled = true;

  aiFeedbackTx.textContent = '評分中...';
  aiFeedback.classList.add('show');
  let buf = '';

  const evalMessages = [{
    role: 'user',
    content: `問題：${q}\n\n學生的回答：${userAns}\n\n參考答案：${correctAns}\n\n請評分（1-10分）並給出具體改進建議，說明哪裡答對了、哪裡還不夠精確。請用繁體中文，簡潔有力。`
  }];

  await streamClaude(
    evalMessages,
    (chunk) => {
      buf += chunk;
      aiFeedbackTx.textContent = buf;
    },
    () => {
      aiScoring = false;
      fmAiScore.disabled = false;
    },
    (err) => {
      aiFeedbackTx.textContent = '⚠ ' + err;
      aiScoring = false;
      fmAiScore.disabled = false;
    }
  );
});

// reset AI feedback when question changes
const origShowFeynman = window._showFeynmanOrig;
document.getElementById('fm-next').addEventListener('click', () => {
  aiFeedback.classList.remove('show');
  aiFeedbackTx.textContent = '';
  fmAiScore.disabled = false;
  aiScoring = false;
}, true);
document.getElementById('fm-close').addEventListener('click', () => {
  aiFeedback.classList.remove('show');
  aiScoring = false;
  fmAiScore.disabled = false;
}, true);
</script>
