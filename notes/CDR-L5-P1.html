<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">SerDes Note</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
:root {
  --bg:        #121212;
  --bg2:       #1a1a1a;
  --grid:      rgba(0,255,60,0.03);
  --phosphor:  #39e87a;
  --phosphor2: #1fa84e;
  --text:      #D1D5DB;
  --amber:     #f5a623;
  --dim:       #2a4a2a;
  --border:    rgba(57,232,122,0.18);
  --font-mono: 'Share Tech Mono', monospace;
  --font-ui:   'Rajdhani', sans-serif;
  --scan-size: 3px;
}

/* Light theme */
body.light {
  --bg:        #FFFFFF;
  --bg2:       #F9FAFB;
  --grid:      rgba(0,0,0,0.04);
  --text:      #111827;
  --dim:       #9CA3AF;
  --border:    #E5E7EB;
  --phosphor:  #059669;
  --phosphor2: #047857;
  --amber:     #D97706;
  --scan-size: 0px;
}

body.light .section.math .section-body,
body.light .section.units .section-body,
body.light .section.qa .section-body,
body.light .card-a,
body.light .qa-item-a,
body.light .modal-answer,
body.light .ai-feedback,
body.light .section.units .chart-infer { color: #374151; }

body.light .title,
body.light .section.mnemonic .section-body { text-shadow: none; }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* CRT scanlines */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent calc(var(--scan-size) - 1px),
    rgba(0,0,0,0.08) var(--scan-size)
  );
  pointer-events: none;
  z-index: 1000;
}

/* Grid background */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 920px;
  margin: 0 auto;
  padding: 2rem 1.5rem 6rem;
  position: relative;
  z-index: 1;
}

/* ── Header ── */
.header {
  border-bottom: 1px solid var(--border);
  padding-bottom: 1.2rem;
  margin-bottom: 2rem;
}

.header-top {
  display: flex;
  align-items: baseline;
  gap: 1.5rem;
  flex-wrap: wrap;
}

.tag {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--phosphor2);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.title {
  font-family: var(--font-ui);
  font-size: 2.4rem;
  font-weight: 700;
  color: var(--phosphor);
  letter-spacing: 0.05em;
  text-shadow: 0 0 20px rgba(57,232,122,0.4);
}

.date-line {
  margin-top: 0.4rem;
  font-size: 0.75rem;
  color: var(--phosphor2);
  display: flex;
  gap: 2rem;
}

/* ── Image viewer ── */
.image-wrap {
  position: relative;
  margin-bottom: 2.5rem;
  cursor: zoom-in;
  border: 1px solid var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.image-wrap::before {
  content: '[ RAW_SCAN ]';
  position: absolute;
  top: 0.5rem; left: 0.7rem;
  font-size: 0.65rem;
  color: var(--phosphor2);
  letter-spacing: 0.1em;
  z-index: 2;
}

.image-wrap::after {
  content: '⊕ ZOOM';
  position: absolute;
  bottom: 0.5rem; right: 0.7rem;
  font-size: 0.65rem;
  color: var(--amber);
  letter-spacing: 0.1em;
  z-index: 2;
}

.note-img {
  width: 100%;
  max-height: 420px;
  object-fit: cover;
  display: block;
  filter: brightness(0.92) contrast(1.1);
  transition: filter 0.2s;
}
.image-wrap:hover .note-img { filter: brightness(1) contrast(1.15); }

/* Lightbox */
.lightbox {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 2000;
  cursor: zoom-out;
  align-items: center;
  justify-content: center;
}
.lightbox.open { display: flex; }
.lightbox img {
  max-width: 95vw;
  max-height: 95vh;
  object-fit: contain;
  border: 1px solid var(--border);
}

/* ── Section ── */
.section {
  margin-bottom: 2rem;
  border: 1px solid var(--border);
  border-radius: 2px;
  overflow: hidden;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.4s, transform 0.4s;
}
.section.visible { opacity: 1; transform: none; }

.section-header {
  background: var(--bg2);
  padding: 0.55rem 1rem;
  display: flex;
  align-items: center;
  gap: 0.7rem;
  border-bottom: 1px solid var(--border);
}

.section-icon {
  font-size: 0.9rem;
  color: var(--amber);
}

.section-title {
  font-family: var(--font-ui);
  font-size: 0.85rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--amber);
}

.section-body {
  padding: 1.2rem 1.2rem;
  line-height: 1.8;
  font-size: 0.88rem;
}

/* intro special */
.section.intro .section-body {
  color: var(--phosphor);
  border-left: 3px solid var(--amber);
  font-size: 0.9rem;
}

/* math section */
.section.math .section-body { color: #b8e8c8; }

/* ── Unit analysis sub-section ── */
.section.units {
  margin-top: -1.2rem;
  margin-bottom: 2rem;
  border: 1px solid rgba(245,166,35,0.15);
  border-top: none;
  border-radius: 0 0 2px 2px;
  margin-left: 1.5rem;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.4s, transform 0.4s;
}
.section.units.visible { opacity: 1; transform: none; }
.section.units .section-header {
  background: rgba(245,166,35,0.05);
  border-bottom: 1px solid rgba(245,166,35,0.12);
}
.section.units .section-title {
  font-size: 0.72rem;
  color: var(--amber);
  opacity: 0.85;
}
.section.units .section-body {
  font-size: 0.82rem;
  color: #c8d8c8;
  line-height: 1.75;
}
.section.units .unit-block {
  background: rgba(0,0,0,0.2);
  border: 1px solid rgba(245,166,35,0.1);
  border-radius: 2px;
  padding: 0.6rem 0.9rem;
  margin: 0.5rem 0;
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: var(--amber);
  line-height: 1.7;
}
.section.units .chart-infer {
  background: rgba(57,232,122,0.04);
  border: 1px solid rgba(57,232,122,0.12);
  border-radius: 2px;
  padding: 0.6rem 0.9rem;
  margin: 0.5rem 0;
  font-size: 0.78rem;
  color: #8be8aa;
  line-height: 1.7;
}

/* ── Q&A append section ── */
.section.qa .section-body {
  color: #b8d8e8;
}
.qa-item {
  margin-bottom: 1.2rem;
  border-left: 2px solid var(--phosphor2);
  padding-left: 0.9rem;
}
.qa-item-q {
  font-weight: 600;
  color: var(--phosphor);
  margin-bottom: 0.3rem;
  font-size: 0.85rem;
}
.qa-item-a {
  font-size: 0.82rem;
  color: #8be8aa;
  line-height: 1.75;
}

.section-body ol {
  padding-left: 1.4rem;
}

.section-body ol li, .section-body ul li {
  margin-bottom: 0.5rem;
}

.section-body strong {
  color: var(--phosphor);
}

/* ── Quiz flashcards ── */
.quiz-list { display: flex; flex-direction: column; gap: 0.9rem; }

.card {
  border: 1px solid var(--dim);
  border-radius: 2px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.2s;
}
.card:hover { border-color: var(--phosphor2); }
.card.open  { border-color: var(--phosphor); }

.card-q {
  padding: 0.7rem 1rem;
  display: flex;
  gap: 0.8rem;
  align-items: flex-start;
  font-size: 0.85rem;
}

.card-num {
  color: var(--amber);
  min-width: 1.5rem;
  font-weight: bold;
}

.card-q-text { flex: 1; color: var(--phosphor); }

.card-toggle {
  color: var(--phosphor2);
  font-size: 0.7rem;
  min-width: 1.5rem;
  text-align: right;
  margin-top: 0.1rem;
  transition: transform 0.25s;
}
.card.open .card-toggle { transform: rotate(90deg); color: var(--phosphor); }

.card-a {
  display: none;
  padding: 0.7rem 1rem 0.9rem 3.3rem;
  font-size: 0.83rem;
  line-height: 1.75;
  color: #8be8aa;
  background: rgba(57,232,122,0.03);
  border-top: 1px solid var(--dim);
}
.card.open .card-a { display: block; }

/* ── Mnemonic ── */
.section.mnemonic .section-body {
  font-family: var(--font-ui);
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--amber);
  letter-spacing: 0.05em;
  text-align: center;
  padding: 1.5rem;
  text-shadow: 0 0 10px rgba(245,166,35,0.3);
}

/* ── Feynman FAB ── */
.fab {
  position: fixed;
  bottom: 2rem; right: 2rem;
  z-index: 500;
  background: var(--bg2);
  border: 1px solid var(--amber);
  color: var(--amber);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  padding: 0.7rem 1.1rem;
  cursor: pointer;
  border-radius: 2px;
  transition: background 0.2s, box-shadow 0.2s;
  box-shadow: 0 0 12px rgba(245,166,35,0.15);
}
.fab:hover {
  background: rgba(245,166,35,0.08);
  box-shadow: 0 0 20px rgba(245,166,35,0.3);
}

/* ── Feynman Modal ── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.88);
  z-index: 1500;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--bg2);
  border: 1px solid var(--amber);
  border-radius: 2px;
  padding: 2rem;
  max-width: 620px;
  width: 90%;
  position: relative;
}

.modal-label {
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  color: var(--amber);
  text-transform: uppercase;
  margin-bottom: 1rem;
}

.modal-question {
  font-family: var(--font-ui);
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--phosphor);
  line-height: 1.6;
  margin-bottom: 1.5rem;
}

.modal-input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--phosphor);
  font-family: var(--font-mono);
  font-size: 0.85rem;
  padding: 0.5rem 0;
  outline: none;
  margin-bottom: 1.2rem;
  caret-color: var(--phosphor);
}
.modal-input::placeholder { color: var(--dim); }

.modal-actions {
  display: flex;
  gap: 0.8rem;
  justify-content: flex-end;
}

.btn {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  padding: 0.5rem 1rem;
  border: 1px solid;
  border-radius: 2px;
  cursor: pointer;
  background: transparent;
  transition: background 0.2s;
}
.btn-reveal { border-color: var(--phosphor2); color: var(--phosphor2); }
.btn-reveal:hover { background: rgba(57,232,122,0.08); }
.btn-next   { border-color: var(--amber); color: var(--amber); }
.btn-next:hover { background: rgba(245,166,35,0.08); }
.btn-close  { border-color: var(--dim); color: var(--dim); }
.btn-close:hover { border-color: var(--phosphor2); color: var(--phosphor2); }

.modal-answer {
  display: none;
  font-size: 0.82rem;
  color: #8be8aa;
  line-height: 1.75;
  border-top: 1px solid var(--dim);
  margin-top: 0.5rem;
  padding-top: 0.8rem;
}
.modal-answer.show { display: block; }

/* scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

/* ── Theme / Settings buttons ── */
.theme-btn, .settings-btn {
  background: transparent;
  border: 1px solid var(--dim);
  color: var(--dim);
  font-family: var(--font-mono);
  font-size: 0.68rem;
  padding: 0.3rem 0.6rem;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s;
  letter-spacing: 0.08em;
}
.theme-btn { margin-left: auto; }
.theme-btn:hover, .settings-btn:hover { border-color: var(--phosphor2); color: var(--phosphor2); }
.settings-btn.active { border-color: var(--phosphor); color: var(--phosphor); }

/* ── Chat FAB ── */
.chat-fab {
  position: fixed;
  bottom: 2rem; right: 10.5rem;
  z-index: 500;
  background: var(--bg2);
  border: 1px solid var(--phosphor);
  color: var(--phosphor);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  padding: 0.7rem 1.1rem;
  cursor: pointer;
  border-radius: 2px;
  transition: background 0.2s, box-shadow 0.2s;
  box-shadow: 0 0 12px rgba(57,232,122,0.15);
}
.chat-fab:hover {
  background: rgba(57,232,122,0.08);
  box-shadow: 0 0 20px rgba(57,232,122,0.3);
}

/* ── Chat Panel ── */
.chat-panel {
  position: fixed;
  top: 0; right: -420px;
  width: 400px;
  height: 100vh;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  z-index: 800;
  display: flex;
  flex-direction: column;
  transition: right 0.3s ease;
}
.chat-panel.open { right: 0; }

.chat-panel-header {
  padding: 0.9rem 1rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.chat-panel-title {
  font-family: var(--font-ui);
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  color: var(--phosphor);
  text-transform: uppercase;
}
.chat-close-btn {
  background: transparent;
  border: none;
  color: var(--phosphor2);
  cursor: pointer;
  font-size: 0.85rem;
  font-family: var(--font-mono);
  padding: 0.2rem;
}
.chat-close-btn:hover { color: var(--phosphor); }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}
.chat-empty {
  color: var(--dim);
  font-size: 0.75rem;
  text-align: center;
  margin-top: 2rem;
  line-height: 1.8;
  letter-spacing: 0.05em;
}

.chat-msg {
  max-width: 88%;
  padding: 0.6rem 0.8rem;
  border-radius: 2px;
  font-size: 0.8rem;
  line-height: 1.65;
  word-break: break-word;
}
.chat-msg.user {
  align-self: flex-end;
  background: rgba(57,232,122,0.07);
  border: 1px solid var(--phosphor2);
  color: var(--phosphor);
}
.chat-msg.ai {
  align-self: flex-start;
  background: rgba(245,166,35,0.04);
  border: 1px solid rgba(245,166,35,0.25);
  color: #c8dac8;
  white-space: pre-wrap;
}

.chat-input-row {
  padding: 0.8rem 1rem;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 0.5rem;
  flex-shrink: 0;
}
.chat-input {
  flex: 1;
  background: transparent;
  border: 1px solid var(--dim);
  color: var(--phosphor);
  font-family: var(--font-mono);
  font-size: 0.78rem;
  padding: 0.45rem 0.7rem;
  outline: none;
  border-radius: 2px;
  caret-color: var(--phosphor);
}
.chat-input:focus { border-color: var(--phosphor2); }
.chat-input::placeholder { color: var(--dim); }
.chat-send-btn {
  background: transparent;
  border: 1px solid var(--phosphor2);
  color: var(--phosphor2);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  padding: 0.45rem 0.8rem;
  cursor: pointer;
  border-radius: 2px;
  transition: background 0.2s;
  white-space: nowrap;
}
.chat-send-btn:hover { background: rgba(57,232,122,0.08); }
.chat-send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* ── API Key Modal ── */
.apikey-modal {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.88);
  z-index: 2000;
  align-items: center;
  justify-content: center;
}
.apikey-modal.open { display: flex; }
.apikey-modal .modal { border-color: var(--phosphor); max-width: 480px; }
.apikey-input {
  width: 100%;
  background: transparent;
  border: 1px solid var(--dim);
  color: var(--phosphor);
  font-family: var(--font-mono);
  font-size: 0.78rem;
  padding: 0.5rem 0.7rem;
  outline: none;
  border-radius: 2px;
  margin-bottom: 0.6rem;
  caret-color: var(--phosphor);
}
.apikey-input:focus { border-color: var(--phosphor2); }
.apikey-hint {
  font-size: 0.68rem;
  color: var(--phosphor2);
  margin-bottom: 1.2rem;
  line-height: 1.6;
}
.apikey-status {
  font-size: 0.68rem;
  margin-bottom: 0.8rem;
  height: 1rem;
}
.apikey-status.ok  { color: var(--phosphor2); }
.apikey-status.err { color: #e87a7a; }

/* ── AI Score in Feynman ── */
.ai-feedback {
  display: none;
  margin-top: 0.8rem;
  padding: 0.7rem 0.9rem;
  border: 1px solid rgba(57,232,122,0.22);
  border-radius: 2px;
  font-size: 0.78rem;
  color: #b8e8c8;
  line-height: 1.72;
  background: rgba(57,232,122,0.03);
  white-space: pre-wrap;
  word-break: break-word;
}
.ai-feedback.show { display: block; }
.ai-feedback-label {
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  color: var(--phosphor2);
  margin-bottom: 0.5rem;
  text-transform: uppercase;
}

.btn-ai   { border-color: var(--phosphor); color: var(--phosphor); }
.btn-ai:hover { background: rgba(57,232,122,0.08); }
.btn-ai:disabled { opacity: 0.35; cursor: not-allowed; }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="header-top">
      <span class="tag">SERDES // IC DESIGN</span>
      <h1 class="title" id="note-title">—</h1>
      <button class="theme-btn" id="theme-btn">◐ THEME</button>
      <button class="settings-btn" id="settings-btn">⚙ API KEY</button>
    </div>
    <div class="date-line">
      <span id="note-date">—</span>
      <span id="note-src">—</span>
    </div>
  </div>

  <div id="img-wrap"></div>

  <div id="sections-container"></div>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <img id="lb-img" src="" alt="">
</div>

<!-- Chat FAB -->
<button class="chat-fab" id="chat-btn">[ AI 問答 ]</button>

<!-- Feynman FAB -->
<button class="fab" id="feynman-btn">[ 費曼測試 ]</button>

<!-- API Key Modal -->
<div class="apikey-modal" id="apikey-modal">
  <div class="modal">
    <div class="modal-label">⚙ ANTHROPIC API KEY 設定</div>
    <p class="apikey-hint">Key 僅存於本機 localStorage，不上傳任何伺服器。<br>取得金鑰：<strong style="color:var(--phosphor)">aistudio.google.com</strong> → Get API key（免費）</p>
    <input type="password" class="apikey-input" id="apikey-input" placeholder="AIza...">
    <div class="apikey-status" id="apikey-status"></div>
    <div class="modal-actions">
      <button class="btn btn-close" id="apikey-close">✕ 取消</button>
      <button class="btn btn-next" id="apikey-save">✓ 儲存</button>
    </div>
  </div>
</div>

<!-- Chat Panel -->
<div class="chat-panel" id="chat-panel">
  <div class="chat-panel-header">
    <span class="chat-panel-title">◈ AI CHAT — gemini-2.5-flash</span>
    <button class="chat-close-btn" id="chat-close">✕</button>
  </div>
  <div class="chat-messages" id="chat-messages">
    <div class="chat-empty">筆記內容已載入為系統上下文。<br>直接提問吧。</div>
  </div>

<script>
// ── NOTE_DATA injected by process_note.ps1 ──
const NOTE_DATA = {"date":"2026-04-05","title":"CDR-L5-P1","sections":[{"content":"Hogge Phase Detector (線性相位偵測器)\n\n做為你們的高速 IC 設計助教，這張圖是 CDR (Clock and Data Recovery) 領域中非常經典的 **Hogge Phase Detector (1985年提出)**。別看它古老，它是所有 Linear PD 的祖師爺！它解決了 Bang-Bang PD (Alexander PD) 非線性的問題，讓系統可以用線性模型來分析（如筆記所寫 \"Linear model applies\"）。但天下沒有白吃的午餐，它的速度瓶頸也是面試的超級熱區。打起精神，我們一步步拆解！","type":"intro"},{"title":"數學推導","content":"Hogge PD 的核心概念是**「脈波寬度比較」**。我們來推導它如何將相位誤差轉換為電荷量：\r\n1. **定義週期與變數：** 假設系統為 Full-Rate，即時鐘週期 $T_{clk} = 1 \\text{ UI}$ (Unit Interval)。令完美的取樣點在眼圖正中央，此時 Data 轉態到 Clock 邊緣的時間差應為 $0.5 \\text{ UI}$。令實際的時間差為 $t_{actual} = 0.5 \\text{ UI} + \\Delta t$，其中 $\\Delta t$ 就是時間誤差。\r\n2. **分析 X 脈波 (Proportional Pulse)：**\r\n   - $X = Din \\oplus B$ (其中 B 是 Din 被 $CK_{in}$ 上緣觸發後的結果)。\r\n   - 當 $Din$ 發生轉態，到下一個 $CK_{in}$ 上緣將 $B$ 更新為止，這段時間 $X$ 會是 High。\r\n   - 因此 $X$ 的脈波寬度 $W_X = t_{actual} = 0.5 \\text{ UI} + \\Delta t$。它與相位誤差**成正比** (如筆記：\"X 寬可從 0 bit ~ 1 bit\", \"Pulse 寬 = Phase error 大小\")。\r\n3. **分析 Y 脈波 (Reference Pulse)：**\r\n   - $Y = B \\oplus A$ (其中 A 是 B 被 $CK_{in}$ 下緣觸發後的結果，延遲了半個週期)。\r\n   - 當 $B$ 發生轉態，到半個週期後 $A$ 更新為止，這段時間 $Y$ 會是 High。\r\n   - 因為正負緣時間差是固定的，所以 $Y$ 的脈波寬度恆定 $W_Y = 0.5 \\text{ UI}$ (如筆記：\"Y 寬固定 0.5 bit\")。\r\n4. **Charge Pump 淨電荷輸出 ($Q_{net}$)：**\r\n   - X 控制 Charge Pump 充入電流 $I_p$ (Up)，Y 控制抽出電流 $I_p$ (Down)。\r\n   - 每次 Data 轉態產生的淨電荷：\r\n     $Q_{net} = I_p \\cdot W_X - I_p \\cdot W_Y$\r\n     $Q_{net} = I_p \\cdot (0.5 \\text{ UI} + \\Delta t) - I_p \\cdot (0.5 \\text{ UI}) = I_p \\cdot \\Delta t$\r\n5. **結論：** 輸出的電荷量 $Q_{net}$ 與時間誤差 $\\Delta t$ 呈現**完美的線性關係**。當系統鎖定（$\\Delta t = 0$），淨電荷為 0，VCO 頻率不變。","type":"math"},{"title":"單位解析","content":"**公式單位消去：**\r\n- **淨電荷 $Q_{net}$ 公式：** $Q_{net} = I_p \\times \\Delta t$\r\n  $[C] = [A] \\times [s]$\r\n- **平均輸出電流 $I_{avg}$ (考慮資料轉態密度 $D_T$ 及資料速率 $f_{data}$)：** \r\n  $I_{avg} = Q_{net} \\times (f_{data} \\times D_T) = I_p \\times \\Delta t \\times f_{data} \\times D_T$\r\n  $[A] = [A \\cdot s] \\times [1/s] \\times [\\text{無單位}] = [A]$\r\n- **相位偵測器增益 $K_{PD}$：** 若將 $\\Delta t$ 轉換為相位誤差 $\\Delta \\phi$ (拉氏轉換常用)\r\n  $K_{PD} = \\frac{I_{avg}}{\\Delta \\phi}$\r\n  $[A/rad] = [A] / [rad]$\r\n\r\n**圖表單位推斷：**\r\n📈 **時序波形圖 (右上)：**\r\n- **X 軸：** 時間 $t$ [UI] 或 [ps]，典型範圍：顯示約 4 UI，若為 1Gbps 則為 4 ns。\r\n- **Y 軸：** 電壓 $V$ [V]，典型範圍：數位邏輯準位 $0 \\sim VDD$ (如 $0 \\sim 1.2V$)。\r\n\r\n📈 **PD 特性曲線圖 (右下)：**\r\n- **X 軸：** 相位誤差 $\\Delta \\phi$ [rad] 或 [UI]，典型範圍：線性區間介於 $-\\pi \\sim \\pi$ (對應 $-0.5 \\text{ UI} \\sim 0.5 \\text{ UI}$)。\r\n- **Y 軸：** 平均輸出電流 $\\overline{I_{out}}$ [$\\mu A$]，典型範圍：$-I_p \\cdot D_T \\sim +I_p \\cdot D_T$。","type":"units"},{"title":"白話物理意義","content":"利用 XOR 閘產生一個「跟著實際時鐘飄移而變寬變窄」的 X 脈波，再減去一個「永遠死死固定是半個時鐘週期」的 Y 脈波，多退少補，算出時鐘該變快還是變慢。","type":"plain"},{"title":"生活化比喻","content":"想像公司規定**「上班彈性緩衝時間固定是 30 分鐘」**(這就是 Y 脈波)。\r\n今天你從家裡出發(Data轉態) 到 進公司打卡(Clock邊緣)，這段通勤時間就是 X 脈波。\r\n- 如果你通勤花了 40 分鐘 ($X \u003e Y$)：代表你太慢了，要扣錢 (Up訊號，促使時鐘加速)。\r\n- 如果你通勤只花了 20 分鐘 ($X \u003c Y$)：代表你提早到了，發獎金 (Down訊號，促使時鐘減速)。\r\n- 如果你今天請假沒出門 (沒有 Data transition)：不扣錢也不發獎金 (Tri-state，VCO 保持頻率)。","type":"analogy"},{"title":"面試必考點","items":[{"question":"Hogge PD 為什麼在連續相同碼 (CID, Consecutive Identical Digits) 時不會讓 VCO 頻率大飄移？","answer":"** 因為它具有 Tri-state 特性。如筆記所寫 \"Tri-state output during long runs\"。當沒有 Data transition 時，XOR 閘不會產生 X 與 Y 脈波，Charge Pump 的上下開關皆為 OFF (Tri-state)，因此不會對 Loop Filter 充放電，VCO 端的控制電壓得以保持。"},{"question":"Hogge PD 最大的致命傷是什麼？為什麼筆記說 \"Data Rate 上不去\"？","answer":"** 高速環境下的「脈波吞噬效應」。Hogge PD 極度依賴精準比較 X 和 Y 的「脈波寬度」。但在極高頻（如 28Gbps, UI \u003c 36ps）下，邏輯閘 (XOR, DFF) 的 rise/fall time 以及寄生電容會讓太窄的脈波根本打不出來（\"Pulse 寬度不可能無限小\"）。這會導致嚴重的 Dead Zone (死區) 與非線性，因此它只適合 Low-to-mid speed (低至中速) 應用。"},{"question":"筆記中提到 \"Static phase error may be left\"，這個穩態相位誤差是從哪裡來的？","answer":"** 來自電路實際佈局的「不對稱性」。產生 X 脈波只經過一個 XOR 閘；但產生 Y 脈波卻要經過 DFF 觸發再加上 XOR 閘。即使設計時盡量匹配，Clock-to-Q delay 和各種寄生 RC 仍會讓 $W_Y$ 不完全等於理想的 $0.5 \\text{ UI}$，這會導致系統最終鎖定在一個偏離眼圖正中央的相位，形成 Static Phase Offset。"}],"type":"quiz"},{"content":"\u003e **Hogge 測寬度，線性好對付；X 變 Y 基準，高速它會吐。**\r\n\u003e (解釋：Hogge 比對脈波寬度，線性模型好分析；X是變動量、Y是固定基準；但遇到高速率就會因為元件 delay 而無法運作)。","type":"mnemonic"}],"imageUrl":"../images/done/CDR-L5-P1.jpg"};

function renderUnits(text) {
  // Split into unit-block (公式消去) and chart-infer (圖表推斷) sub-blocks
  let html = mdToHtml(text);
  // Wrap lines starting with 📈 in chart-infer div
  html = html.replace(/<p>(📈[\s\S]*?)<\/p>/g, '<div class="chart-infer">$1</div>');
  // Wrap lines containing [X] × [Y] style unit derivations in unit-block div
  html = html.replace(/<p>([^<]*\[[\w\/]+\][^<]*=[^<]*)<\/p>/g, '<div class="unit-block">$1</div>');
  return html;
}

function renderQA(items) {
  if (!items || !items.length) return '<p style="color:var(--dim)">尚無延伸問題</p>';
  return items.map((q, i) => `
    <div class="qa-item">
      <div class="qa-item-q">Q${i+1}：${escHtml(q.question)}</div>
      <div class="qa-item-a">${mdToHtml(q.answer)}</div>
    </div>`).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function mdToHtml(text) {
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Numbered list items
  text = text.replace(/^(\d+)\.\s+(.+)$/gm, '<li data-ol>$2</li>');
  // Bullet list items
  text = text.replace(/^\*\s+(.+)$/gm, '<li data-ul>$1</li>');
  // Wrap ol items
  text = text.replace(/(<li data-ol>[^\n]*\n?)+/g, m => '<ol>' + m.replace(/ data-ol/g,'') + '</ol>');
  // Wrap ul items
  text = text.replace(/(<li data-ul>[^\n]*\n?)+/g, m => '<ul>' + m.replace(/ data-ul/g,'') + '</ul>');
  // Horizontal rule
  text = text.replace(/^---$/gm, '<hr style="border-color:var(--dim);margin:0.8rem 0">');
  // Paragraphs (split by double newline)
  text = text.split(/\n{2,}/).map(p => {
    p = p.trim();
    if (!p || p.startsWith('<ol>') || p.startsWith('<ul>') || p.startsWith('<hr')) return p;
    return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
  }).join('\n');
  return text;
}

function buildSystemPrompt() {
  let sys = `你是一位嚴格的 IC 設計助教，專精高速 SerDes / PLL / CDR / TIA 等電路設計（55nm及以下製程）。\n`;

  sys += `以下是筆記的完整內容：\n`;
  NOTE_DATA.sections.forEach(sec => {

      sys += `\n## 面試必考點\n`;
      sec.items.forEach((q, i) => {
        sys += `Q${i+1}: ${q.question}\nA: ${q.answer}\n`;
      });
    } else if (sec.content) {
      const t = sec.title || ({ intro:'概覽', math:'數學推導', plain:'白話物理意義', analogy:'生活化比喻', mnemonic:'記憶口訣' })[sec.type] || sec.type;

}

// Gemini 用 "model" 而非 "assistant"
function toGeminiHistory(messages) {
  return messages.map(m => ({
    role: m.role === 'assistant' ? 'model' : m.role,
    parts: [{ text: m.content }]
  }));
}

async function streamClaude(messages, onChunk, onDone, onError) {
  const apiKey = getApiKey();
  if (!apiKey) {
    document.getElementById('apikey-modal').classList.add('open');
    document.getElementById('apikey-input').focus();
    if (onError) onError('請先設定 Gemini API Key');
    return;
  }

  let resp;
  try {
    resp = await fetch(GEMINI_API + '?alt=sse&key=' + encodeURIComponent(apiKey), {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: buildSystemPrompt() }] },
        contents: toGeminiHistory(messages),
        generationConfig: { maxOutputTokens: 1024 }
      })
    });
  } catch (e) {
    if (onError) onError('網路錯誤：' + e.message);
    onDone();
    return;
  }

  if (!resp.ok) {
    let errMsg = resp.statusText;
    try { const j = await resp.json(); errMsg = j.error?.message || errMsg; } catch {}
    if (onError) onError('[' + resp.status + '] ' + errMsg);
    onDone();
    return;
  }

  const reader = resp.body.getReader();
  const dec = new TextDecoder();
  let buf = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const d = line.slice(6).trim();
      if (!d || d === '[DONE]') continue;
      try {
        const evt = JSON.parse(d);
        const text = evt.candidates?.[0]?.content?.parts?.[0]?.text;
        if (text) onChunk(text);
      } catch {}
    }
  }
  onDone();
}

apikeySave.addEventListener('click', () => {
  const k = apikeyInput.value.trim();
  if (!k) { apikeyStatus.textContent = '請輸入 API Key'; apikeyStatus.className = 'apikey-status err'; return; }
  setApiKey(k);
  settingsBtn.classList.add('active');
  apikeyStatus.textContent = '✓ 已儲存';
  apikeyStatus.className = 'apikey-status ok';
  setTimeout(() => apikeyModal.classList.remove('open'), 700);
});
apikeyInput.addEventListener('keydown', e => { if (e.key === 'Enter') apikeySave.click(); });
if (getApiKey()) settingsBtn.classList.add('active');

// ── Chat Panel ──
const chatBtn      = document.getElementById('chat-btn');
const chatPanel    = document.getElementById('chat-panel');
const chatClose    = document.getElementById('chat-close');
const chatMessages = document.getElementById('chat-messages');
const chatInput    = document.getElementById('chat-input');
const chatSend     = document.getElementById('chat-send');

let chatHistory = [];
let chatStreaming = false;

chatBtn.addEventListener('click', () => chatPanel.classList.toggle('open'));
chatClose.addEventListener('click', () => chatPanel.classList.remove('open'));

function appendChatMsg(role, text) {
  const empty = chatMessages.querySelector('.chat-empty');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.className = 'chat-msg ' + role;
  div.textContent = text;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  return div;
}

async function sendChat() {
  const q = chatInput.value.trim();
  if (!q || chatStreaming) return;
  chatInput.value = '';
  chatStreaming = true;
  chatSend.disabled = true;

  chatHistory.push({ role: 'user', content: q });
  appendChatMsg('user', q);

  const aiDiv = appendChatMsg('ai', '');
  let buf = '';

  await streamClaude(
    chatHistory,
    (chunk) => {
      buf += chunk;
      aiDiv.textContent = buf;
      chatMessages.scrollTop = chatMessages.scrollHeight;
    },
    () => {
      chatHistory.push({ role: 'assistant', content: buf });
      chatStreaming = false;
      chatSend.disabled = false;
      chatInput.focus();
    },
    (err) => {
      aiDiv.textContent = '⚠ ' + err;
      chatStreaming = false;
      chatSend.disabled = false;
    }
  );
}

chatSend.addEventListener('click', sendChat);
chatInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); } });

// ── AI Score in Feynman ──
const fmAiScore    = document.getElementById('fm-ai-score');
const aiFeedback   = document.getElementById('ai-feedback');
const aiFeedbackTx = document.getElementById('ai-feedback-text');
let aiScoring = false;

fmAiScore.addEventListener('click', async () => {
  const q = document.getElementById('fm-question').textContent;
  const userAns = document.getElementById('fm-input').value.trim();
  const correctAns = document.getElementById('fm-answer').textContent ||
    (NOTE_DATA.sections.find(s => s.type === 'quiz')?.items[window._fmIdx || 0]?.answer || '');

  if (!userAns) {
    aiFeedbackTx.textContent = '請先輸入你的答案。';
    aiFeedback.classList.add('show');
    return;
  }
  if (aiScoring) return;
  aiScoring = true;
  fmAiScore.disabled = true;

  aiFeedbackTx.textContent = '評分中...';
  aiFeedback.classList.add('show');
  let buf = '';

  const evalMessages = [{
    role: 'user',
    content: `問題：${q}\n\n學生的回答：${userAns}\n\n參考答案：${correctAns}\n\n請評分（1-10分）並給出具體改進建議，說明哪裡答對了、哪裡還不夠精確。請用繁體中文，簡潔有力。`
  }];

  await streamClaude(
    evalMessages,
    (chunk) => {
      buf += chunk;
      aiFeedbackTx.textContent = buf;
    },
    () => {
      aiScoring = false;
      fmAiScore.disabled = false;
    },
    (err) => {
      aiFeedbackTx.textContent = '⚠ ' + err;
      aiScoring = false;
      fmAiScore.disabled = false;
    }
  );
});

// reset AI feedback when question changes
const origShowFeynman = window._showFeynmanOrig;
document.getElementById('fm-next').addEventListener('click', () => {
  aiFeedback.classList.remove('show');
  aiFeedbackTx.textContent = '';
  fmAiScore.disabled = false;
  aiScoring = false;
}, true);
document.getElementById('fm-close').addEventListener('click', () => {
  aiFeedback.classList.remove('show');
  aiScoring = false;
  fmAiScore.disabled = false;
}, true);
</script>
