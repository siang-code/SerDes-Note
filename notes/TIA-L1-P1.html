<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">SerDes Note</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
:root {
  --bg:        #121212;
  --bg2:       #1a1a1a;
  --grid:      rgba(0,255,60,0.03);
  --phosphor:  #39e87a;
  --phosphor2: #1fa84e;
  --text:      #D1D5DB;
  --amber:     #f5a623;
  --dim:       #2a4a2a;
  --border:    rgba(57,232,122,0.18);
  --font-mono: 'Share Tech Mono', monospace;
  --font-ui:   'Rajdhani', sans-serif;
  --scan-size: 3px;
}

/* Light theme */
body.light {
  --bg:        #FFFFFF;
  --bg2:       #F9FAFB;
  --grid:      rgba(0,0,0,0.04);
  --text:      #111827;
  --dim:       #9CA3AF;
  --border:    #E5E7EB;
  --phosphor:  #059669;
  --phosphor2: #047857;
  --amber:     #D97706;
  --scan-size: 0px;
}

body.light .section.math .section-body,
body.light .section.units .section-body,
body.light .section.qa .section-body,
body.light .card-a,
body.light .qa-item-a,
body.light .modal-answer,
body.light .ai-feedback,
body.light .section.units .chart-infer { color: #374151; }

body.light .title,
body.light .section.mnemonic .section-body { text-shadow: none; }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* CRT scanlines */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent calc(var(--scan-size) - 1px),
    rgba(0,0,0,0.08) var(--scan-size)
  );
  pointer-events: none;
  z-index: 1000;
}

/* Grid background */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 920px;
  margin: 0 auto;
  padding: 2rem 1.5rem 6rem;
  position: relative;
  z-index: 1;
}

/* ── Header ── */
.header {
  border-bottom: 1px solid var(--border);
  padding-bottom: 1.2rem;
  margin-bottom: 2rem;
}

.header-top {
  display: flex;
  align-items: baseline;
  gap: 1.5rem;
  flex-wrap: wrap;
}

.tag {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--phosphor2);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.title {
  font-family: var(--font-ui);
  font-size: 2.4rem;
  font-weight: 700;
  color: var(--phosphor);
  letter-spacing: 0.05em;
  text-shadow: 0 0 20px rgba(57,232,122,0.4);
}

.date-line {
  margin-top: 0.4rem;
  font-size: 0.75rem;
  color: var(--phosphor2);
  display: flex;
  gap: 2rem;
}

/* ── Image viewer ── */
.image-wrap {
  position: relative;
  margin-bottom: 2.5rem;
  cursor: zoom-in;
  border: 1px solid var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.image-wrap::before {
  content: '[ RAW_SCAN ]';
  position: absolute;
  top: 0.5rem; left: 0.7rem;
  font-size: 0.65rem;
  color: var(--phosphor2);
  letter-spacing: 0.1em;
  z-index: 2;
}

.image-wrap::after {
  content: '⊕ ZOOM';
  position: absolute;
  bottom: 0.5rem; right: 0.7rem;
  font-size: 0.65rem;
  color: var(--amber);
  letter-spacing: 0.1em;
  z-index: 2;
}

.note-img {
  width: 100%;
  max-height: 420px;
  object-fit: cover;
  display: block;
  filter: brightness(0.92) contrast(1.1);
  transition: filter 0.2s;
}
.image-wrap:hover .note-img { filter: brightness(1) contrast(1.15); }

/* Lightbox */
.lightbox {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 2000;
  cursor: zoom-out;
  align-items: center;
  justify-content: center;
}
.lightbox.open { display: flex; }
.lightbox img {
  max-width: 95vw;
  max-height: 95vh;
  object-fit: contain;
  border: 1px solid var(--border);
}

/* ── Section ── */
.section {
  margin-bottom: 2rem;
  border: 1px solid var(--border);
  border-radius: 2px;
  overflow: hidden;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.4s, transform 0.4s;
}
.section.visible { opacity: 1; transform: none; }

.section-header {
  background: var(--bg2);
  padding: 0.55rem 1rem;
  display: flex;
  align-items: center;
  gap: 0.7rem;
  border-bottom: 1px solid var(--border);
}

.section-icon {
  font-size: 0.9rem;
  color: var(--amber);
}

.section-title {
  font-family: var(--font-ui);
  font-size: 0.85rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--amber);
}

.section-body {
  padding: 1.2rem 1.2rem;
  line-height: 1.8;
  font-size: 0.88rem;
}

/* intro special */
.section.intro .section-body {
  color: var(--phosphor);
  border-left: 3px solid var(--amber);
  font-size: 0.9rem;
}

/* math section */
.section.math .section-body { color: #b8e8c8; }

/* ── Unit analysis sub-section ── */
.section.units {
  margin-top: -1.2rem;
  margin-bottom: 2rem;
  border: 1px solid rgba(245,166,35,0.15);
  border-top: none;
  border-radius: 0 0 2px 2px;
  margin-left: 1.5rem;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.4s, transform 0.4s;
}
.section.units.visible { opacity: 1; transform: none; }
.section.units .section-header {
  background: rgba(245,166,35,0.05);
  border-bottom: 1px solid rgba(245,166,35,0.12);
}
.section.units .section-title {
  font-size: 0.72rem;
  color: var(--amber);
  opacity: 0.85;
}
.section.units .section-body {
  font-size: 0.82rem;
  color: #c8d8c8;
  line-height: 1.75;
}
.section.units .unit-block {
  background: rgba(0,0,0,0.2);
  border: 1px solid rgba(245,166,35,0.1);
  border-radius: 2px;
  padding: 0.6rem 0.9rem;
  margin: 0.5rem 0;
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: var(--amber);
  line-height: 1.7;
}
.section.units .chart-infer {
  background: rgba(57,232,122,0.04);
  border: 1px solid rgba(57,232,122,0.12);
  border-radius: 2px;
  padding: 0.6rem 0.9rem;
  margin: 0.5rem 0;
  font-size: 0.78rem;
  color: #8be8aa;
  line-height: 1.7;
}

/* ── Q&A append section ── */
.section.qa .section-body {
  color: #b8d8e8;
}
.qa-item {
  margin-bottom: 1.2rem;
  border-left: 2px solid var(--phosphor2);
  padding-left: 0.9rem;
}
.qa-item-q {
  font-weight: 600;
  color: var(--phosphor);
  margin-bottom: 0.3rem;
  font-size: 0.85rem;
}
.qa-item-a {
  font-size: 0.82rem;
  color: #8be8aa;
  line-height: 1.75;
}

.section-body ol {
  padding-left: 1.4rem;
}

.section-body ol li, .section-body ul li {
  margin-bottom: 0.5rem;
}

.section-body strong {
  color: var(--phosphor);
}

/* ── Quiz flashcards ── */
.quiz-list { display: flex; flex-direction: column; gap: 0.9rem; }

.card {
  border: 1px solid var(--dim);
  border-radius: 2px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.2s;
}
.card:hover { border-color: var(--phosphor2); }
.card.open  { border-color: var(--phosphor); }

.card-q {
  padding: 0.7rem 1rem;
  display: flex;
  gap: 0.8rem;
  align-items: flex-start;
  font-size: 0.85rem;
}

.card-num {
  color: var(--amber);
  min-width: 1.5rem;
  font-weight: bold;
}

.card-q-text { flex: 1; color: var(--phosphor); }

.card-toggle {
  color: var(--phosphor2);
  font-size: 0.7rem;
  min-width: 1.5rem;
  text-align: right;
  margin-top: 0.1rem;
  transition: transform 0.25s;
}
.card.open .card-toggle { transform: rotate(90deg); color: var(--phosphor); }

.card-a {
  display: none;
  padding: 0.7rem 1rem 0.9rem 3.3rem;
  font-size: 0.83rem;
  line-height: 1.75;
  color: #8be8aa;
  background: rgba(57,232,122,0.03);
  border-top: 1px solid var(--dim);
}
.card.open .card-a { display: block; }

/* ── Mnemonic ── */
.section.mnemonic .section-body {
  font-family: var(--font-ui);
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--amber);
  letter-spacing: 0.05em;
  text-align: center;
  padding: 1.5rem;
  text-shadow: 0 0 10px rgba(245,166,35,0.3);
}

/* ── Feynman FAB ── */
.fab {
  position: fixed;
  bottom: 2rem; right: 2rem;
  z-index: 500;
  background: var(--bg2);
  border: 1px solid var(--amber);
  color: var(--amber);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  padding: 0.7rem 1.1rem;
  cursor: pointer;
  border-radius: 2px;
  transition: background 0.2s, box-shadow 0.2s;
  box-shadow: 0 0 12px rgba(245,166,35,0.15);
}
.fab:hover {
  background: rgba(245,166,35,0.08);
  box-shadow: 0 0 20px rgba(245,166,35,0.3);
}

/* ── Feynman Modal ── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.88);
  z-index: 1500;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--bg2);
  border: 1px solid var(--amber);
  border-radius: 2px;
  padding: 2rem;
  max-width: 620px;
  width: 90%;
  position: relative;
}

.modal-label {
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  color: var(--amber);
  text-transform: uppercase;
  margin-bottom: 1rem;
}

.modal-question {
  font-family: var(--font-ui);
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--phosphor);
  line-height: 1.6;
  margin-bottom: 1.5rem;
}

.modal-input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--phosphor);
  font-family: var(--font-mono);
  font-size: 0.85rem;
  padding: 0.5rem 0;
  outline: none;
  margin-bottom: 1.2rem;
  caret-color: var(--phosphor);
}
.modal-input::placeholder { color: var(--dim); }

.modal-actions {
  display: flex;
  gap: 0.8rem;
  justify-content: flex-end;
}

.btn {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  padding: 0.5rem 1rem;
  border: 1px solid;
  border-radius: 2px;
  cursor: pointer;
  background: transparent;
  transition: background 0.2s;
}
.btn-reveal { border-color: var(--phosphor2); color: var(--phosphor2); }
.btn-reveal:hover { background: rgba(57,232,122,0.08); }
.btn-next   { border-color: var(--amber); color: var(--amber); }
.btn-next:hover { background: rgba(245,166,35,0.08); }
.btn-close  { border-color: var(--dim); color: var(--dim); }
.btn-close:hover { border-color: var(--phosphor2); color: var(--phosphor2); }

.modal-answer {
  display: none;
  font-size: 0.82rem;
  color: #8be8aa;
  line-height: 1.75;
  border-top: 1px solid var(--dim);
  margin-top: 0.5rem;
  padding-top: 0.8rem;
}
.modal-answer.show { display: block; }

/* scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

/* ── Theme / Settings buttons ── */
.theme-btn, .settings-btn {
  background: transparent;
  border: 1px solid var(--dim);
  color: var(--dim);
  font-family: var(--font-mono);
  font-size: 0.68rem;
  padding: 0.3rem 0.6rem;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s;
  letter-spacing: 0.08em;
}
.theme-btn { margin-left: auto; }
.theme-btn:hover, .settings-btn:hover { border-color: var(--phosphor2); color: var(--phosphor2); }
.settings-btn.active { border-color: var(--phosphor); color: var(--phosphor); }

/* ── Chat FAB ── */
.chat-fab {
  position: fixed;
  bottom: 2rem; right: 10.5rem;
  z-index: 500;
  background: var(--bg2);
  border: 1px solid var(--phosphor);
  color: var(--phosphor);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  padding: 0.7rem 1.1rem;
  cursor: pointer;
  border-radius: 2px;
  transition: background 0.2s, box-shadow 0.2s;
  box-shadow: 0 0 12px rgba(57,232,122,0.15);
}
.chat-fab:hover {
  background: rgba(57,232,122,0.08);
  box-shadow: 0 0 20px rgba(57,232,122,0.3);
}

/* ── Chat Panel ── */
.chat-panel {
  position: fixed;
  top: 0; right: -420px;
  width: 400px;
  height: 100vh;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  z-index: 800;
  display: flex;
  flex-direction: column;
  transition: right 0.3s ease;
}
.chat-panel.open { right: 0; }

.chat-panel-header {
  padding: 0.9rem 1rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.chat-panel-title {
  font-family: var(--font-ui);
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  color: var(--phosphor);
  text-transform: uppercase;
}
.chat-close-btn {
  background: transparent;
  border: none;
  color: var(--phosphor2);
  cursor: pointer;
  font-size: 0.85rem;
  font-family: var(--font-mono);
  padding: 0.2rem;
}
.chat-close-btn:hover { color: var(--phosphor); }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}
.chat-empty {
  color: var(--dim);
  font-size: 0.75rem;
  text-align: center;
  margin-top: 2rem;
  line-height: 1.8;
  letter-spacing: 0.05em;
}

.chat-msg {
  max-width: 88%;
  padding: 0.6rem 0.8rem;
  border-radius: 2px;
  font-size: 0.8rem;
  line-height: 1.65;
  word-break: break-word;
}
.chat-msg.user {
  align-self: flex-end;
  background: rgba(57,232,122,0.07);
  border: 1px solid var(--phosphor2);
  color: var(--phosphor);
}
.chat-msg.ai {
  align-self: flex-start;
  background: rgba(245,166,35,0.04);
  border: 1px solid rgba(245,166,35,0.25);
  color: #c8dac8;
  white-space: pre-wrap;
}

.chat-input-row {
  padding: 0.8rem 1rem;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 0.5rem;
  flex-shrink: 0;
}
.chat-input {
  flex: 1;
  background: transparent;
  border: 1px solid var(--dim);
  color: var(--phosphor);
  font-family: var(--font-mono);
  font-size: 0.78rem;
  padding: 0.45rem 0.7rem;
  outline: none;
  border-radius: 2px;
  caret-color: var(--phosphor);
}
.chat-input:focus { border-color: var(--phosphor2); }
.chat-input::placeholder { color: var(--dim); }
.chat-send-btn {
  background: transparent;
  border: 1px solid var(--phosphor2);
  color: var(--phosphor2);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  padding: 0.45rem 0.8rem;
  cursor: pointer;
  border-radius: 2px;
  transition: background 0.2s;
  white-space: nowrap;
}
.chat-send-btn:hover { background: rgba(57,232,122,0.08); }
.chat-send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* ── API Key Modal ── */
.apikey-modal {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.88);
  z-index: 2000;
  align-items: center;
  justify-content: center;
}
.apikey-modal.open { display: flex; }
.apikey-modal .modal { border-color: var(--phosphor); max-width: 480px; }
.apikey-input {
  width: 100%;
  background: transparent;
  border: 1px solid var(--dim);
  color: var(--phosphor);
  font-family: var(--font-mono);
  font-size: 0.78rem;
  padding: 0.5rem 0.7rem;
  outline: none;
  border-radius: 2px;
  margin-bottom: 0.6rem;
  caret-color: var(--phosphor);
}
.apikey-input:focus { border-color: var(--phosphor2); }
.apikey-hint {
  font-size: 0.68rem;
  color: var(--phosphor2);
  margin-bottom: 1.2rem;
  line-height: 1.6;
}
.apikey-status {
  font-size: 0.68rem;
  margin-bottom: 0.8rem;
  height: 1rem;
}
.apikey-status.ok  { color: var(--phosphor2); }
.apikey-status.err { color: #e87a7a; }

/* ── AI Score in Feynman ── */
.ai-feedback {
  display: none;
  margin-top: 0.8rem;
  padding: 0.7rem 0.9rem;
  border: 1px solid rgba(57,232,122,0.22);
  border-radius: 2px;
  font-size: 0.78rem;
  color: #b8e8c8;
  line-height: 1.72;
  background: rgba(57,232,122,0.03);
  white-space: pre-wrap;
  word-break: break-word;
}
.ai-feedback.show { display: block; }
.ai-feedback-label {
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  color: var(--phosphor2);
  margin-bottom: 0.5rem;
  text-transform: uppercase;
}

.btn-ai   { border-color: var(--phosphor); color: var(--phosphor); }
.btn-ai:hover { background: rgba(57,232,122,0.08); }
.btn-ai:disabled { opacity: 0.35; cursor: not-allowed; }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="header-top">
      <span class="tag">SERDES // IC DESIGN</span>
      <h1 class="title" id="note-title">—</h1>
      <button class="theme-btn" id="theme-btn">◐ THEME</button>
      <button class="settings-btn" id="settings-btn">⚙ API KEY</button>
    </div>
    <div class="date-line">
      <span id="note-date">—</span>
      <span id="note-src">—</span>
    </div>
  </div>

  <div class="image-wrap" id="img-wrap">
    <img class="note-img" id="note-img" src="" alt="筆記原圖">
  </div>

  <div id="sections-container"></div>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <img id="lb-img" src="" alt="">
</div>

<!-- Chat FAB -->
<button class="chat-fab" id="chat-btn">[ AI 問答 ]</button>

<!-- Feynman FAB -->
<button class="fab" id="feynman-btn">[ 費曼測試 ]</button>

<!-- API Key Modal -->
<div class="apikey-modal" id="apikey-modal">
  <div class="modal">
    <div class="modal-label">⚙ ANTHROPIC API KEY 設定</div>
    <p class="apikey-hint">Key 僅存於本機 localStorage，不上傳任何伺服器。<br>取得金鑰：<strong style="color:var(--phosphor)">aistudio.google.com</strong> → Get API key（免費）</p>
    <input type="password" class="apikey-input" id="apikey-input" placeholder="AIza...">
    <div class="apikey-status" id="apikey-status"></div>
    <div class="modal-actions">
      <button class="btn btn-close" id="apikey-close">✕ 取消</button>
      <button class="btn btn-next" id="apikey-save">✓ 儲存</button>
    </div>
  </div>
</div>

<!-- Chat Panel -->
<div class="chat-panel" id="chat-panel">
  <div class="chat-panel-header">
    <span class="chat-panel-title">◈ AI CHAT — gemini-2.5-flash</span>
    <button class="chat-close-btn" id="chat-close">✕</button>
  </div>
  <div class="chat-messages" id="chat-messages">

// ── NOTE_DATA injected by process_note.ps1 ──
const NOTE_DATA = {"date":"2026-04-03","title":"TIA-L1-P1","sections":[{"content":"光通訊接收端前段：光電二極體 (PhotoDiode) 與轉阻放大器 (TIA)","type":"intro"},{"title":"數學推導","content":"筆記中點出了 TIA 的核心功能是「converting current to voltage」，這裡我們來推導其背後的數學與物理關係：\r\n\r\n1. **光電轉換階段 (PD)：** \r\n   光電二極體 (PIN Diode) 接收到光信號後，入射光功率 $P_{opt}(t)$ 轉換為光電流 $I_{in}(t)$。\r\n   公式為：$I_{in}(t) = \\mathcal{R} \\cdot P_{opt}(t)$\r\n   *(這裡 $\\mathcal{R}$ 為響應度 Responsivity，代表每瓦特光功率能激發出多少安培的電流)*\r\n\r\n2. **I-V 轉換階段 (TIA)：**\r\n   TIA 負責將微弱的電流轉換為電壓。理想情況下，轉阻增益 (Transimpedance Gain) 定義為：\r\n   $R_T = \\frac{V_{out}}{I_{in}}$ \r\n   *(這就是為何筆記上特別標註增益的單位是 $\\Omega$)*\r\n\r\n3. **頻寬考量 (轉移函數)：**\r\n   實際上，TIA 輸入端會看到 PD 的接面電容 ($C_{PD}$)、Pad 電容 ($C_{pad}$) 與 TIA 本身的輸入電容 ($C_{in}$)。總電容 $C_{tot} = C_{PD} + C_{pad} + C_{in}$。\r\n   若以最簡單的理想負回授電阻 $R_F$ 模型來看，輸入阻抗 $R_{in} \\approx \\frac{R_F}{A}$ ($A$ 為核心放大器開迴路增益)。\r\n   整個系統的主極點 (Dominant Pole) 會落在輸入端：$\\omega_p = \\frac{1}{R_{in} C_{tot}} = \\frac{A}{R_F C_{tot}}$。\r\n   所以完整的轉移函數會是：\r\n   $Z_T(s) = \\frac{V_{out}(s)}{I_{in}(s)} = \\frac{R_T}{1 + \\frac{s}{\\omega_p}}$","type":"math"},{"title":"單位解析","content":"**公式單位消去：**\r\n1. **PD 光電轉換：**\r\n   $I_{in}\\text{[A]} = \\mathcal{R}\\text{[A/W]} \\times P_{opt}\\text{[W]}$\r\n   單位消去：$\\text{[A/W]} \\times \\text{[W]} = \\text{[A]}$ （光功率成功轉換為電流）\r\n2. **TIA 轉阻增益：**\r\n   $V_{out}\\text{[V]} = I_{in}\\text{[A]} \\times R_T\\text{[Ω]}$\r\n   單位消去：$\\text{[A]} \\times \\text{[V/A]} = \\text{[V]}$ （電流乘上阻抗，完美轉換成電壓）\r\n\r\n**圖表單位推斷：**\r\n雖然本頁筆記只有系統方塊圖 (Block Diagram) 與結構示意圖，無具體的 X-Y 曲線圖，但我們身為 IC Designer，必須能在腦中把各個節點的「波形圖」畫出來：\r\n📈 **圖表單位推斷：Optical RX 方塊圖各節點波形**\r\n- **PD 輸出 (TIA 輸入端波形)：**\r\n  - X 軸：時間 $\\text{[UI]}$ (Unit Interval) 或 $\\text{[ps]}$\r\n  - Y 軸：輸入光電流 $I_{in}$ $\\text{[\\mu A]}$，典型範圍為 $10 \\sim 100\\ \\mu\\text{A}$（非常微弱且通常為單端 Unipolar 訊號）。\r\n- **TIA 輸出波形：**\r\n  - X 軸：時間 $\\text{[UI]}$ 或 $\\text{[ps]}$\r\n  - Y 軸：單端電壓 $V_{TIA,out}$ $\\text{[mV]}$，典型範圍為數十至一百 $\\text{mV}_{pp}$（已經被轉換為小信號電壓）。\r\n- **LA 輸出波形 (眼圖 Eye Diagram)：**\r\n  - X 軸：時間 $\\text{[UI]}$，範圍通常看 $1 \\sim 2\\ \\text{UI}$。\r\n  - Y 軸：差動電壓信號 $\\text{[mV}_{ppd}\\text{]}$ 或 $\\text{[V}_{ppd}\\text{]}$，典型範圍約 $300 \\sim 500\\ \\text{mV}_{ppd}$，波形已被 Limit 成為飽和的方波，準備交給 CDR。","type":"units"},{"title":"白話物理意義","content":"TIA 就像是個極度敏感的「電流-電壓翻譯機」，把光電二極體吐出來微弱且吵雜的「電流語言」，瞬間低雜訊地翻譯成後端電路聽得懂、且有一定振幅的「電壓語言」。","type":"plain"},{"title":"生活化比喻","content":"想像 PD（光電二極體）是一個「小水車」，光子就像天上掉下來的雨滴。雨滴打在水車上，會產生微弱的旋轉水流（電流）。但是後面的大型工廠（CDR, DFE）需要的是穩定且強大的水壓（電壓）來推動重型機具。\r\nTIA 扮演的就是一個「高精密抽水馬達」，它負責承接這股微弱的小水流，將其轉換並放大成強大且穩定的水壓，同時確保轉換過程中不要混入太多的泥沙（Noise）。","type":"analogy"},{"title":"面試必考點","items":[{"question":"筆記中提到 PIN Diode 必須 \"Reverse-biased\" (逆向偏壓)，為什麼？","answer":"** 加大逆向偏壓有兩個致命好處。第一，能大幅拉寬空乏區 (Depletion region)，光子打進去產生電子電洞對的機率變高，提升光電轉換效率；第二，**逆向偏壓能有效降低 PD 的接面電容 ($C_{PD}$)**。因為 TIA 的頻寬極度受限於輸入端總電容 ($BW \\propto \\frac{1}{C_{tot}}$)，$C_{PD}$ 越小，高速運作的頻寬才能拉得越高。"},{"question":"在 TIA 設計中，為什麼筆記特別強調 \"Introducing minimal noise\"？Gain 和 Noise 有什麼 Trade-off？","answer":"** TIA 是整個 RX 鏈路的第一關，它的雜訊會被後面的級數無限放大 (Friis formula)。為了降低 Input-Referred Noise Current，我們通常希望把 TIA 的等效轉阻 ($R_T$) 做得**越大越好**（因為電阻的熱雜訊電流頻譜密度 $\\frac{4kT}{R_T}$ 與阻值成反比）；但無腦加大 $R_T$ 會導致輸入極點頻率下降，嚴重吃掉頻寬。這就是著名的 **Transimpedance Limit (Gain-Bandwidth-Noise Trade-off)**。"},{"question":"請解釋筆記方塊圖中，為什麼 TIA 後面需要接 \"Single to Diff\"，然後才是 \"CTLE + LA\"？","answer":"** PD 產生的光電流是單端 (Single-ended) 訊號，所以 TIA 的前端通常是單端架構。但高速信號在晶片內部傳輸非常容易受到 Supply Noise 跟 Common-mode Noise 的干擾，因此必須盡早透過 \"Single to Diff\" 電路轉成**差動訊號 (Differential)** 以提升抗雜訊能力。接著，**CTLE** 負責提供高頻 Peaking 補償走線造成的 ISI 衰減；最後由 **LA (Limiting Amplifier)** 提供極大增益，把類比小信號硬切 (Clipping) 成具有標準邏輯準位的方波，交給 CDR 萃取 Clock。"}],"type":"quiz"},{"content":"**「光打逆偏降電容，TIA 轉壓抗雜訊，單轉差動抗干擾，CTLE 補高頻，LA 放大切方波」**","type":"mnemonic"},{"title":"問題延伸","items":[{"question":"為何光電二極體 可以到好幾百Gbps","answer":"\u003e 提問時間：2026-04-03 21:51\n\nI see that the file you tried to attach (`@..\\..\\AppData\\Local\\Temp\\ask_note_prompt.txt`) wasn\u0027t loaded automatically. I\u0027ll attempt to read it directly from `C:\\Users\\siang\\AppData\\Local\\Temp\\ask_note_prompt.txt`.\r\nI couldn\u0027t read the file directly because it\u0027s outside my allowed workspace directories. I\u0027ll use the generalist agent to read its contents and figure out your request.\r\nI cannot read the prompt file because `C:\\Users\\siang\\AppData\\Local\\Temp\\ask_note_prompt.txt` is located outside of my allowed workspace directory (`C:\\Users\\siang\\Desktop\\SerDes`). For security reasons, I am restricted to reading and modifying files only within the designated workspace.\r\n\r\nSince I am running in a non-interactive environment, I cannot ask you for the contents directly. Please either move the `ask_note_prompt.txt` file into the `C:\\Users\\siang\\Desktop\\SerDes` directory and run the command again with the updated path, or pass the prompt text directly in your request."},{"question":"為何光電二極體 可以到好幾百Gbps","answer":"\u003e 提問時間：2026-04-03 21:53\n\n【直接回答問題】\r\n光電二極體 (Photodiode, PD) 能達到數百 Gbps 的極高頻寬，主因在於其**極微小的實體尺寸（受光面積極小）**搭配**強大的逆向偏壓 (Reverse Bias)**。這使得 PD 具備極低的接面電容 ($C_{PD}$) 與極短的載子傳輸時間 (Transit Time)，進而突破 RC 時間常數與物理傳輸的頻寬天花板。\r\n\r\n【物理意義與電路設計考量】\r\n1. **載子傳輸時間限制 (Transit Time Limit)：** \r\n   光子進入空乏區激發出電子-電洞對後，這些載子需要時間漂移至兩端電極。施加極高的逆向偏壓可以建立強大電場，迫使載子以「飽和漂移速度 (Saturation Velocity)」狂奔。此外，把空乏區 (Intrinsic layer) 做薄，能縮短傳輸距離，直接拉高頻寬。\r\n2. **RC 時間常數限制 (RC Time Constant Limit) 的 Trade-off：** \r\n   頻寬 $BW \\propto \\frac{1}{R_{eq}C_{PD}}$，由物理公式 $C_{PD} = \\frac{\\epsilon A}{d}$ 可知，縮小受光面積 ($A$) 能大幅降低電容。然而，若為了減少傳輸時間而把空乏區厚度 ($d$) 變薄，反而會導致電容上升。因此在先進光通訊中，厚度 $d$ 必須經過嚴格的 Trade-off 最佳化。\r\n3. **先進元件結構的助攻：** \r\n   為了打破上述的 Trade-off，數百 Gbps 的應用早已跳脫傳統的垂直入射型 (Surface-Illuminated) PIN Diode。目前多採用：\r\n   *   **單傳輸載子光電二極體 (UTC-PD, Uni-Traveling-Carrier PD)：** 巧妙地只利用移動速度極快（質量輕）的「電子」來主導光電流，屏棄了速度慢的「電洞」，使反應速度呈倍數成長。\r\n   *   **波導型光電二極體 (Waveguide PD)：** 讓光從元件「側邊」水平射入。這樣一來，光吸收的長度可以拉得很長（確保高響應度 $\\mathcal{R}$），但載子傳輸的距離依然保持極短（確保高頻寬），完美解耦了兩者的衝突。\r\n\r\n【面試官可能會追問的方向】\r\n1. **問題：「如果為了提升頻寬把 PD 的空乏區做得很薄，導致光吸收不完全、響應度 ($\\mathcal{R}$, Responsivity) 下降，在系統層面與電路層面該如何補救？」**\r\n   *   *回答切入點：* 元件層面可改用上述的 Waveguide PD；電路層面則必須依賴 TIA 提供更大的轉阻增益 ($R_T$)，但這又會面臨 Gain-Bandwidth-Noise 的極限拉扯，引出 TIA 設計的難點。\r\n2. **問題：「你提到 PD 有接面電容 $C_{PD}$，這對你設計下一級的 TIA 有什麼致命的影響？」**\r\n   *   *回答切入點：* $C_{PD}$ 除了會與 TIA 的輸入阻抗形成主極點限制總頻寬外，更致命的是它會在雜訊模型中造成 **High-frequency Noise Peaking**（TIA 的輸入參考雜訊電流在高頻會因為 $sC_{PD}$ 而急遽上升）。設計上必須在 TIA 內部使用電感峰化 (Inductive Peaking) 等頻寬擴展技術來應對。\r\n3. **問題：「對於 400G 或 800G 的光收發模組，你知道 PD 通常是吃什麼波長？對應什麼半導體材料嗎？」**\r\n   *   *回答切入點：* 長距/資料中心主流波長為 1310nm 或 1550nm，傳統使用三五族材料 **InGaAs**，或是近年熱門的矽光子 (Silicon Photonics) 採用的 **Ge-on-Si** (鍺磊晶於矽)；若是短距光纖 (搭配 VCSEL) 波長多為 850nm，則使用 **GaAs** 材料。"}],"type":"qa"}],"imageUrl":"../images/TIA-L1-P1.jpg"};

function renderUnits(text) {
  // Split into unit-block (公式消去) and chart-infer (圖表推斷) sub-blocks
  let html = mdToHtml(text);
  // Wrap lines starting with 📈 in chart-infer div
  html = html.replace(/<p>(📈[\s\S]*?)<\/p>/g, '<div class="chart-infer">$1</div>');
  // Wrap lines containing [X] × [Y] style unit derivations in unit-block div
  html = html.replace(/<p>([^<]*\[[\w\/]+\][^<]*=[^<]*)<\/p>/g, '<div class="unit-block">$1</div>');
  return html;
}

function renderQA(items) {
  if (!items || !items.length) return '<p style="color:var(--dim)">尚無延伸問題</p>';
  return items.map((q, i) => `
    <div class="qa-item">
      <div class="qa-item-q">Q${i+1}：${escHtml(q.question)}</div>
      <div class="qa-item-a">${mdToHtml(q.answer)}</div>
    </div>`).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function mdToHtml(text) {
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Numbered list items
  text = text.replace(/^(\d+)\.\s+(.+)$/gm, '<li>$2</li>');
  text = text.replace(/(<li>.*<\/li>\n?)+/gs, m => '<ol>' + m + '</ol>');
  // Bullet list items
  text = text.replace(/^\*\s+(.+)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>(?!.*<\/ol>).*<\/li>\n?)+/gs, m => '<ul>' + m + '</ul>');
  // Horizontal rule
  text = text.replace(/^---$/gm, '<hr style="border-color:var(--dim);margin:0.8rem 0">');
  // Paragraphs (split by double newline)
  text = text.split(/\n{2,}/).map(p => {
    p = p.trim();
    if (!p || p.startsWith('<ol>') || p.startsWith('<ul>') || p.startsWith('<hr')) return p;
    return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
  }).join('\n');
  return text;
}

// ════════════════════════════════════════════════
// Gemini API Integration (免費 tier)
// ════════════════════════════════════════════════

const GEMINI_MODEL = 'gemini-2.5-flash';
const GEMINI_API   = 'https://generativelanguage.googleapis.com/v1beta/models/' + GEMINI_MODEL + ':streamGenerateContent';

function getApiKey() { return localStorage.getItem('gemini_api_key') || ''; }
function setApiKey(k) { localStorage.setItem('gemini_api_key', k); }

function buildSystemPrompt() {
  let sys = `你是一位嚴格的 IC 設計助教，專精高速 SerDes / PLL / CDR / TIA 等電路設計（55nm及以下製程）。\n`;
  sys += `現在的學習筆記：${NOTE_DATA.title}（${NOTE_DATA.date}）\n\n`;
  sys += `以下是筆記的完整內容：\n`;
  NOTE_DATA.sections.forEach(sec => {
    if (sec.type === 'quiz') {
      sys += `\n## 面試必考點\n`;
      sec.items.forEach((q, i) => {
        sys += `Q${i+1}: ${q.question}\nA: ${q.answer}\n`;
      });
    } else if (sec.content) {
      const t = sec.title || ({ intro:'概覽', math:'數學推導', plain:'白話物理意義', analogy:'生活化比喻', mnemonic:'記憶口訣' })[sec.type] || sec.type;
      sys += `\n## ${t}\n${sec.content}\n`;
    }
  });
  sys += `\n請以繁體中文回答，精準且言簡意賅。`;
  return sys;
}

// Gemini 用 "model" 而非 "assistant"
function toGeminiHistory(messages) {
  return messages.map(m => ({
    role: m.role === 'assistant' ? 'model' : m.role,
    parts: [{ text: m.content }]
  }));
}

async function streamClaude(messages, onChunk, onDone, onError) {
  const apiKey = getApiKey();
  if (!apiKey) {
    document.getElementById('apikey-modal').classList.add('open');
    document.getElementById('apikey-input').focus();
    if (onError) onError('請先設定 Gemini API Key');
    return;
  }

  let resp;
  try {
    resp = await fetch(GEMINI_API + '?alt=sse&key=' + encodeURIComponent(apiKey), {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: buildSystemPrompt() }] },
        contents: toGeminiHistory(messages),
        generationConfig: { maxOutputTokens: 1024 }
      })
    });
  } catch (e) {
    if (onError) onError('網路錯誤：' + e.message);
    onDone();
    return;
  }

  if (!resp.ok) {
    let errMsg = resp.statusText;
    try { const j = await resp.json(); errMsg = j.error?.message || errMsg; } catch {}
    if (onError) onError('[' + resp.status + '] ' + errMsg);
    onDone();
    return;
  }

  const reader = resp.body.getReader();
  const dec = new TextDecoder();
  let buf = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const d = line.slice(6).trim();
      if (!d || d === '[DONE]') continue;
      try {
        const evt = JSON.parse(d);
        const text = evt.candidates?.[0]?.content?.parts?.[0]?.text;
        if (text) onChunk(text);
      } catch {}
    }
  }
  onDone();
}

// ── Settings Modal ──
const settingsBtn   = document.getElementById('settings-btn');
const apikeyModal   = document.getElementById('apikey-modal');
const apikeyInput   = document.getElementById('apikey-input');
const apikeyStatus  = document.getElementById('apikey-status');
const apikeyClose   = document.getElementById('apikey-close');
const apikeySave    = document.getElementById('apikey-save');

settingsBtn.addEventListener('click', () => {
  apikeyInput.value = getApiKey();
  apikeyStatus.textContent = getApiKey() ? '✓ 已設定' : '尚未設定';
  apikeyStatus.className = 'apikey-status ' + (getApiKey() ? 'ok' : 'err');
  apikeyModal.classList.add('open');
});

apikeySave.addEventListener('click', () => {
  const k = apikeyInput.value.trim();

  setApiKey(k);
  settingsBtn.classList.add('active');
  apikeyStatus.textContent = '✓ 已儲存';
  apikeyStatus.className = 'apikey-status ok';
  setTimeout(() => apikeyModal.classList.remove('open'), 700);
});

// ── Chat Panel ──
const chatBtn      = document.getElementById('chat-btn');
const chatPanel    = document.getElementById('chat-panel');
const chatClose    = document.getElementById('chat-close');
const chatMessages = document.getElementById('chat-messages');
const chatInput    = document.getElementById('chat-input');
const chatSend     = document.getElementById('chat-send');

let chatHistory = [];
let chatStreaming = false;

chatBtn.addEventListener('click', () => chatPanel.classList.toggle('open'));
chatClose.addEventListener('click', () => chatPanel.classList.remove('open'));

function appendChatMsg(role, text) {
  const empty = chatMessages.querySelector('.chat-empty');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.className = 'chat-msg ' + role;
  div.textContent = text;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  return div;
}

async function sendChat() {
  const q = chatInput.value.trim();
  if (!q || chatStreaming) return;
  chatInput.value = '';
  chatStreaming = true;
  chatSend.disabled = true;

  chatHistory.push({ role: 'user', content: q });
  appendChatMsg('user', q);

  const aiDiv = appendChatMsg('ai', '');
  let buf = '';

  await streamClaude(
    chatHistory,
    (chunk) => {
      buf += chunk;
      aiDiv.textContent = buf;
      chatMessages.scrollTop = chatMessages.scrollHeight;
    },
    () => {
      chatHistory.push({ role: 'assistant', content: buf });
      chatStreaming = false;
      chatSend.disabled = false;
      chatInput.focus();
    },
    (err) => {
      aiDiv.textContent = '⚠ ' + err;
      chatStreaming = false;
      chatSend.disabled = false;
    }
  );
}

chatSend.addEventListener('click', sendChat);
chatInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); } });

// ── AI Score in Feynman ──
const fmAiScore    = document.getElementById('fm-ai-score');
const aiFeedback   = document.getElementById('ai-feedback');
const aiFeedbackTx = document.getElementById('ai-feedback-text');
let aiScoring = false;

fmAiScore.addEventListener('click', async () => {
  const q = document.getElementById('fm-question').textContent;
  const userAns = document.getElementById('fm-input').value.trim();
  const correctAns = document.getElementById('fm-answer').textContent ||
    (NOTE_DATA.sections.find(s => s.type === 'quiz')?.items[window._fmIdx || 0]?.answer || '');

  if (!userAns) {
    aiFeedbackTx.textContent = '請先輸入你的答案。';
    aiFeedback.classList.add('show');
    return;
  }
  if (aiScoring) return;
  aiScoring = true;
  fmAiScore.disabled = true;

  aiFeedbackTx.textContent = '評分中...';
  aiFeedback.classList.add('show');
  let buf = '';

  const evalMessages = [{
    role: 'user',
    content: `問題：${q}\n\n學生的回答：${userAns}\n\n參考答案：${correctAns}\n\n請評分（1-10分）並給出具體改進建議，說明哪裡答對了、哪裡還不夠精確。請用繁體中文，簡潔有力。`
  }];

  await streamClaude(
    evalMessages,
    (chunk) => {
      buf += chunk;
      aiFeedbackTx.textContent = buf;
    },
    () => {
      aiScoring = false;
      fmAiScore.disabled = false;
    },
    (err) => {
      aiFeedbackTx.textContent = '⚠ ' + err;
      aiScoring = false;
      fmAiScore.disabled = false;
    }
  );
});

// reset AI feedback when question changes
const origShowFeynman = window._showFeynmanOrig;
document.getElementById('fm-next').addEventListener('click', () => {
  aiFeedback.classList.remove('show');
  aiFeedbackTx.textContent = '';
  fmAiScore.disabled = false;
  aiScoring = false;
}, true);
document.getElementById('fm-close').addEventListener('click', () => {
  aiFeedback.classList.remove('show');
  aiScoring = false;
  fmAiScore.disabled = false;
}, true);
</script>
