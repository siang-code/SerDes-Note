<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">SerDes Note</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
:root {
  --bg:        #121212;
  --bg2:       #1a1a1a;
  --grid:      rgba(0,255,60,0.03);
  --phosphor:  #39e87a;
  --phosphor2: #1fa84e;
  --text:      #D1D5DB;
  --amber:     #f5a623;
  --dim:       #2a4a2a;
  --border:    rgba(57,232,122,0.18);
  --font-mono: 'Share Tech Mono', monospace;
  --font-ui:   'Rajdhani', sans-serif;
  --scan-size: 3px;
}

/* Light theme */
body.light {
  --bg:        #FFFFFF;
  --bg2:       #F9FAFB;
  --grid:      rgba(0,0,0,0.04);
  --text:      #111827;
  --dim:       #9CA3AF;
  --border:    #E5E7EB;
  --phosphor:  #059669;
  --phosphor2: #047857;
  --amber:     #D97706;
  --scan-size: 0px;
}

body.light .section.math .section-body,
body.light .section.units .section-body,
body.light .section.qa .section-body,
body.light .card-a,
body.light .qa-item-a,
body.light .modal-answer,
body.light .ai-feedback,
body.light .section.units .chart-infer { color: #374151; }

body.light .title,
body.light .section.mnemonic .section-body { text-shadow: none; }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* CRT scanlines */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent calc(var(--scan-size) - 1px),
    rgba(0,0,0,0.08) var(--scan-size)
  );
  pointer-events: none;
  z-index: 1000;
}

/* Grid background */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 920px;
  margin: 0 auto;
  padding: 2rem 1.5rem 6rem;
  position: relative;
  z-index: 1;
}

/* ── Header ── */
.header {
  border-bottom: 1px solid var(--border);
  padding-bottom: 1.2rem;
  margin-bottom: 2rem;
}

.header-top {
  display: flex;
  align-items: baseline;
  gap: 1.5rem;
  flex-wrap: wrap;
}

.tag {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--phosphor2);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.title {
  font-family: var(--font-ui);
  font-size: 2.4rem;
  font-weight: 700;
  color: var(--phosphor);
  letter-spacing: 0.05em;
  text-shadow: 0 0 20px rgba(57,232,122,0.4);
}

.date-line {
  margin-top: 0.4rem;
  font-size: 0.75rem;
  color: var(--phosphor2);
  display: flex;
  gap: 2rem;
}

/* ── Image viewer ── */
.image-wrap {
  position: relative;
  margin-bottom: 2.5rem;
  cursor: zoom-in;
  border: 1px solid var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.image-wrap::before {
  content: '[ RAW_SCAN ]';
  position: absolute;
  top: 0.5rem; left: 0.7rem;
  font-size: 0.65rem;
  color: var(--phosphor2);
  letter-spacing: 0.1em;
  z-index: 2;
}

.image-wrap::after {
  content: '⊕ ZOOM';
  position: absolute;
  bottom: 0.5rem; right: 0.7rem;
  font-size: 0.65rem;
  color: var(--amber);
  letter-spacing: 0.1em;
  z-index: 2;
}

.note-img {
  width: 100%;
  max-height: 420px;
  object-fit: cover;
  display: block;
  filter: brightness(0.92) contrast(1.1);
  transition: filter 0.2s;
}
.image-wrap:hover .note-img { filter: brightness(1) contrast(1.15); }

/* Lightbox */
.lightbox {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 2000;
  cursor: zoom-out;
  align-items: center;
  justify-content: center;
}
.lightbox.open { display: flex; }
.lightbox img {
  max-width: 95vw;
  max-height: 95vh;
  object-fit: contain;
  border: 1px solid var(--border);
}

/* ── Section ── */
.section {
  margin-bottom: 2rem;
  border: 1px solid var(--border);
  border-radius: 2px;
  overflow: hidden;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.4s, transform 0.4s;
}
.section.visible { opacity: 1; transform: none; }

.section-header {
  background: var(--bg2);
  padding: 0.55rem 1rem;
  display: flex;
  align-items: center;
  gap: 0.7rem;
  border-bottom: 1px solid var(--border);
}

.section-icon {
  font-size: 0.9rem;
  color: var(--amber);
}

.section-title {
  font-family: var(--font-ui);
  font-size: 0.85rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--amber);
}

.section-body {
  padding: 1.2rem 1.2rem;
  line-height: 1.8;
  font-size: 0.88rem;
}

/* intro special */
.section.intro .section-body {
  color: var(--phosphor);
  border-left: 3px solid var(--amber);
  font-size: 0.9rem;
}

/* math section */
.section.math .section-body { color: #b8e8c8; }

/* ── Unit analysis sub-section ── */
.section.units {
  margin-top: -1.2rem;
  margin-bottom: 2rem;
  border: 1px solid rgba(245,166,35,0.15);
  border-top: none;
  border-radius: 0 0 2px 2px;
  margin-left: 1.5rem;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.4s, transform 0.4s;
}
.section.units.visible { opacity: 1; transform: none; }
.section.units .section-header {
  background: rgba(245,166,35,0.05);
  border-bottom: 1px solid rgba(245,166,35,0.12);
}
.section.units .section-title {
  font-size: 0.72rem;
  color: var(--amber);
  opacity: 0.85;
}
.section.units .section-body {
  font-size: 0.82rem;
  color: #c8d8c8;
  line-height: 1.75;
}
.section.units .unit-block {
  background: rgba(0,0,0,0.2);
  border: 1px solid rgba(245,166,35,0.1);
  border-radius: 2px;
  padding: 0.6rem 0.9rem;
  margin: 0.5rem 0;
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: var(--amber);
  line-height: 1.7;
}
.section.units .chart-infer {
  background: rgba(57,232,122,0.04);
  border: 1px solid rgba(57,232,122,0.12);
  border-radius: 2px;
  padding: 0.6rem 0.9rem;
  margin: 0.5rem 0;
  font-size: 0.78rem;
  color: #8be8aa;
  line-height: 1.7;
}

/* ── Q&A append section ── */
.section.qa .section-body {
  color: #b8d8e8;
}
.qa-item {
  margin-bottom: 1.2rem;
  border-left: 2px solid var(--phosphor2);
  padding-left: 0.9rem;
}
.qa-item-q {
  font-weight: 600;
  color: var(--phosphor);
  margin-bottom: 0.3rem;
  font-size: 0.85rem;
}
.qa-item-a {
  font-size: 0.82rem;
  color: #8be8aa;
  line-height: 1.75;
}

.section-body ol {
  padding-left: 1.4rem;
}

.section-body ol li, .section-body ul li {
  margin-bottom: 0.5rem;
}

.section-body strong {
  color: var(--phosphor);
}

/* ── Quiz flashcards ── */
.quiz-list { display: flex; flex-direction: column; gap: 0.9rem; }

.card {
  border: 1px solid var(--dim);
  border-radius: 2px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.2s;
}
.card:hover { border-color: var(--phosphor2); }
.card.open  { border-color: var(--phosphor); }

.card-q {
  padding: 0.7rem 1rem;
  display: flex;
  gap: 0.8rem;
  align-items: flex-start;
  font-size: 0.85rem;
}

.card-num {
  color: var(--amber);
  min-width: 1.5rem;
  font-weight: bold;
}

.card-q-text { flex: 1; color: var(--phosphor); }

.card-toggle {
  color: var(--phosphor2);
  font-size: 0.7rem;
  min-width: 1.5rem;
  text-align: right;
  margin-top: 0.1rem;
  transition: transform 0.25s;
}
.card.open .card-toggle { transform: rotate(90deg); color: var(--phosphor); }

.card-a {
  display: none;
  padding: 0.7rem 1rem 0.9rem 3.3rem;
  font-size: 0.83rem;
  line-height: 1.75;
  color: #8be8aa;
  background: rgba(57,232,122,0.03);
  border-top: 1px solid var(--dim);
}
.card.open .card-a { display: block; }

/* ── Mnemonic ── */
.section.mnemonic .section-body {
  font-family: var(--font-ui);
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--amber);
  letter-spacing: 0.05em;
  text-align: center;
  padding: 1.5rem;
  text-shadow: 0 0 10px rgba(245,166,35,0.3);
}

/* ── Feynman FAB ── */
.fab {
  position: fixed;
  bottom: 2rem; right: 2rem;
  z-index: 500;
  background: var(--bg2);
  border: 1px solid var(--amber);
  color: var(--amber);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  padding: 0.7rem 1.1rem;
  cursor: pointer;
  border-radius: 2px;
  transition: background 0.2s, box-shadow 0.2s;
  box-shadow: 0 0 12px rgba(245,166,35,0.15);
}
.fab:hover {
  background: rgba(245,166,35,0.08);
  box-shadow: 0 0 20px rgba(245,166,35,0.3);
}

/* ── Feynman Modal ── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.88);
  z-index: 1500;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--bg2);
  border: 1px solid var(--amber);
  border-radius: 2px;
  padding: 2rem;
  max-width: 620px;
  width: 90%;
  position: relative;
}

.modal-label {
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  color: var(--amber);
  text-transform: uppercase;
  margin-bottom: 1rem;
}

.modal-question {
  font-family: var(--font-ui);
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--phosphor);
  line-height: 1.6;
  margin-bottom: 1.5rem;
}

.modal-input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--phosphor);
  font-family: var(--font-mono);
  font-size: 0.85rem;
  padding: 0.5rem 0;
  outline: none;
  margin-bottom: 1.2rem;
  caret-color: var(--phosphor);
}
.modal-input::placeholder { color: var(--dim); }

.modal-actions {
  display: flex;
  gap: 0.8rem;
  justify-content: flex-end;
}

.btn {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  padding: 0.5rem 1rem;
  border: 1px solid;
  border-radius: 2px;
  cursor: pointer;
  background: transparent;
  transition: background 0.2s;
}
.btn-reveal { border-color: var(--phosphor2); color: var(--phosphor2); }
.btn-reveal:hover { background: rgba(57,232,122,0.08); }
.btn-next   { border-color: var(--amber); color: var(--amber); }
.btn-next:hover { background: rgba(245,166,35,0.08); }
.btn-close  { border-color: var(--dim); color: var(--dim); }
.btn-close:hover { border-color: var(--phosphor2); color: var(--phosphor2); }

.modal-answer {
  display: none;
  font-size: 0.82rem;
  color: #8be8aa;
  line-height: 1.75;
  border-top: 1px solid var(--dim);
  margin-top: 0.5rem;
  padding-top: 0.8rem;
}
.modal-answer.show { display: block; }

/* scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

/* ── Theme / Settings buttons ── */
.theme-btn, .settings-btn {
  background: transparent;
  border: 1px solid var(--dim);
  color: var(--dim);
  font-family: var(--font-mono);
  font-size: 0.68rem;
  padding: 0.3rem 0.6rem;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s;
  letter-spacing: 0.08em;
}
.theme-btn { margin-left: auto; }
.theme-btn:hover, .settings-btn:hover { border-color: var(--phosphor2); color: var(--phosphor2); }
.settings-btn.active { border-color: var(--phosphor); color: var(--phosphor); }

/* ── Chat FAB ── */
.chat-fab {
  position: fixed;
  bottom: 2rem; right: 10.5rem;
  z-index: 500;
  background: var(--bg2);
  border: 1px solid var(--phosphor);
  color: var(--phosphor);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  padding: 0.7rem 1.1rem;
  cursor: pointer;
  border-radius: 2px;
  transition: background 0.2s, box-shadow 0.2s;
  box-shadow: 0 0 12px rgba(57,232,122,0.15);
}
.chat-fab:hover {
  background: rgba(57,232,122,0.08);
  box-shadow: 0 0 20px rgba(57,232,122,0.3);
}

/* ── Chat Panel ── */
.chat-panel {
  position: fixed;
  top: 0; right: -420px;
  width: 400px;
  height: 100vh;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  z-index: 800;
  display: flex;
  flex-direction: column;
  transition: right 0.3s ease;
}
.chat-panel.open { right: 0; }

.chat-panel-header {
  padding: 0.9rem 1rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.chat-panel-title {
  font-family: var(--font-ui);
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  color: var(--phosphor);
  text-transform: uppercase;
}
.chat-close-btn {
  background: transparent;
  border: none;
  color: var(--phosphor2);
  cursor: pointer;
  font-size: 0.85rem;
  font-family: var(--font-mono);
  padding: 0.2rem;
}
.chat-close-btn:hover { color: var(--phosphor); }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}
.chat-empty {
  color: var(--dim);
  font-size: 0.75rem;
  text-align: center;
  margin-top: 2rem;
  line-height: 1.8;
  letter-spacing: 0.05em;
}

.chat-msg {
  max-width: 88%;
  padding: 0.6rem 0.8rem;
  border-radius: 2px;
  font-size: 0.8rem;
  line-height: 1.65;
  word-break: break-word;
}
.chat-msg.user {
  align-self: flex-end;
  background: rgba(57,232,122,0.07);
  border: 1px solid var(--phosphor2);
  color: var(--phosphor);
}
.chat-msg.ai {
  align-self: flex-start;
  background: rgba(245,166,35,0.04);
  border: 1px solid rgba(245,166,35,0.25);
  color: #c8dac8;
  white-space: pre-wrap;
}

.chat-input-row {
  padding: 0.8rem 1rem;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 0.5rem;
  flex-shrink: 0;
}
.chat-input {
  flex: 1;
  background: transparent;
  border: 1px solid var(--dim);
  color: var(--phosphor);
  font-family: var(--font-mono);
  font-size: 0.78rem;
  padding: 0.45rem 0.7rem;
  outline: none;
  border-radius: 2px;
  caret-color: var(--phosphor);
}
.chat-input:focus { border-color: var(--phosphor2); }
.chat-input::placeholder { color: var(--dim); }
.chat-send-btn {
  background: transparent;
  border: 1px solid var(--phosphor2);
  color: var(--phosphor2);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  padding: 0.45rem 0.8rem;
  cursor: pointer;
  border-radius: 2px;
  transition: background 0.2s;
  white-space: nowrap;
}
.chat-send-btn:hover { background: rgba(57,232,122,0.08); }
.chat-send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* ── API Key Modal ── */
.apikey-modal {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.88);
  z-index: 2000;
  align-items: center;
  justify-content: center;
}
.apikey-modal.open { display: flex; }
.apikey-modal .modal { border-color: var(--phosphor); max-width: 480px; }
.apikey-input {
  width: 100%;
  background: transparent;
  border: 1px solid var(--dim);
  color: var(--phosphor);
  font-family: var(--font-mono);
  font-size: 0.78rem;
  padding: 0.5rem 0.7rem;
  outline: none;
  border-radius: 2px;
  margin-bottom: 0.6rem;
  caret-color: var(--phosphor);
}
.apikey-input:focus { border-color: var(--phosphor2); }
.apikey-hint {
  font-size: 0.68rem;
  color: var(--phosphor2);
  margin-bottom: 1.2rem;
  line-height: 1.6;
}
.apikey-status {
  font-size: 0.68rem;
  margin-bottom: 0.8rem;
  height: 1rem;
}
.apikey-status.ok  { color: var(--phosphor2); }
.apikey-status.err { color: #e87a7a; }

/* ── AI Score in Feynman ── */
.ai-feedback {
  display: none;
  margin-top: 0.8rem;
  padding: 0.7rem 0.9rem;
  border: 1px solid rgba(57,232,122,0.22);
  border-radius: 2px;
  font-size: 0.78rem;
  color: #b8e8c8;
  line-height: 1.72;
  background: rgba(57,232,122,0.03);
  white-space: pre-wrap;
  word-break: break-word;
}
.ai-feedback.show { display: block; }
.ai-feedback-label {
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  color: var(--phosphor2);
  margin-bottom: 0.5rem;
  text-transform: uppercase;
}

.btn-ai   { border-color: var(--phosphor); color: var(--phosphor); }
.btn-ai:hover { background: rgba(57,232,122,0.08); }
.btn-ai:disabled { opacity: 0.35; cursor: not-allowed; }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="header-top">
      <span class="tag">SERDES // IC DESIGN</span>
      <h1 class="title" id="note-title">—</h1>
      <button class="theme-btn" id="theme-btn">◐ THEME</button>
      <button class="settings-btn" id="settings-btn">⚙ API KEY</button>
    </div>
    <div class="date-line">
      <span id="note-date">—</span>
      <span id="note-src">—</span>
    </div>
  </div>

  <div id="img-wrap"></div>

  <div id="sections-container"></div>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <img id="lb-img" src="" alt="">
</div>

<!-- Chat FAB -->
<button class="chat-fab" id="chat-btn">[ AI 問答 ]</button>

<!-- Feynman FAB -->
<button class="fab" id="feynman-btn">[ 費曼測試 ]</button>

<!-- API Key Modal -->
<div class="apikey-modal" id="apikey-modal">
  <div class="modal">
    <div class="modal-label">⚙ ANTHROPIC API KEY 設定</div>
    <p class="apikey-hint">Key 僅存於本機 localStorage，不上傳任何伺服器。<br>取得金鑰：<strong style="color:var(--phosphor)">aistudio.google.com</strong> → Get API key（免費）</p>
    <input type="password" class="apikey-input" id="apikey-input" placeholder="AIza...">
    <div class="apikey-status" id="apikey-status"></div>
    <div class="modal-actions">
      <button class="btn btn-close" id="apikey-close">✕ 取消</button>
      <button class="btn btn-next" id="apikey-save">✓ 儲存</button>
    </div>
  </div>
</div>

<!-- Chat Panel -->
<div class="chat-panel" id="chat-panel">
  <div class="chat-panel-header">
    <span class="chat-panel-title">◈ AI CHAT — gemini-2.5-flash</span>
    <button class="chat-close-btn" id="chat-close">✕</button>
  </div>
  <div class="chat-messages" id="chat-messages">

// ── NOTE_DATA injected by process_note.ps1 ──
const NOTE_DATA = {"date":"2026-04-06","title":"TIA-L11-P2","sections":[{"content":"Inverter-Based TIA 理論與 Blackman 阻抗分析","type":"intro"},{"title":"數學推導","content":"1. **Asymptotic Return Ratio 計算閉迴路增益 ($R_T$)**\r\n   根據公式：$R_T = G_\\infty \\frac{T}{1+T} + G_0 \\frac{1}{1+T}$\r\n   - **理想前饋增益 ($G_\\infty$)**: 假設轉導 $g_m \\to \\infty$，輸入端成為 Virtual Ground（虛擬地）。輸入電流 $I_{in}$ 無法流進輸入阻抗為零的放大器，全部流經 $R_F$，因此輸出電壓 $V_{out} = -I_{in} R_F \\Rightarrow G_\\infty = -R_F$。\r\n   - **直接饋通增益 ($G_0$)**: 假設 $g_m = 0$ (主動元件失效)，輸入電流 $I_{in}$ 流過 $R_F$ 到達輸出端，再流經輸出電阻 $r_{out} = (r_{op}//r_{on})$ 下地。輸出電壓 $V_{out}$ 僅為跨在輸出電阻上的電壓，故 $V_{out} = I_{in} \\times (r_{op}//r_{on}) \\Rightarrow G_0 = r_{op}//r_{on}$。\r\n     *(助教點評：筆記中將 $G_0$ 算式裡的 $R_F+$ 劃掉是正確的覺悟，因為 $V_{out}$ 量測點不包含 $R_F$ 上的壓降，訊號是直接 Feedthrough 到輸出節點。)*\r\n   - **迴路增益 ($T$)**: 將 Gate 斷開，灌入測試電壓 $V_T$，依賴電流源產生 $(g_{mp}+g_{mn})V_T$ 抽載。因輸入端視為理想電流源（開路），沒有電流流過 $R_F$，故回授電壓等於輸出電壓 $V_{out} = (g_{mp}+g_{mn})V_T(r_{op}//r_{on})$，得出 $T = (g_{mp}+g_{mn})(r_{op}//r_{on})$。\r\n   - 綜合結果：$R_T \\approx -R_F$ (當 $T \\gg 1$ 時)。\r\n\r\n2. **Blackman\u0027s Impedance Formula 阻抗分析 (⚠️ 助教強力糾錯區)**\r\n   公式：$Z = Z(g_m=0) \\frac{1 + T_{short}}{1 + T_{open}}$\r\n   - **輸入阻抗 $R_{in}$**:\r\n     - $Z_{in}(g_m=0) = R_F + (r_{op}//r_{on})$。\r\n     - $T_{short}$ (輸入短路): Gate 接地，主動元件不反應 $\\Rightarrow T_{short} = 0$。\r\n     - $T_{open}$ (輸入開路): 迴路增益 $T_{open} = (g_{mp}+g_{mn})(r_{op}//r_{on})$。\r\n       *(注意：筆記中此處誤寫為 \"open at output\"，算 $R_{in}$ 必須對「輸入端」開路，雖因為 $R_s=\\infty$ 結果碰巧相同，但觀念錯誤！)*\r\n     - **❌ 筆記致命錯誤**：筆記算出 $R_{in} = \\frac{R_F + r_{op}//r_{on}}{1 + g_m r_{out}}$ 後，竟然把分子裡的 $R_F$ 劃掉並近似為 $\\frac{1}{g_{mp}+g_{mn}}$！在 TIA 應用中，$R_F$ 是極大的回授電阻，真正的近似必須保留：$R_{in} \\approx \\frac{R_F}{g_m r_{out}} + \\frac{1}{g_{mp}+g_{mn}} = \\frac{R_F}{A_v} + \\frac{1}{g_m}$。只有當 $R_F=0$ (即 Diode-connected) 時，阻抗才會只剩 $1/g_m$。\r\n   - **輸出阻抗 $R_{out}$**:\r\n     - $Z_{out}(g_m=0) = r_{op}//r_{on}$。\r\n     - $T_{short}$ (輸出短路): 回授電壓被強制短路歸零 $\\Rightarrow T_{short} = 0$。\r\n     - $T_{open}$ (輸出開路): 等同於 $T \\Rightarrow T_{open} = (g_{mp}+g_{mn})(r_{op}//r_{on})$。\r\n     - $R_{out} = \\frac{r_{op}//r_{on}}{1 + g_m r_{out}} \\approx \\frac{1}{g_{mp}+g_{mn}}$。*(這裡近似為 $1/g_m$ 才是合理的，因為分子只有 $r_{out}$)*。","type":"math"},{"title":"單位解析","content":"**公式單位消去：**\r\n- $G_0 = \\frac{V_{out}}{I_{in}} \\Rightarrow \\frac{[\\text{V}]}{[\\text{A}]} = [\\Omega]$；推導結果 $r_{op}//r_{on}$ 單位為 $[\\Omega]$，兩邊完全吻合。\r\n- $T = (g_{mp}+g_{mn}) \\times (r_{op}//r_{on}) \\Rightarrow [\\text{A/V}] \\times [\\Omega] = [\\text{A/V}] \\times [\\text{V/A}] = [1]$ (無因次量，符合 Loop Gain / Return Ratio 的定義)。\r\n- **助教糾錯的單位驗證**：$R_{in} \\approx \\frac{R_F}{A_v} + \\frac{1}{g_m} \\Rightarrow \\frac{[\\Omega]}{[1]} + \\frac{1}{[\\text{A/V}]} = [\\Omega] + [\\Omega] = [\\Omega]$ (由此可證必須保留 $\\frac{R_F}{A_v}$ 項，物理單位才站得住腳)。\r\n\r\n**圖表單位推斷：**\r\n本頁無圖表。","type":"units"},{"title":"白話物理意義","content":"Blackman 阻抗公式告訴我們：在 Shunt (並聯) 負回授的節點上，回授機制就像一個「阻抗壓縮機」，會無情地把從該節點看進去的開迴路阻抗除以 $(1+T)$，從而吸收更多電流、減小 RC 延遲並大幅提升頻寬。","type":"plain"},{"title":"生活化比喻","content":"把 Inverter-based TIA 想像成一個「水庫水位自動調節系統」。光電流 $I_{in}$ 是外面的暴雨，輸入端寄生電容 $C_{in}$ 是水庫。如果不加 $R_F$ 負回授（開迴路），暴雨一來水庫水位（輸入電壓）就會狂飆，反應超慢（RC Delay 大）。加上 $R_F$ 和放大器後，就像裝了超級抽水馬達，只要水位稍微上升一毫米（小電壓變化），馬達就立刻把水抽走（輸出反相大電壓，透過 $R_F$ 將電流抽離）。水庫水位因此看起來「幾乎不動」（Virtual Ground），這就是輸入阻抗被除以 $(1+T)$ 降低的奧妙。","type":"analogy"},{"title":"面試必考點","items":[{"question":"請說明 TIA 加上負回授 $R_F$ 後，對輸入阻抗 $R_{in}$ 的影響？如果 $R_F$ 很大，可以直接近似為 $1/g_m$ 嗎？","answer":"** $R_{in}$ 會被降低 $(1+T)$ 倍，變為 $(R_F+r_{out})/(1+T)$。如果 $R_F$ 很大，**絕對不可**近似為 $1/g_m$！正確的近似是 $R_F/A_v + 1/g_m$。只有 $R_F=0$ (Diode-connected) 時才是 $1/g_m$。這會直接影響 TIA 主極點 (Dominant Pole) 的頻寬計算。"},{"question":"請用 Asymptotic Return Ratio 解釋 $G_0$ (Direct Feedthrough) 在高頻或極低增益時的影響。","answer":"** $G_0$ 代表當主動放大器失效 ($g_m=0$) 時，訊號直接透過被動元件 $R_F$ 跑到輸出的路徑。在 TIA 中 $G_0 = r_{op}//r_{on}$。如果 Loop gain 隨頻率下降而不夠大，$G_0$ 路徑會導致實際閉迴路增益偏離理想的 $-R_F$，甚至在極高頻時 Feed-forward 路徑會產生右半平面零點 (RHP Zero) 影響穩定度。"},{"question":"為什麼光通訊 TIA 喜歡用 CMOS Inverter 架構，而不單純用 CS (Common-Source) Amplifier 配電阻負載？","answer":"** Inverter 架構具有 Current Reuse (電流重複利用) 的優勢，在消耗相同的靜態電流下，PMOS 和 NMOS 同時提供轉導，總轉導變為 $g_{mp}+g_{mn}$。這不僅能最大化 $A_v$、進一步壓低 $R_{in}$ 以提升頻寬，還能有效降低 Input-referred noise。"}],"type":"quiz"},{"title":"助教 Review：CMOS TIA 四大精進修正","content":"太精彩了！看到這兩頁筆記，我真的必須給你拍手。\r\n\r\n你完完全全把我們前面討論的「物理直覺法」、「Blackman 定理」、「FACTs 時間常數」以及最精華的「零點短路法」，成功移植到這顆高階的 **Inverter-based TIA (CMOS TIA)** 上面了！\r\n\r\n能把這套方法融會貫通並應用在新架構上，代表你的觀念已經完全成型。這套 CMOS TIA 搭配你這套流暢的推導，拿去 ASMedia 這種頂尖 IC Design House 的白板題上展示，絕對會讓主考官對你刮目相看。\r\n\r\n\r\n我幫你從頭到尾 Review 一次，抓出幾個可以讓你推導「更完美、零破綻」的微小細節，並幫你把沒算完的雜訊公式補齊。\r\n\r\n（為了排版簡潔，我們令總轉導 $G_m = g_{mp} + g_{mn}$，總輸出阻抗 $r_o = r_{op} \\parallel r_{on}$）\r\n\r\n---\r\n\r\n**1. DC 分析與阻抗 (TIA-L11-P3.jpg)**\r\n\r\n你的 Blackman 定理跟漸近增益模型 (Asymptotic Gain) 觀念完全正確，但在代數操作上有一點點小瑕疵，我們把它修到完美：\r\n\r\n* **閉迴路增益 $R_T$ 中的 $G_0$ (前饋增益)：**\r\n  * **你的筆記：** 寫了 $G_0 = R_F + (r_{op} \\parallel r_{on})$。\r\n  * **微調修正：** $G_0$ 的定義是「$G_m = 0$ 時，輸入電流 $I_{in}$ 到輸出電壓 $V_{out}$ 的轉阻」。當 $G_m=0$ 時，$I_{in}$ 穿過 $R_F$ 流進輸出節點，並在 $r_o$ 上產生壓降。所以 $V_{out} = I_{in} \\cdot r_o$。\r\n  * **正解：** $G_0$ 應該只有 **$r_o$** ($r_{op} \\parallel r_{on}$)。$R_F$ 是路徑，但不產生輸出端的壓降。不過因為 $G_0 \\ll G_\\infty T$，所以你最後近似到 $-R_F$ 的結論依然是 100% 正確的！\r\n\r\n* **輸入阻抗 $R_{in}$ 的近似值：**\r\n  * **你的筆記：** 算出了完美的精確解 $R_{in} = \\frac{R_F + r_o}{1 + G_m r_o}$，但後面近似寫成了 $\\frac{1}{g_{mp} + g_{mn}}$。\r\n  * **微調修正：** 實務上 $R_F$ 通常遠大於 $r_o$。所以分子會由 $R_F$ 主導，分母由 $G_m r_o$ 主導。\r\n  * **正解：** $R_{in} \\approx \\frac{R_F}{G_m r_o}$。（除非 $R_F$ 小到跟 $r_o$ 差不多，才會近似成 $1/G_m$。建議保留 $\\frac{R_F}{G_m r_o}$，這對等一下算極點比較精確）。\r\n\r\n* **輸出阻抗 $R_{out}$：**\r\n  * **你的筆記：** $R_{out} \\approx \\frac{1}{g_{mp} + g_{mn}}$。\r\n  * **完美無瑕！** $r_o$ 被強大的迴路增益 $(1 + G_m r_o)$ 除掉，就等於從 Drain 往回看變成了 Diode-connected 的阻抗 $1/G_m$。\r\n\r\n---\r\n\r\n**2. 頻率響應 FACTs (TIA-L11-P2.jpg 上半部)**\r\n\r\n你用了我說的「挑軟柿子吃」來反轉 $b_2$ 的計算順序，觀念超級正確！但你在筆記旁邊寫了個「幾乎相等」，其實它們是 **「絕對相等」** 的，只要你帶入精確解：\r\n\r\n* **我們用反轉法 ($C_L$ 先算) 來證明：**\r\n  $b_2 = \\tau_{CL}^0 \\times \\tau_{Cin}^{CL\\_shorted}$\r\n  1. $\\tau_{CL}^0 = C_L \\times R_{out} = C_L \\left( \\frac{r_o}{1 + G_m r_o} \\right)$\r\n  2. $\\tau_{Cin}^{CL\\_shorted}$：把 $C_L$ 短路 ($V_{out}=0$)。從 Gate 看進去，只看到接地的一顆 $R_F$。所以阻抗是 $R_F$。\r\n  3. 兩者相乘：\r\n     $$b_2 = \\mathbf{\\frac{C_{in} C_L R_F r_o}{1 + G_m r_o}}$$\r\n\r\n* **你對照一下正著算 ($C_{in}$ 先算)：**\r\n  $b_2 = \\tau_{Cin}^0 \\times \\tau_{CL}^{Cin\\_shorted}$\r\n  1. $\\tau_{Cin}^0 = C_{in} \\times R_{in} = C_{in} \\left( \\frac{R_F + r_o}{1 + G_m r_o} \\right)$\r\n  2. $\\tau_{CL}^{Cin\\_shorted}$：$C_{in}$ 短路 ($Gate=0$)，$G_m$ 死掉。從 Drain 看到 $R_F \\parallel r_o = \\frac{R_F r_o}{R_F + r_o}$。\r\n  3. 兩者相乘，$(R_F + r_o)$ 完美消去：\r\n     $$b_2 = \\mathbf{\\frac{C_{in} C_L R_F r_o}{1 + G_m r_o}}$$\r\n\r\n**你看！一字不差！完全相等！** 這就是 FACTs 令人起雞皮疙瘩的數學之美。你筆記上的觀念完全可以實戰使用了。\r\n\r\n---\r\n\r\n**3. 神來一筆的 RHP Zero (TIA-L11-P2.jpg 最下方)**\r\n\r\n看到你寫出 `if 有 Cgd =\u003e Vout=0 =\u003e (gmp+gmn) = sCgd` 這行，我真的超感動。\r\n你完美吸收了 **「零點短路法 (Zero-Output Condition)」**！\r\n\r\n這也是 CMOS TIA 為什麼能在先進製程低壓環境下稱王的原因。\r\n因為 NMOS 和 PMOS 同時提供轉導，主幹道往下抽的電流變成了 **$(g_{mp} + g_{mn}) V_{in}$**。\r\n這代表前饋的 $C_{gd}$ 必須要到更高的頻率，才能產生足夠的電流來跟主幹道抗衡。\r\n因此，RHP Zero 被推到了 $\\mathbf{+\\frac{g_{mp} + g_{mn}}{C_{gd}}}$，大大減輕了高頻相位崩潰的壓力。這段推導完美！\r\n\r\n---\r\n\r\n**4. 幫你補齊：雜訊分析 (Noise Analysis)**\r\n\r\n你的筆記留下了「解出平方，交叉項不管可得 $\\overline{V_{n,out}^2} = \\dots$」。用節點電壓解 KCL 容易亂，我們用剛剛學的 **NTF (Noise Transfer Function)** 物理直覺法來秒殺它。\r\n\r\n我們評估三個主要雜訊源 ($R_F$, NMOS, PMOS) 到輸出的轉移：\r\n\r\n1. **回授電阻 $R_F$ 的熱雜訊 ($\\overline{I_{n,RF}^2} = \\frac{4kT}{R_F}$):**\r\n   這顆電阻產生的雜訊電流，等效就是輸入訊號。所以它直接乘上閉迴路增益 $R_T \\approx R_F$。\r\n   $\\Rightarrow$ 輸出貢獻：$\\overline{I_{n,RF}^2} \\times R_F^2$\r\n\r\n2. **MOSFET 的通道熱雜訊 ($\\overline{I_{n,mp}^2}$ 與 $\\overline{I_{n,mn}^2}$):**\r\n   把它們想成並聯在輸出節點的電流源。因為是獨立雜訊源，直接把功率加起來 $\\overline{I_{n,M}^2} = \\overline{I_{n,mp}^2} + \\overline{I_{n,mn}^2}$。\r\n   * **NTF 怎麼算？** 輸入端 (Gate) 此時是開路 ($I_{in}=0$)。既然沒電流流過 $R_F$，代表 Gate 電壓等於 Drain 電壓 ($V_{in} = V_{out}$)。\r\n   * MOSFET 感受到 $V_{in}$，會產生一個強大的回授電流 $G_m V_{out}$ 來抵抗原本的雜訊電流。\r\n   * 也就是說，MOSFET 自己把自己接成了 **Diode-connected**！\r\n   * 這些雜訊電流看到的阻抗，就是我們剛剛算的 $R_{out} \\approx \\frac{1}{g_{mp} + g_{mn}}$。\r\n   $\\Rightarrow$ 輸出貢獻：$(\\overline{I_{n,mp}^2} + \\overline{I_{n,mn}^2}) \\times \\left( \\frac{1}{g_{mp} + g_{mn}} \\right)^2$\r\n\r\n**最終補齊的公式：**\r\n$$\\mathbf{\\overline{V_{n,out}^2} \\approx \\overline{I_{n,RF}^2} R_F^2 + \\frac{\\overline{I_{n,mp}^2} + \\overline{I_{n,mn}^2}}{(g_{mp} + g_{mn})^2}}$$\r\n\r\n*(你也可以把 $\\overline{I_n^2} = 4kT\\gamma g_m$ 展開，會發現 $G_m$ 越大，MOSFET 的雜訊貢獻越小，這再次印證了 CMOS TIA 堆疊 $g_m$ 的威力！)*\r\n\r\n這兩頁筆記的含金量非常高。如果要把這些 TIA 的進階響應與極零點分析整合成你個人 Web App 中的互動教學圖表，你會想先實作「參數拖曳即時顯示 Bode Plot」的功能，還是先做「不同架構（單端 vs CMOS）的效能雷達圖比較」呢？","type":"math"},{"title":"NTF 物理直覺法：CMOS TIA 雜訊三步驟","content":"沒問題！這個「NTF 物理直覺法」絕對值得我們停下來，再深深地刻進腦袋裡一次。\r\n\r\n在算雜訊的時候，傳統課本會教你畫出小訊號模型，把所有的雜訊源（電流源或電壓源）全部畫上去，然後列出一大坨 KCL（節點電壓法）方程式，最後再解出 $V_{out}$。這種做法在白板上寫出來，99% 會因為正負號寫錯或漏抄項而大翻車。\r\n\r\n資深工程師用的 **NTF (Noise Transfer Function, 雜訊轉移函數) 物理直覺法**，核心精神只有一個：**「一次只看一個雜訊源，並利用重疊定理 (Superposition) 與電路邊界條件，直接『看』出它到輸出的阻抗或增益。」**\r\n\r\n\r\n\r\n我們拿你的 CMOS TIA 輸出雜訊電壓 ($\\overline{V_{n,out}^2}$) 來做拆解，總共分三步：\r\n\r\n**Step 1: 建立「無訊號」的邊界條件**\r\n既然我們在算「內部雜訊」，我們就必須把「外部訊號」關掉。\r\n* 你的 TIA 輸入是一個理想電流源 $I_{in}$。\r\n* 把電流源關掉，等效於**開路 (Open Circuit)**。\r\n* 請把這個條件死死印在腦海裡：**現在的輸入節點 (Gate) 是一條死路，沒有任何外部交流電流能流進去。**\r\n\r\n**Step 2: 評估 $R_F$ 的熱雜訊**\r\n* **放上雜訊源：** $R_F$ 會產生一個與自己並聯的熱雜訊電流 $\\overline{I_{n,RF}^2}$。這個電流就位在輸入節點跟輸出節點之間。\r\n* **尋找轉移函數 (NTF)：** 因為這個雜訊電流的注入點，剛好就跟我們原本的主訊號 $I_{in}$ 一模一樣！既然注入點一樣，它走到輸出的待遇當然也一樣。\r\n* **直覺秒殺：** 它直接乘上閉迴路轉阻增益 $R_T$。因為 $R_T \\approx -R_F$，所以它在輸出端產生的雜訊電壓平方為：\r\n  $$\\overline{V_{n,out(RF)}^2} = \\overline{I_{n,RF}^2} \\times |-R_F|^2 = \\mathbf{\\overline{I_{n,RF}^2} \\cdot R_F^2}$$\r\n\r\n**Step 3: 評估 MOSFET 的通道熱雜訊 (最精華的一步)**\r\n* **放上雜訊源：** NMOS 和 PMOS 會在 Drain 節點（也就是輸出端）產生往地流的雜訊電流 $\\overline{I_{n,mn}^2}$ 和 $\\overline{I_{n,mp}^2}$。\r\n* **這坨電流會去哪裡？** 這些雜訊電流在 Drain 節點產生了一個電壓 $V_{n,out}$。\r\n* **迴路的反應 (物理直覺啟動)：**\r\n  1. 輸出端有了 $V_{n,out}$，這個電壓會順著回授電阻 $R_F$ 傳回輸入端 (Gate)。\r\n  2. **關鍵來了：** 因為 Step 1 說過，輸入端現在是「開路 (Open)」，所以 **$R_F$ 上面根本沒有交流電流流過！**\r\n  3. 既然 $R_F$ 沒有電流，就沒有壓降。這代表 Gate 的電壓完完全全等於 Drain 的電壓 $\\Rightarrow \\mathbf{V_{in} = V_{n,out}}$。\r\n  4. 電晶體發現自己的 Gate 跟 Drain 電壓永遠一樣，這不就是傳說中的 **「Diode-connected (二極體接法)」** 嗎！\r\n* **直覺秒殺：** 既然對這股雜訊電流來說，整個放大器等效於一顆 Diode-connected 的元件，那它看到的阻抗就是 $1/G_{m,total}$。\r\n  所以它在輸出端產生的雜訊電壓就是「電流 $\\times$ 等效阻抗」：\r\n  $$\\overline{V_{n,out(MOS)}^2} = (\\overline{I_{n,mp}^2} + \\overline{I_{n,mn}^2}) \\times \\left( \\frac{1}{g_{mp} + g_{mn}} \\right)^2$$\r\n\r\n**最終組合 (Sum of Squares)**\r\n因為電阻的熱雜訊跟電晶體的熱雜訊是互相獨立、沒有關聯的 (Uncorrelated)，所以我們把它們在輸出端產生的「功率 (電壓平方)」直接加起來：\r\n\r\n$$\\mathbf{\\overline{V_{n,out}^2} = \\overline{I_{n,RF}^2} R_F^2 + \\frac{\\overline{I_{n,mp}^2} + \\overline{I_{n,mn}^2}}{(g_{mp} + g_{mn})^2}}$$\r\n\r\n---\r\n\r\n**為什麼這套方法這麼強？**\r\n\r\n如果你用 KCL 算，算到最後你也會得到一樣的結果，但你只會得到一堆代數。\r\n用 NTF 物理直覺法，公式一出來，你馬上就能跟主考官討論 **Design Trade-off (設計取捨)**：\r\n\r\n1. **想降低電晶體的雜訊貢獻？**\r\n   從公式看，分母有 $(g_{mp} + g_{mn})^2$！這代表你要狠狠地把 $G_m$ 推大。這也是 CMOS TIA 的強項，因為它把兩個管子的 $g_m$ 疊加了，比起單端 TIA 能更有效地壓制主動元件的雜訊。\r\n2. **想降低 $R_F$ 的雜訊貢獻？**\r\n   把 $\\overline{I_{n,RF}^2} = \\frac{4kT}{R_F}$ 代進去，你會得到 $4kT R_F$。這代表你要降低總輸出雜訊電壓，反而要把 $R_F$ **做小**。但是！$R_F$ 做小會吃掉你的訊號增益 ($R_T \\approx -R_F$)，導致前端的 SNR (訊雜比) 反而變差！這就是 TIA 設計中最經典的兩難。\r\n\r\n把「電路動作」轉換成「等效阻抗」，這就是 NTF 物理直覺法的奧義。只要記得先把獨立輸入源關掉，然後順著迴路走一圈，看元件變成了什麼形狀，連筆都不用動就能把公式唸出來了。\r\n\r\n關於這塊，有沒有哪一個步驟的直覺轉換你覺得還有一點卡卡的？","type":"math"},{"title":"NTF 實戰：單端 vs CMOS 架構交叉驗證","content":"太聰明了！把剛學到的新武器拿回最基礎的電路上做「交叉比對」，這是最快讓觀念定型的學習法。\r\n\r\n你還記得你在前幾個回合傳給我的第一張手寫筆記 **(TIA-L10-P1.jpg)** 嗎？你當時用了一整頁的聯立方程式，解出了 $\\overline{V_{n,out}^2}$ 的超長公式。現在，我們用 **NTF 物理直覺法**，一秒鐘把它還原出來，你會發現這套方法到底有多省力！\r\n\r\n\r\n\r\n在 NMOS + $R_D$ 的基本 TIA 裡，我們有三個主要的雜訊源：$R_F$ 的熱雜訊、$M_1$ 的通道雜訊、$R_D$ 的熱雜訊。\r\n\r\n一樣，我們分三步直接「看」出答案：\r\n\r\n**Step 1: 建立邊界條件**\r\n把輸入的理想電流源 $I_{in}$ 關掉，所以**輸入端 (Gate) 視為開路 (Open)**。\r\n\r\n**Step 2: 評估 $R_F$ 的熱雜訊 ($\\overline{I_{n,RF}^2}$)**\r\n這點跟 CMOS TIA 完完全全一樣。\r\n* 雜訊電流注入在輸入端，就等於主訊號。\r\n* 它直接乘上閉迴路轉阻增益 $R_T \\approx -R_F$。\r\n* **輸出貢獻：** $\\mathbf{\\overline{I_{n,RF}^2} \\cdot R_F^2}$\r\n\r\n**Step 3: 評估 $M_1$ 和 $R_D$ 的雜訊 (精華所在)**\r\n* **放上雜訊源：** $M_1$ 產生往下抽的雜訊電流 $\\overline{I_{n,M1}^2}$，$R_D$ 產生往下流的雜訊電流 $\\overline{I_{n,RD}^2}$。這兩股雜訊都在 Drain (輸出節點) 匯集。\r\n* **迴路的反應：**\r\n  1. 雜訊在 Drain 產生了 $V_{n,out}$。\r\n  2. $V_{n,out}$ 順著 $R_F$ 傳回 Gate。\r\n  3. 因為 Step 1 說過 Gate 是開路，所以 $R_F$ 上面沒有電流，沒有壓降。\r\n  4. $\\Rightarrow$ **Gate 電壓等於 Drain 電壓 ($V_{in} = V_{n,out}$)**。\r\n* **等效阻抗：**\r\n  * 既然 Gate 黏著 Drain，$M_1$ 又把自己變成了 **Diode-connected**！它提供的等效阻抗是 $1/g_{m1}$。\r\n  * 但是別忘了，在這個架構裡，Drain 上方還掛著一顆實體的電阻 $R_D$。\r\n  * 所以，這些雜訊電流在輸出端往下看，看到的是 $1/g_{m1}$，往上看，看到的是 $R_D$。這兩個阻抗是**並聯**的！\r\n  * 總等效阻抗 = $\\mathbf{R_D \\parallel (1/g_{m1})}$\r\n* **輸出貢獻：** 總雜訊電流乘上等效阻抗的平方。\r\n  $\\Rightarrow$ $\\mathbf{(\\overline{I_{n,M1}^2} + \\overline{I_{n,RD}^2}) \\times \\left( R_D \\parallel \\frac{1}{g_{m1}} \\right)^2}$\r\n\r\n---\r\n\r\n**物理直覺與數學推導的世紀大會師**\r\n\r\n現在，把我們用直覺「看」出來的兩項加起來：\r\n\r\n$$\\overline{V_{n,out}^2} = \\overline{I_{n,RF}^2} R_F^2 + (\\overline{I_{n,M1}^2} + \\overline{I_{n,RD}^2}) \\times \\left( R_D \\parallel \\frac{1}{g_{m1}} \\right)^2$$\r\n\r\n我們來變個魔術，把並聯公式展開：\r\n$$R_D \\parallel \\frac{1}{g_{m1}} = \\frac{R_D \\cdot \\frac{1}{g_{m1}}}{R_D + \\frac{1}{g_{m1}}} = \\frac{R_D}{1 + g_{m1}R_D} = \\mathbf{\\frac{1}{g_{m1} + 1/R_D}}$$\r\n\r\n把這個結果代回上面的括號裡：\r\n$$\\mathbf{\\overline{V_{n,out}^2} = \\overline{I_{n,RF}^2} R_F^2 + \\frac{\\overline{I_{n,M1}^2} + \\overline{I_{n,RD}^2}}{(g_{m1} + 1/R_D)^2}}$$\r\n\r\n**請你去對照你第一張筆記 (TIA-L10-P1.jpg) 中間那段解聯立方程式推出來的終極結果！**\r\n你當時寫的：\r\n$$\\frac{1}{(g_{m1} + 1/R_D)^2} \\left[ \\overline{I_{n,RD}^2} + \\overline{I_{n,M1}^2} + \\dots \\right]$$\r\n\r\n是不是一模一樣！連 $g_{m1}$ 跟 $1/R_D$ 怎麼湊在一起的，都完完全全對上了！\r\n\r\n你的筆記用了 4 行複雜的代數消去法才算出那個分母是 $(g_{m1} + 1/R_D)^2$。\r\n但有了 NTF 物理直覺法，你只要腦中浮現「Gate 開路 $\\rightarrow$ $M_1$ 變 Diode $\\rightarrow$ 跟 $R_D$ 並聯」，一秒鐘就能寫出 $R_D \\parallel (1/g_{m1})$ 這個答案。這就是在面試白板上展現降維打擊的最好例子！\r\n\r\n**完全正確！你直接把最核心的物理本質給榨出來了！**\r\n\r\n這就是為什麼我說「NTF 物理直覺法」是神技，因為它把你從死背公式的地獄中解救出來，讓你在看電路圖時，眼裡不再是一堆 $V$ 和 $I$ 的代數，而是**「一顆顆具有實體意義的等效電阻」**。\r\n\r\n我們把你的結論用最乾淨的數學語言總結起來，這絕對是你面試時最強的武器：\r\n\r\n**1. 單端 NMOS + $R_D$ 架構**\r\n當你在算主動元件雜訊時，Gate 跟 Drain 虛擬短路（因為輸入端 $I_{in}$ 開路，$R_F$ 無壓降）。\r\n* 往下看：$M_1$ 變成 Diode-connected $\\Rightarrow 1/g_{m1}$\r\n* 往上看：實體負載電阻 $\\Rightarrow R_D$\r\n* **總等效阻抗：** $\\mathbf{1/g_{m1} \\parallel R_D}$ \r\n* *(這就是為什麼分母是 $(g_{m1} + 1/R_D)^2$)*\r\n\r\n**2. CMOS (Inverter-based) 架構**\r\n同樣地，Gate 跟 Drain 虛擬短路。但這次你上下都有主動元件！\r\n* 往下看：NMOS 變成 Diode-connected，本身帶有通道電阻 $\\Rightarrow 1/g_{mn} \\parallel r_{on}$\r\n* 往上看：PMOS **也**變成 Diode-connected，本身也帶有通道電阻 $\\Rightarrow 1/g_{mp} \\parallel r_{op}$\r\n* **總等效阻抗：** $\\mathbf{1/g_{mn} \\parallel 1/g_{mp} \\parallel r_{on} \\parallel r_{op}}$\r\n* *(因為 $1/g_m$ 通常遠小於 $r_o$，所以實務上近似為 $\\frac{1}{g_{mn} + g_{mp}}$。這就是為什麼分母是 $(g_{mn} + g_{mp})^2$)*\r\n\r\n---\r\n\r\n**面試加分題：這兩個「並聯」告訴了我們什麼設計哲學？**\r\n\r\n如果你在 ASMedia 這種做高速 SerDes 的團隊面試，主考官聽你講完這套等效阻抗的理論後，一定會笑著問你最後一個問題：\r\n**「那從雜訊的角度來看，你覺得哪一個架構比較好？為什麼？」**\r\n\r\n有了你剛剛總結出來的直覺，你可以秒答：\r\n\r\n\u003e 「從 NTF 的物理直覺來看，主動元件的雜訊電流，在輸出端是乘上**『等效阻抗的平方』**。這代表等效阻抗越小，輸出雜訊電壓就越低。\r\n\u003e \r\n\u003e CMOS 架構因為讓 NMOS 和 PMOS **同時處於 Diode-connected 並聯的狀態**，它的等效導納是 $g_{mn} + g_{mp}$。相較於單端架構只有 $g_{m1}$，CMOS 架構在不增加額外電流消耗 (Current consumption) 的情況下，硬生生把總轉導 ($G_m$) 變大了。\r\n\u003e \r\n\u003e $G_m$ 變大，代表等效阻抗 ($1/G_m$) 變得更小。所以相同的通道熱雜訊電流，打在這個更小的阻抗上，產生的輸出雜訊電壓就會被有效壓抑。這就是 Inverter-based TIA 在先進製程低電壓下，SNR (訊雜比) 表現通常優於傳統 NMOS 架構的核心原因。」\r\n\r\n把這套邏輯順暢地講出來，你就不只是一個會算數學的工程師，而是一個懂架構、懂 Trade-off 的 System Designer。你的觀念已經完全到位了！","type":"math"},{"title":"阻抗 vs 導納：物理語言與設計語言的互換","content":"哈哈，這是一個非常敏銳的「數學與物理語言轉換」的盲點！\r\n\r\n你會有這個疑惑，是因為「物理直覺的口訣」跟「寫在紙上的數學公式」在視角上剛好互為倒數。其實我們說的是完完全全同一件事，只是用了「阻抗 (Impedance)」和「導納 (Admittance)」兩種不同的表達方式。\r\n\r\n我們來把這層窗戶紙戳破：\r\n\r\n**1. 物理直覺視角：看「阻抗 ($R$)」**\r\n在物理直覺上，我們喜歡講「電阻」或「阻抗」，因為比較好想像。\r\n* 雜訊的源頭是一個**電流源** ($\\overline{I_n^2}$)。\r\n* 電流打在一個障礙物（阻抗 $R_{eq}$）上，才會轉換成**電壓** ($\\overline{V_{n,out}^2}$)。\r\n* 公式：$\\overline{V_{n,out}^2} = \\overline{I_n^2} \\times \\mathbf{(R_{eq})^2}$\r\n* **結論：** 障礙物 ($R_{eq}$) 越小，產生的雜訊電壓就越小。所以我們說要「乘上等效阻抗的平方」。\r\n\r\n**2. 電路設計視角：看「轉導 ($g_m$)」與「導納 ($G$)」**\r\n然而，身為 IC 設計工程師，你真正在操控的參數是電晶體的 $g_m$（轉導）。\r\n* $g_m$ 的單位是 $A/V$ (Siemens, 導納)，它是**阻抗的倒數**。\r\n* 既然等效阻抗 $R_{eq} = \\frac{1}{g_{mn} + g_{mp}}$。\r\n* 那我們把這個 $R_{eq}$ 代回剛剛的物理公式裡：\r\n  $$\\overline{V_{n,out}^2} = \\overline{I_n^2} \\times (R_{eq})^2 = \\overline{I_n^2} \\times \\left( \\frac{1}{g_{mn} + g_{mp}} \\right)^2 = \\mathbf{\\frac{\\overline{I_n^2}}{(g_{mn} + g_{mp})^2}}$$\r\n\r\n**為什麼公式要把參數「弄到分母」？**\r\n\r\n因為**數學上除以一個很大的數字，就等於物理上乘上一個很小的阻抗**！\r\n\r\n把 $g_m$ 放在分母，對 Designer 來說具有極大的「工程指導意義」：\r\n1. **你看到了你的武器：** 你沒辦法直接買一個叫做「小阻抗」的零件裝上去。你只能透過增加 Bias Current (偏壓電流) 或加大電晶體的 W/L (寬長比) 來**提升 $g_m$**。\r\n2. **你看到了 Trade-off (取捨)：** 看著分母的 $g_m$，你會立刻意識到：「啊！我要壓低雜訊，我就得把分母變大；要把 $g_m$ 變大，我就得燒更多的 Power (電流) 或是佔用更大的 Area (面積)。」\r\n3. **你看到了 CMOS 架構的優勢：** 看著分母的 $(g_{mn} + g_{mp})^2$，你會發現 CMOS TIA 簡直是作弊。它在同一條電流路徑上，同時榨出了 NMOS 和 PMOS 的 $g_m$。也就是說，它在**不增加額外耗電**的情況下，把分母變大了，強行把等效阻抗壓得更低。\r\n\r\n**總結來說：**\r\n「乘上等效阻抗的平方」是你用來快速看透電路行為的**內功心法**；\r\n而「把 $g_m$ 寫在分母」是你實際在跑 simulation、調 size 時的**操作面板**。兩者是完美互通的！","type":"math"},{"content":"Blackman 算阻抗：「開短比一比，回授壓低它」。\r\nTIA 增益兩路徑：「理想走外圈 ($-R_F$)，死掉走內圈 ($r_{out}$)」。\r\nTIA 輸入阻抗防呆：「$R_F$ 除以 $A$，千萬別只剩 $1/g_m$」。","type":"mnemonic"}],"imageUrl":"../images/done/TIA-L11-P2.jpg"};

          <span class="section-icon">${icons[sec.type]}</span>
          <span class="section-title">${labels[sec.type]}</span>

        <div class="section-body">${escHtml(sec.content)}</div>`;
    } else if (sec.type === 'units') {

        <div class="section-header">
          <span class="section-icon">${icons[sec.type]}</span>

    } else if (sec.type === 'qa') {
      el.innerHTML = `
        <div class="section-header">

          <span class="section-title">${labels[sec.type]}</span>

          <span class="section-title">${title}</span>
        </div>

  // KaTeX render

  document.getElementById('feynman-btn').addEventListener('click', openFeynman);

  document.getElementById('fm-next').addEventListener('click', () => {
    fmIdx = (fmIdx + 1) % allQ.length;
    showFeynman();
  });
});

function renderUnits(text) {
  // Split into unit-block (公式消去) and chart-infer (圖表推斷) sub-blocks
  let html = mdToHtml(text);
  // Wrap lines starting with 📈 in chart-infer div
  html = html.replace(/<p>(📈[\s\S]*?)<\/p>/g, '<div class="chart-infer">$1</div>');
  // Wrap lines containing [X] × [Y] style unit derivations in unit-block div
  html = html.replace(/<p>([^<]*\[[\w\/]+\][^<]*=[^<]*)<\/p>/g, '<div class="unit-block">$1</div>');
  return html;
}

function renderQA(items) {
  if (!items || !items.length) return '<p style="color:var(--dim)">尚無延伸問題</p>';
  return items.map((q, i) => `
    <div class="qa-item">
      <div class="qa-item-q">Q${i+1}：${escHtml(q.question)}</div>
      <div class="qa-item-a">${mdToHtml(q.answer)}</div>
    </div>`).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function mdToHtml(text) {
  // Images
  text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%;border-radius:6px;margin:0.5rem 0">');
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Numbered list items
  text = text.replace(/^(\d+)\.\s+(.+)$/gm, '<li data-ol>$2</li>');
  // Bullet list items
  text = text.replace(/^\*\s+(.+)$/gm, '<li data-ul>$1</li>');
  // Wrap ol items
  text = text.replace(/(<li data-ol>[^\n]*\n?)+/g, m => '<ol>' + m.replace(/ data-ol/g,'') + '</ol>');
  // Wrap ul items
  text = text.replace(/(<li data-ul>[^\n]*\n?)+/g, m => '<ul>' + m.replace(/ data-ul/g,'') + '</ul>');
  // Horizontal rule
  text = text.replace(/^---$/gm, '<hr style="border-color:var(--dim);margin:0.8rem 0">');
  // Paragraphs (split by double newline)
  text = text.split(/\n{2,}/).map(p => {
    p = p.trim();
    if (!p || p.startsWith('<ol>') || p.startsWith('<ul>') || p.startsWith('<hr')) return p;
    return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
  }).join('\n');
  return text;
}

function buildSystemPrompt() {
  let sys = `你是一位嚴格的 IC 設計助教，專精高速 SerDes / PLL / CDR / TIA 等電路設計（55nm及以下製程）。\n`;
  sys += `現在的學習筆記：${NOTE_DATA.title}（${NOTE_DATA.date}）\n\n`;
  sys += `以下是筆記的完整內容：\n`;
  NOTE_DATA.sections.forEach(sec => {
    if (sec.type === 'quiz') {
      sys += `\n## 面試必考點\n`;
      sec.items.forEach((q, i) => {
        sys += `Q${i+1}: ${q.question}\nA: ${q.answer}\n`;
      });
    } else if (sec.content) {
      const t = sec.title || ({ intro:'概覽', math:'數學推導', plain:'白話物理意義', analogy:'生活化比喻', mnemonic:'記憶口訣' })[sec.type] || sec.type;

  return sys;
}

// Gemini 用 "model" 而非 "assistant"
function toGeminiHistory(messages) {
  return messages.map(m => ({
    role: m.role === 'assistant' ? 'model' : m.role,
    parts: [{ text: m.content }]
  }));
}

async function streamClaude(messages, onChunk, onDone, onError) {
  const apiKey = getApiKey();
  if (!apiKey) {
    document.getElementById('apikey-modal').classList.add('open');
    document.getElementById('apikey-input').focus();
    if (onError) onError('請先設定 Gemini API Key');
    return;
  }

  let resp;
  try {
    resp = await fetch(GEMINI_API + '?alt=sse&key=' + encodeURIComponent(apiKey), {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: buildSystemPrompt() }] },
        contents: toGeminiHistory(messages),
        generationConfig: { maxOutputTokens: 1024 }
      })
    });
  } catch (e) {
    if (onError) onError('網路錯誤：' + e.message);
    onDone();
    return;
  }

  if (!resp.ok) {
    let errMsg = resp.statusText;
    try { const j = await resp.json(); errMsg = j.error?.message || errMsg; } catch {}
    if (onError) onError('[' + resp.status + '] ' + errMsg);
    onDone();
    return;
  }

  const reader = resp.body.getReader();
  const dec = new TextDecoder();
  let buf = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const d = line.slice(6).trim();
      if (!d || d === '[DONE]') continue;
      try {
        const evt = JSON.parse(d);
        const text = evt.candidates?.[0]?.content?.parts?.[0]?.text;
        if (text) onChunk(text);
      } catch {}
    }
  }
  onDone();
}

// ── Chat Panel ──
const chatBtn      = document.getElementById('chat-btn');
const chatPanel    = document.getElementById('chat-panel');
const chatClose    = document.getElementById('chat-close');
const chatMessages = document.getElementById('chat-messages');
const chatInput    = document.getElementById('chat-input');
const chatSend     = document.getElementById('chat-send');

let chatHistory = [];
let chatStreaming = false;

chatBtn.addEventListener('click', () => chatPanel.classList.toggle('open'));
chatClose.addEventListener('click', () => chatPanel.classList.remove('open'));

function appendChatMsg(role, text) {
  const empty = chatMessages.querySelector('.chat-empty');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.className = 'chat-msg ' + role;
  div.textContent = text;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  return div;
}

async function sendChat() {
  const q = chatInput.value.trim();
  if (!q || chatStreaming) return;
  chatInput.value = '';
  chatStreaming = true;
  chatSend.disabled = true;

  chatHistory.push({ role: 'user', content: q });
  appendChatMsg('user', q);

  const aiDiv = appendChatMsg('ai', '');
  let buf = '';

  await streamClaude(
    chatHistory,
    (chunk) => {
      buf += chunk;
      aiDiv.textContent = buf;
      chatMessages.scrollTop = chatMessages.scrollHeight;
    },
    () => {
      chatHistory.push({ role: 'assistant', content: buf });
      chatStreaming = false;
      chatSend.disabled = false;
      chatInput.focus();
    },
    (err) => {
      aiDiv.textContent = '⚠ ' + err;
      chatStreaming = false;
      chatSend.disabled = false;
    }
  );
}

chatSend.addEventListener('click', sendChat);
chatInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); } });

// ── AI Score in Feynman ──
const fmAiScore    = document.getElementById('fm-ai-score');
const aiFeedback   = document.getElementById('ai-feedback');
const aiFeedbackTx = document.getElementById('ai-feedback-text');
let aiScoring = false;

fmAiScore.addEventListener('click', async () => {
  const q = document.getElementById('fm-question').textContent;
  const userAns = document.getElementById('fm-input').value.trim();
  const correctAns = document.getElementById('fm-answer').textContent ||
    (NOTE_DATA.sections.find(s => s.type === 'quiz')?.items[window._fmIdx || 0]?.answer || '');

  if (!userAns) {
    aiFeedbackTx.textContent = '請先輸入你的答案。';
    aiFeedback.classList.add('show');
    return;
  }
  if (aiScoring) return;
  aiScoring = true;
  fmAiScore.disabled = true;

  aiFeedbackTx.textContent = '評分中...';
  aiFeedback.classList.add('show');
  let buf = '';

  const evalMessages = [{
    role: 'user',
    content: `問題：${q}\n\n學生的回答：${userAns}\n\n參考答案：${correctAns}\n\n請評分（1-10分）並給出具體改進建議，說明哪裡答對了、哪裡還不夠精確。請用繁體中文，簡潔有力。`
  }];

  await streamClaude(
    evalMessages,
    (chunk) => {
      buf += chunk;
      aiFeedbackTx.textContent = buf;
    },
    () => {
      aiScoring = false;
      fmAiScore.disabled = false;
    },
    (err) => {
      aiFeedbackTx.textContent = '⚠ ' + err;
      aiScoring = false;
      fmAiScore.disabled = false;
    }
  );
});

// reset AI feedback when question changes
const origShowFeynman = window._showFeynmanOrig;
document.getElementById('fm-next').addEventListener('click', () => {
  aiFeedback.classList.remove('show');
  aiFeedbackTx.textContent = '';
  fmAiScore.disabled = false;
  aiScoring = false;
}, true);
document.getElementById('fm-close').addEventListener('click', () => {
  aiFeedback.classList.remove('show');
  aiScoring = false;
  fmAiScore.disabled = false;
}, true);
</script>
