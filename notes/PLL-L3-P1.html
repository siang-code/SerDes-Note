<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">SerDes Note</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
:root {
  --bg:        #121212;
  --bg2:       #1a1a1a;
  --grid:      rgba(0,255,60,0.03);
  --phosphor:  #39e87a;
  --phosphor2: #1fa84e;
  --text:      #D1D5DB;
  --amber:     #f5a623;
  --dim:       #2a4a2a;
  --border:    rgba(57,232,122,0.18);
  --font-mono: 'Share Tech Mono', monospace;
  --font-ui:   'Rajdhani', sans-serif;
  --scan-size: 3px;
}

/* Light theme */
body.light {
  --bg:        #FFFFFF;
  --bg2:       #F9FAFB;
  --grid:      rgba(0,0,0,0.04);
  --text:      #111827;
  --dim:       #9CA3AF;
  --border:    #E5E7EB;
  --phosphor:  #059669;
  --phosphor2: #047857;
  --amber:     #D97706;
  --scan-size: 0px;
}

body.light .section.math .section-body,
body.light .section.units .section-body,
body.light .section.qa .section-body,
body.light .card-a,
body.light .qa-item-a,
body.light .modal-answer,
body.light .ai-feedback,
body.light .section.units .chart-infer { color: #374151; }

body.light .title,
body.light .section.mnemonic .section-body { text-shadow: none; }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* CRT scanlines */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent calc(var(--scan-size) - 1px),
    rgba(0,0,0,0.08) var(--scan-size)
  );
  pointer-events: none;
  z-index: 1000;
}

/* Grid background */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 920px;
  margin: 0 auto;
  padding: 2rem 1.5rem 6rem;
  position: relative;
  z-index: 1;
}

/* ── Header ── */
.header {
  border-bottom: 1px solid var(--border);
  padding-bottom: 1.2rem;
  margin-bottom: 2rem;
}

.header-top {
  display: flex;
  align-items: baseline;
  gap: 1.5rem;
  flex-wrap: wrap;
}

.tag {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--phosphor2);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.title {
  font-family: var(--font-ui);
  font-size: 2.4rem;
  font-weight: 700;
  color: var(--phosphor);
  letter-spacing: 0.05em;
  text-shadow: 0 0 20px rgba(57,232,122,0.4);
}

.date-line {
  margin-top: 0.4rem;
  font-size: 0.75rem;
  color: var(--phosphor2);
  display: flex;
  gap: 2rem;
}

/* ── Image viewer ── */
.image-wrap {
  position: relative;
  margin-bottom: 2.5rem;
  cursor: zoom-in;
  border: 1px solid var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.image-wrap::before {
  content: '[ RAW_SCAN ]';
  position: absolute;
  top: 0.5rem; left: 0.7rem;
  font-size: 0.65rem;
  color: var(--phosphor2);
  letter-spacing: 0.1em;
  z-index: 2;
}

.image-wrap::after {
  content: '⊕ ZOOM';
  position: absolute;
  bottom: 0.5rem; right: 0.7rem;
  font-size: 0.65rem;
  color: var(--amber);
  letter-spacing: 0.1em;
  z-index: 2;
}

.note-img {
  width: 100%;
  max-height: 420px;
  object-fit: cover;
  display: block;
  filter: brightness(0.92) contrast(1.1);
  transition: filter 0.2s;
}
.image-wrap:hover .note-img { filter: brightness(1) contrast(1.15); }

/* Lightbox */
.lightbox {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 2000;
  cursor: zoom-out;
  align-items: center;
  justify-content: center;
}
.lightbox.open { display: flex; }
.lightbox img {
  max-width: 95vw;
  max-height: 95vh;
  object-fit: contain;
  border: 1px solid var(--border);
}

/* ── Section ── */
.section {
  margin-bottom: 2rem;
  border: 1px solid var(--border);
  border-radius: 2px;
  overflow: hidden;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.4s, transform 0.4s;
}
.section.visible { opacity: 1; transform: none; }

.section-header {
  background: var(--bg2);
  padding: 0.55rem 1rem;
  display: flex;
  align-items: center;
  gap: 0.7rem;
  border-bottom: 1px solid var(--border);
}

.section-icon {
  font-size: 0.9rem;
  color: var(--amber);
}

.section-title {
  font-family: var(--font-ui);
  font-size: 0.85rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--amber);
}

.section-body {
  padding: 1.2rem 1.2rem;
  line-height: 1.8;
  font-size: 0.88rem;
}

/* intro special */
.section.intro .section-body {
  color: var(--phosphor);
  border-left: 3px solid var(--amber);
  font-size: 0.9rem;
}

/* math section */
.section.math .section-body { color: #b8e8c8; }

/* ── Unit analysis sub-section ── */
.section.units {
  margin-top: -1.2rem;
  margin-bottom: 2rem;
  border: 1px solid rgba(245,166,35,0.15);
  border-top: none;
  border-radius: 0 0 2px 2px;
  margin-left: 1.5rem;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.4s, transform 0.4s;
}
.section.units.visible { opacity: 1; transform: none; }
.section.units .section-header {
  background: rgba(245,166,35,0.05);
  border-bottom: 1px solid rgba(245,166,35,0.12);
}
.section.units .section-title {
  font-size: 0.72rem;
  color: var(--amber);
  opacity: 0.85;
}
.section.units .section-body {
  font-size: 0.82rem;
  color: #c8d8c8;
  line-height: 1.75;
}
.section.units .unit-block {
  background: rgba(0,0,0,0.2);
  border: 1px solid rgba(245,166,35,0.1);
  border-radius: 2px;
  padding: 0.6rem 0.9rem;
  margin: 0.5rem 0;
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: var(--amber);
  line-height: 1.7;
}
.section.units .chart-infer {
  background: rgba(57,232,122,0.04);
  border: 1px solid rgba(57,232,122,0.12);
  border-radius: 2px;
  padding: 0.6rem 0.9rem;
  margin: 0.5rem 0;
  font-size: 0.78rem;
  color: #8be8aa;
  line-height: 1.7;
}

/* ── Q&A append section ── */
.section.qa .section-body {
  color: #b8d8e8;
}
.qa-item {
  margin-bottom: 1.2rem;
  border-left: 2px solid var(--phosphor2);
  padding-left: 0.9rem;
}
.qa-item-q {
  font-weight: 600;
  color: var(--phosphor);
  margin-bottom: 0.3rem;
  font-size: 0.85rem;
}
.qa-item-a {
  font-size: 0.82rem;
  color: #8be8aa;
  line-height: 1.75;
}

.section-body ol {
  padding-left: 1.4rem;
}

.section-body ol li, .section-body ul li {
  margin-bottom: 0.5rem;
}

.section-body strong {
  color: var(--phosphor);
}

/* ── Quiz flashcards ── */
.quiz-list { display: flex; flex-direction: column; gap: 0.9rem; }

.card {
  border: 1px solid var(--dim);
  border-radius: 2px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.2s;
}
.card:hover { border-color: var(--phosphor2); }
.card.open  { border-color: var(--phosphor); }

.card-q {
  padding: 0.7rem 1rem;
  display: flex;
  gap: 0.8rem;
  align-items: flex-start;
  font-size: 0.85rem;
}

.card-num {
  color: var(--amber);
  min-width: 1.5rem;
  font-weight: bold;
}

.card-q-text { flex: 1; color: var(--phosphor); }

.card-toggle {
  color: var(--phosphor2);
  font-size: 0.7rem;
  min-width: 1.5rem;
  text-align: right;
  margin-top: 0.1rem;
  transition: transform 0.25s;
}
.card.open .card-toggle { transform: rotate(90deg); color: var(--phosphor); }

.card-a {
  display: none;
  padding: 0.7rem 1rem 0.9rem 3.3rem;
  font-size: 0.83rem;
  line-height: 1.75;
  color: #8be8aa;
  background: rgba(57,232,122,0.03);
  border-top: 1px solid var(--dim);
}
.card.open .card-a { display: block; }

/* ── Mnemonic ── */
.section.mnemonic .section-body {
  font-family: var(--font-ui);
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--amber);
  letter-spacing: 0.05em;
  text-align: center;
  padding: 1.5rem;
  text-shadow: 0 0 10px rgba(245,166,35,0.3);
}

/* ── Feynman FAB ── */
.fab {
  position: fixed;
  bottom: 2rem; right: 2rem;
  z-index: 500;
  background: var(--bg2);
  border: 1px solid var(--amber);
  color: var(--amber);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  padding: 0.7rem 1.1rem;
  cursor: pointer;
  border-radius: 2px;
  transition: background 0.2s, box-shadow 0.2s;
  box-shadow: 0 0 12px rgba(245,166,35,0.15);
}
.fab:hover {
  background: rgba(245,166,35,0.08);
  box-shadow: 0 0 20px rgba(245,166,35,0.3);
}

/* ── Feynman Modal ── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.88);
  z-index: 1500;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--bg2);
  border: 1px solid var(--amber);
  border-radius: 2px;
  padding: 2rem;
  max-width: 620px;
  width: 90%;
  position: relative;
}

.modal-label {
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  color: var(--amber);
  text-transform: uppercase;
  margin-bottom: 1rem;
}

.modal-question {
  font-family: var(--font-ui);
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--phosphor);
  line-height: 1.6;
  margin-bottom: 1.5rem;
}

.modal-input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--phosphor);
  font-family: var(--font-mono);
  font-size: 0.85rem;
  padding: 0.5rem 0;
  outline: none;
  margin-bottom: 1.2rem;
  caret-color: var(--phosphor);
}
.modal-input::placeholder { color: var(--dim); }

.modal-actions {
  display: flex;
  gap: 0.8rem;
  justify-content: flex-end;
}

.btn {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  padding: 0.5rem 1rem;
  border: 1px solid;
  border-radius: 2px;
  cursor: pointer;
  background: transparent;
  transition: background 0.2s;
}
.btn-reveal { border-color: var(--phosphor2); color: var(--phosphor2); }
.btn-reveal:hover { background: rgba(57,232,122,0.08); }
.btn-next   { border-color: var(--amber); color: var(--amber); }
.btn-next:hover { background: rgba(245,166,35,0.08); }
.btn-close  { border-color: var(--dim); color: var(--dim); }
.btn-close:hover { border-color: var(--phosphor2); color: var(--phosphor2); }

.modal-answer {
  display: none;
  font-size: 0.82rem;
  color: #8be8aa;
  line-height: 1.75;
  border-top: 1px solid var(--dim);
  margin-top: 0.5rem;
  padding-top: 0.8rem;
}
.modal-answer.show { display: block; }

/* scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

/* ── Theme / Settings buttons ── */
.theme-btn, .settings-btn {
  background: transparent;
  border: 1px solid var(--dim);
  color: var(--dim);
  font-family: var(--font-mono);
  font-size: 0.68rem;
  padding: 0.3rem 0.6rem;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s;
  letter-spacing: 0.08em;
}
.theme-btn { margin-left: auto; }
.theme-btn:hover, .settings-btn:hover { border-color: var(--phosphor2); color: var(--phosphor2); }
.settings-btn.active { border-color: var(--phosphor); color: var(--phosphor); }

/* ── Chat FAB ── */
.chat-fab {
  position: fixed;
  bottom: 2rem; right: 10.5rem;
  z-index: 500;
  background: var(--bg2);
  border: 1px solid var(--phosphor);
  color: var(--phosphor);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  padding: 0.7rem 1.1rem;
  cursor: pointer;
  border-radius: 2px;
  transition: background 0.2s, box-shadow 0.2s;
  box-shadow: 0 0 12px rgba(57,232,122,0.15);
}
.chat-fab:hover {
  background: rgba(57,232,122,0.08);
  box-shadow: 0 0 20px rgba(57,232,122,0.3);
}

/* ── Chat Panel ── */
.chat-panel {
  position: fixed;
  top: 0; right: -420px;
  width: 400px;
  height: 100vh;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  z-index: 800;
  display: flex;
  flex-direction: column;
  transition: right 0.3s ease;
}
.chat-panel.open { right: 0; }

.chat-panel-header {
  padding: 0.9rem 1rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.chat-panel-title {
  font-family: var(--font-ui);
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  color: var(--phosphor);
  text-transform: uppercase;
}
.chat-close-btn {
  background: transparent;
  border: none;
  color: var(--phosphor2);
  cursor: pointer;
  font-size: 0.85rem;
  font-family: var(--font-mono);
  padding: 0.2rem;
}
.chat-close-btn:hover { color: var(--phosphor); }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}
.chat-empty {
  color: var(--dim);
  font-size: 0.75rem;
  text-align: center;
  margin-top: 2rem;
  line-height: 1.8;
  letter-spacing: 0.05em;
}

.chat-msg {
  max-width: 88%;
  padding: 0.6rem 0.8rem;
  border-radius: 2px;
  font-size: 0.8rem;
  line-height: 1.65;
  word-break: break-word;
}
.chat-msg.user {
  align-self: flex-end;
  background: rgba(57,232,122,0.07);
  border: 1px solid var(--phosphor2);
  color: var(--phosphor);
}
.chat-msg.ai {
  align-self: flex-start;
  background: rgba(245,166,35,0.04);
  border: 1px solid rgba(245,166,35,0.25);
  color: #c8dac8;
  white-space: pre-wrap;
}

.chat-input-row {
  padding: 0.8rem 1rem;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 0.5rem;
  flex-shrink: 0;
}
.chat-input {
  flex: 1;
  background: transparent;
  border: 1px solid var(--dim);
  color: var(--phosphor);
  font-family: var(--font-mono);
  font-size: 0.78rem;
  padding: 0.45rem 0.7rem;
  outline: none;
  border-radius: 2px;
  caret-color: var(--phosphor);
}
.chat-input:focus { border-color: var(--phosphor2); }
.chat-input::placeholder { color: var(--dim); }
.chat-send-btn {
  background: transparent;
  border: 1px solid var(--phosphor2);
  color: var(--phosphor2);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  padding: 0.45rem 0.8rem;
  cursor: pointer;
  border-radius: 2px;
  transition: background 0.2s;
  white-space: nowrap;
}
.chat-send-btn:hover { background: rgba(57,232,122,0.08); }
.chat-send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* ── API Key Modal ── */
.apikey-modal {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.88);
  z-index: 2000;
  align-items: center;
  justify-content: center;
}
.apikey-modal.open { display: flex; }
.apikey-modal .modal { border-color: var(--phosphor); max-width: 480px; }
.apikey-input {
  width: 100%;
  background: transparent;
  border: 1px solid var(--dim);
  color: var(--phosphor);
  font-family: var(--font-mono);
  font-size: 0.78rem;
  padding: 0.5rem 0.7rem;
  outline: none;
  border-radius: 2px;
  margin-bottom: 0.6rem;
  caret-color: var(--phosphor);
}
.apikey-input:focus { border-color: var(--phosphor2); }
.apikey-hint {
  font-size: 0.68rem;
  color: var(--phosphor2);
  margin-bottom: 1.2rem;
  line-height: 1.6;
}
.apikey-status {
  font-size: 0.68rem;
  margin-bottom: 0.8rem;
  height: 1rem;
}
.apikey-status.ok  { color: var(--phosphor2); }
.apikey-status.err { color: #e87a7a; }

/* ── AI Score in Feynman ── */
.ai-feedback {
  display: none;
  margin-top: 0.8rem;
  padding: 0.7rem 0.9rem;
  border: 1px solid rgba(57,232,122,0.22);
  border-radius: 2px;
  font-size: 0.78rem;
  color: #b8e8c8;
  line-height: 1.72;
  background: rgba(57,232,122,0.03);
  white-space: pre-wrap;
  word-break: break-word;
}
.ai-feedback.show { display: block; }
.ai-feedback-label {
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  color: var(--phosphor2);
  margin-bottom: 0.5rem;
  text-transform: uppercase;
}

.btn-ai   { border-color: var(--phosphor); color: var(--phosphor); }
.btn-ai:hover { background: rgba(57,232,122,0.08); }
.btn-ai:disabled { opacity: 0.35; cursor: not-allowed; }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="header-top">
      <span class="tag">SERDES // IC DESIGN</span>
      <h1 class="title" id="note-title">—</h1>
      <button class="theme-btn" id="theme-btn">◐ THEME</button>
      <button class="settings-btn" id="settings-btn">⚙ API KEY</button>
    </div>
    <div class="date-line">
      <span id="note-date">—</span>
      <span id="note-src">—</span>
    </div>
  </div>

  <div id="img-wrap"></div>

  <div id="sections-container"></div>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <img id="lb-img" src="" alt="">
</div>

<!-- Chat FAB -->
<button class="chat-fab" id="chat-btn">[ AI 問答 ]</button>

<!-- Feynman FAB -->
<button class="fab" id="feynman-btn">[ 費曼測試 ]</button>

<!-- API Key Modal -->
<div class="apikey-modal" id="apikey-modal">
  <div class="modal">
    <div class="modal-label">⚙ ANTHROPIC API KEY 設定</div>
    <p class="apikey-hint">Key 僅存於本機 localStorage，不上傳任何伺服器。<br>取得金鑰：<strong style="color:var(--phosphor)">aistudio.google.com</strong> → Get API key（免費）</p>
    <input type="password" class="apikey-input" id="apikey-input" placeholder="AIza...">
    <div class="apikey-status" id="apikey-status"></div>
    <div class="modal-actions">
      <button class="btn btn-close" id="apikey-close">✕ 取消</button>
      <button class="btn btn-next" id="apikey-save">✓ 儲存</button>
    </div>
  </div>
</div>

<!-- Chat Panel -->
<div class="chat-panel" id="chat-panel">
  <div class="chat-panel-header">
    <span class="chat-panel-title">◈ AI CHAT — gemini-2.5-flash</span>
    <button class="chat-close-btn" id="chat-close">✕</button>
  </div>
  <div class="chat-messages" id="chat-messages">
    <div class="chat-empty">筆記內容已載入為系統上下文。<br>直接提問吧。</div>
  </div>

const NOTE_DATA = {"date":"2026-04-04","title":"PLL-L3-P1","sections":[{"content":"Simple PLL 暫態響應：Phase Step 與 Frequency Step 動態分析","type":"intro"},{"title":"數學推導","content":"筆記中紅字強調了「**相位是頻率的積分**」，我們用拉普拉斯轉換 (Laplace Transform) 與時域來嚴格證明圖中 $V_{ctrl}$ 的軌跡。\r\n\r\n1. **基礎定義與模型：**\r\n   - 頻率與相位的微積分關係：$\\omega(t) = \\frac{d\\phi(t)}{dt} \\implies \\phi(t) = \\int_{0}^{t} \\omega(\\tau) d\\tau$\r\n   - 轉到 s-domain：$\\Phi(s) = \\frac{\\Omega(s)}{s}$\r\n   - VCO 的特性方程式：$\\omega_{out}(t) = \\omega_{FR} + K_{VCO} \\cdot V_{ctrl}(t)$ （$\\omega_{FR}$ 為自由震盪頻率）\r\n   - 將 VCO 寫成相位轉移函數：$\\Phi_{out}(s) = \\frac{K_{VCO} \\cdot V_{ctrl}(s)}{s}$\r\n\r\n2. **Case 1: Phase Step (上半部圖) 的 Vctrl 軌跡證明：**\r\n   - 假設輸入發生相位突變 $\\Delta\\phi_0$：$\\phi_{in}(t) = \\Delta\\phi_0 \\cdot u(t)$\r\n   - PLL 鎖定後，最終輸出相位必定追上輸入（$\\phi_{out} \\to \\phi_{in}$）。\r\n   - 從時域看：$\\Delta\\phi_0 = \\int_{0}^{\\infty} \\Delta\\omega_{out}(t) dt = K_{VCO} \\int_{0}^{\\infty} \\Delta V_{ctrl}(t) dt$\r\n   - **推導結論：** 這完美解釋了你筆記中間畫的「紅色陰影面積」。因為頻率 $\\omega_{out}$ 必須「凸起」一段時間來累積額外的相位。一旦相位追上（積分面積等於 $\\Delta\\phi_0$），頻率必須回到原值，因此 **$V_{ctrl}$ 最終會回到原本的電壓準位**。\r\n\r\n3. **Case 2: Frequency Step (下半部圖) 的 Vctrl 軌跡證明：**\r\n   - 假設輸入發生頻率突變 $\\Delta\\omega$：$\\omega_{in}(t) = \\omega_{orig} + \\Delta\\omega \\implies \\phi_{in}(t) = \\Delta\\omega \\cdot t$ (相位變成一個斜坡)。\r\n   - 為了讓 PLL 重新鎖定，VCO 的最終頻率必須等於新的輸入頻率：$\\omega_{out}(\\infty) = \\omega_{in}(\\infty)$。\r\n   - 根據 VCO 公式：$\\omega_{orig} + \\Delta\\omega_{out} = \\omega_{FR} + K_{VCO}(V_{ctrl\\_old} + \\Delta V_{ctrl})$\r\n   - **推導結論：** $\\Delta V_{ctrl} = \\frac{\\Delta\\omega}{K_{VCO}}$。為了維持新的、更高的頻率，**$V_{ctrl}$ 必須停留在一個新的、較高的穩定值 (Stabilized again)**，這就是你筆記下半段 $V_{ctrl}$ 呈現 Step 爬升的數學真相。同時，這在 Type-I PLL 會產生無法消除的 Static Phase Error。","type":"math"},{"title":"單位解析","content":"**【公式單位消去法】：**\r\n我們來檢驗 VCO 積分特性的閉環單位是否吻合：\r\n* 公式：$\\phi_{out}(t) = \\int K_{VCO} \\cdot V_{ctrl}(t) dt$\r\n* $V_{ctrl}(t)$ 單位：$[V]$ (伏特)\r\n* $K_{VCO}$ 單位：$[rad \\cdot s^{-1} \\cdot V^{-1}]$ 或 $[Hz/V] \\times 2\\pi$\r\n* 積分 $dt$ 單位：$[s]$ (秒)\r\n* **消去過程：** $[rad \\cdot s^{-1} \\cdot V^{-1}] \\times [V] \\times [s] = [rad]$\r\n* **結果：** 完美得到相位單位 $[rad]$。這印證了你右下角寫的「相位沒有絕對值」，它只是頻率隨時間累積的相對差異量！\r\n\r\n**【圖表隱藏單位推斷】：**\r\n這是一張時域暫態波形圖，雖然你手繪沒標單位，但面試官若問起，你必須秒答典型數值：\r\n* **X 軸 (時間 $t$)：** $[ns]$ 或 $[\\mu s]$。若以 PCIe Gen3 (100MHz 參考時脈，週期 10ns) 為例，PLL 迴路頻寬若設計在 1MHz，整個 Lock Time 大約需要 $1 \\mu s \\sim 3 \\mu s$。\r\n* **Y 軸 (Ckin/Ckout/VPD)：** 邏輯電壓 $[V]$。在 0.18µm 通常是 /*INJECT_NOTE_DATA*/ \\sim 1.8V$，在 28nm 通常是 /*INJECT_NOTE_DATA*/ \\sim 0.9V$。\r\n* **Y 軸 (Vctrl)：** 類比控制電壓 $[V]$。通常會設計在 VDD/2 附近取得最佳 VCO 線性度，例如 0.45V (0.9V VDD下)，突波 (Bump) 大小約數十到數百 $mV$。\r\n* **Y 軸 ($\\phi_{in}$)：** 相位 $[UI]$ (Unit Interval) 或 $[rad]$。Phase step 通常討論 /*INJECT_NOTE_DATA*/.1 \\sim 0.5 UI$ 的跳變。","type":"units"},{"title":"白話物理意義","content":"PLL 就像是「頻率與相位的自動追蹤導彈」；Phase Step 是目標瞬間瞬移了一小段但速度不變（需要加速衝刺追上然後恢復原速），而 Frequency Step 是目標直接加速逃跑（必須永久踩下油門維持新速度）。","type":"plain"},{"title":"生活化比喻","content":"想像你在跑步機上跑步，你（VCO）要和跑步機履帶（Ckin）保持相對靜止。\r\n- **Phase Step：** 有人突然把你往前推了一把（相位偏移）。為了不跌倒，你會瞬間減速（Vctrl 往下掉），等履帶把你帶回原來的相對位置後，你再**恢復原本的步頻**繼續跑。\r\n- **Frequency Step：** 有人直接把跑步機的速度調快。你必須立刻加速（Vctrl 爬升），並且**永遠保持在這個更快的新步頻**上，才能繼續留在跑步機上。","type":"analogy"},{"title":"面試必考點","items":[{"question":"在 Type-I (Simple) PLL 中輸入 Frequency Step，鎖定後的 Phase Error 會是 0 嗎？","answer":"不會是 0。因為 VCO 需要一個新的、不同的 $V_{ctrl}$ 來維持新頻率。在 Type-I PLL 中，$V_{ctrl}$ 是由 Phase Detector 經過 LPF 產生的，必須要有一個「恆定的相位差 (Static Phase Error)」來產生對應的直流電壓提供給 VCO。"},{"question":"如果今天是一顆 Type-II PLL (含有 Charge Pump 和 Loop Filter 的電容積分路徑)，Frequency Step 下的 Vctrl 穩態圖會長得跟這張筆記一樣嗎？","answer":"$V_{ctrl}$ 一樣會停在新的較高準位，**但是** Type-II PLL 會把 Steady-state phase error 逼近於 0。因為 Loop filter 裡的電容（積分器）會記住這個所需的控制電壓，不需要依靠 PD 持續輸出相位差來維持 $V_{ctrl}$。"},{"question":"你圖中 Phase Step 的 Vctrl 凸起面積，跟設計上的哪個參數有關？","answer":"面積 $\\int \\Delta V_{ctrl} dt$ 直接正比於 Phase Step 的大小 $\\Delta\\phi$，反比於 $K_{VCO}$。這在 SerDes CDR (Clock and Data Recovery) 設計中極度重要，若 $K_{VCO}$ 太小，Vctrl 就必須凸得非常高，可能會撞到 VDD 或 GND 導致飽和 (Loss of Lock)。"}],"type":"quiz"},{"content":"**「相位跳，電壓凸回原點（積分面積還債）；頻率跳，電壓爬升不回頭（油門踩死不放）。」**","type":"mnemonic"}],"imageUrl":"../images/done/PLL-L3-P1.jpg"};

function renderUnits(text) {
  // Split into unit-block (公式消去) and chart-infer (圖表推斷) sub-blocks
  let html = mdToHtml(text);
  // Wrap lines starting with 📈 in chart-infer div
  html = html.replace(/<p>(📈[\s\S]*?)<\/p>/g, '<div class="chart-infer">$1</div>');
  // Wrap lines containing [X] × [Y] style unit derivations in unit-block div
  html = html.replace(/<p>([^<]*\[[\w\/]+\][^<]*=[^<]*)<\/p>/g, '<div class="unit-block">$1</div>');
  return html;
}

function renderQA(items) {
  if (!items || !items.length) return '<p style="color:var(--dim)">尚無延伸問題</p>';
  return items.map((q, i) => `
    <div class="qa-item">
      <div class="qa-item-q">Q${i+1}：${escHtml(q.question)}</div>
      <div class="qa-item-a">${mdToHtml(q.answer)}</div>
    </div>`).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function mdToHtml(text) {
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Numbered list items
  text = text.replace(/^(\d+)\.\s+(.+)$/gm, '<li>$2</li>');
  text = text.replace(/(<li>.*<\/li>\n?)+/gs, m => '<ol>' + m + '</ol>');
  // Bullet list items
  text = text.replace(/^\*\s+(.+)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>(?!.*<\/ol>).*<\/li>\n?)+/gs, m => '<ul>' + m + '</ul>');
  // Horizontal rule
  text = text.replace(/^---$/gm, '<hr style="border-color:var(--dim);margin:0.8rem 0">');
  // Paragraphs (split by double newline)
  text = text.split(/\n{2,}/).map(p => {
    p = p.trim();
    if (!p || p.startsWith('<ol>') || p.startsWith('<ul>') || p.startsWith('<hr')) return p;
    return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
  }).join('\n');
  return text;
}

const GEMINI_MODEL = 'gemini-2.5-flash';

function getApiKey() { return localStorage.getItem('gemini_api_key') || ''; }
function setApiKey(k) { localStorage.setItem('gemini_api_key', k); }

function buildSystemPrompt() {
  let sys = `你是一位嚴格的 IC 設計助教，專精高速 SerDes / PLL / CDR / TIA 等電路設計（55nm及以下製程）。\n`;
  sys += `現在的學習筆記：${NOTE_DATA.title}（${NOTE_DATA.date}）\n\n`;
  sys += `以下是筆記的完整內容：\n`;
  NOTE_DATA.sections.forEach(sec => {
    if (sec.type === 'quiz') {
      sys += `\n## 面試必考點\n`;
      sec.items.forEach((q, i) => {
        sys += `Q${i+1}: ${q.question}\nA: ${q.answer}\n`;
      });
    } else if (sec.content) {
      const t = sec.title || ({ intro:'概覽', math:'數學推導', plain:'白話物理意義', analogy:'生活化比喻', mnemonic:'記憶口訣' })[sec.type] || sec.type;
      sys += `\n## ${t}\n${sec.content}\n`;
    }
  });
  sys += `\n請以繁體中文回答，精準且言簡意賅。`;
  return sys;
}

// Gemini 用 "model" 而非 "assistant"
function toGeminiHistory(messages) {
  return messages.map(m => ({
    role: m.role === 'assistant' ? 'model' : m.role,
    parts: [{ text: m.content }]
  }));
}

async function streamClaude(messages, onChunk, onDone, onError) {
  const apiKey = getApiKey();
  if (!apiKey) {
    document.getElementById('apikey-modal').classList.add('open');
    document.getElementById('apikey-input').focus();
    if (onError) onError('請先設定 Gemini API Key');
    return;
  }

  let resp;
  try {
    resp = await fetch(GEMINI_API + '?alt=sse&key=' + encodeURIComponent(apiKey), {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: buildSystemPrompt() }] },
        contents: toGeminiHistory(messages),
        generationConfig: { maxOutputTokens: 1024 }
      })
    });
  } catch (e) {
    if (onError) onError('網路錯誤：' + e.message);
    onDone();
    return;
  }

  if (!resp.ok) {
    let errMsg = resp.statusText;
    try { const j = await resp.json(); errMsg = j.error?.message || errMsg; } catch {}
    if (onError) onError('[' + resp.status + '] ' + errMsg);
    onDone();
    return;
  }

  const reader = resp.body.getReader();
  const dec = new TextDecoder();
  let buf = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const d = line.slice(6).trim();
      if (!d || d === '[DONE]') continue;
      try {
        const evt = JSON.parse(d);
        const text = evt.candidates?.[0]?.content?.parts?.[0]?.text;
        if (text) onChunk(text);
      } catch {}
    }
  }
  onDone();
}

const chatClose    = document.getElementById('chat-close');
const chatMessages = document.getElementById('chat-messages');
const chatInput    = document.getElementById('chat-input');
const chatSend     = document.getElementById('chat-send');

let chatHistory = [];
let chatStreaming = false;

chatBtn.addEventListener('click', () => chatPanel.classList.toggle('open'));
chatClose.addEventListener('click', () => chatPanel.classList.remove('open'));

function appendChatMsg(role, text) {
  const empty = chatMessages.querySelector('.chat-empty');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.className = 'chat-msg ' + role;
  div.textContent = text;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  return div;
}

async function sendChat() {
  const q = chatInput.value.trim();
  if (!q || chatStreaming) return;
  chatInput.value = '';
  chatStreaming = true;
  chatSend.disabled = true;

  chatHistory.push({ role: 'user', content: q });
  appendChatMsg('user', q);

  const aiDiv = appendChatMsg('ai', '');
  let buf = '';

  await streamClaude(
    chatHistory,
    (chunk) => {
      buf += chunk;
      aiDiv.textContent = buf;
      chatMessages.scrollTop = chatMessages.scrollHeight;
    },
    () => {
      chatHistory.push({ role: 'assistant', content: buf });
      chatStreaming = false;
      chatSend.disabled = false;
      chatInput.focus();
    },
    (err) => {
      aiDiv.textContent = '⚠ ' + err;
      chatStreaming = false;
      chatSend.disabled = false;
    }
  );
}

chatSend.addEventListener('click', sendChat);
chatInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); } });

// ── AI Score in Feynman ──
const fmAiScore    = document.getElementById('fm-ai-score');
const aiFeedback   = document.getElementById('ai-feedback');
const aiFeedbackTx = document.getElementById('ai-feedback-text');
let aiScoring = false;

fmAiScore.addEventListener('click', async () => {
  const q = document.getElementById('fm-question').textContent;
  const userAns = document.getElementById('fm-input').value.trim();
  const correctAns = document.getElementById('fm-answer').textContent ||
    (NOTE_DATA.sections.find(s => s.type === 'quiz')?.items[window._fmIdx || 0]?.answer || '');

  if (!userAns) {
    aiFeedbackTx.textContent = '請先輸入你的答案。';
    aiFeedback.classList.add('show');
    return;
  }
  if (aiScoring) return;
  aiScoring = true;
  fmAiScore.disabled = true;

  aiFeedbackTx.textContent = '評分中...';
  aiFeedback.classList.add('show');
  let buf = '';

  const evalMessages = [{
    role: 'user',
    content: `問題：${q}\n\n學生的回答：${userAns}\n\n參考答案：${correctAns}\n\n請評分（1-10分）並給出具體改進建議，說明哪裡答對了、哪裡還不夠精確。請用繁體中文，簡潔有力。`
  }];

  await streamClaude(
    evalMessages,
    (chunk) => {
      buf += chunk;
      aiFeedbackTx.textContent = buf;
    },
    () => {
      aiScoring = false;
      fmAiScore.disabled = false;
    },
    (err) => {
      aiFeedbackTx.textContent = '⚠ ' + err;
      aiScoring = false;
      fmAiScore.disabled = false;
    }
  );
});

// reset AI feedback when question changes
const origShowFeynman = window._showFeynmanOrig;
document.getElementById('fm-next').addEventListener('click', () => {
  aiFeedback.classList.remove('show');
  aiFeedbackTx.textContent = '';
  fmAiScore.disabled = false;
  aiScoring = false;
}, true);
document.getElementById('fm-close').addEventListener('click', () => {
  aiFeedback.classList.remove('show');
  aiScoring = false;
  fmAiScore.disabled = false;
}, true);
</script>
