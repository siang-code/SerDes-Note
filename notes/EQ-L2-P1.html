<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">SerDes Note</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
:root {
  --bg:        #121212;
  --bg2:       #1a1a1a;
  --grid:      rgba(0,255,60,0.03);
  --phosphor:  #39e87a;
  --phosphor2: #1fa84e;
  --text:      #D1D5DB;
  --amber:     #f5a623;
  --dim:       #2a4a2a;
  --border:    rgba(57,232,122,0.18);
  --font-mono: 'Share Tech Mono', monospace;
  --font-ui:   'Rajdhani', sans-serif;
  --scan-size: 3px;
}

/* Light theme */
body.light {
  --bg:        #FFFFFF;
  --bg2:       #F9FAFB;
  --grid:      rgba(0,0,0,0.04);
  --text:      #111827;
  --dim:       #9CA3AF;
  --border:    #E5E7EB;
  --phosphor:  #059669;
  --phosphor2: #047857;
  --amber:     #D97706;
  --scan-size: 0px;
}

body.light .section.math .section-body,
body.light .section.units .section-body,
body.light .section.qa .section-body,
body.light .card-a,
body.light .qa-item-a,
body.light .modal-answer,
body.light .ai-feedback,
body.light .section.units .chart-infer { color: #374151; }

body.light .title,
body.light .section.mnemonic .section-body { text-shadow: none; }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* CRT scanlines */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent calc(var(--scan-size) - 1px),
    rgba(0,0,0,0.08) var(--scan-size)
  );
  pointer-events: none;
  z-index: 1000;
}

/* Grid background */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 920px;
  margin: 0 auto;
  padding: 2rem 1.5rem 6rem;
  position: relative;
  z-index: 1;
}

/* ── Header ── */
.header {
  border-bottom: 1px solid var(--border);
  padding-bottom: 1.2rem;
  margin-bottom: 2rem;
}

.header-top {
  display: flex;
  align-items: baseline;
  gap: 1.5rem;
  flex-wrap: wrap;
}

.tag {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--phosphor2);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.title {
  font-family: var(--font-ui);
  font-size: 2.4rem;
  font-weight: 700;
  color: var(--phosphor);
  letter-spacing: 0.05em;
  text-shadow: 0 0 20px rgba(57,232,122,0.4);
}

.date-line {
  margin-top: 0.4rem;
  font-size: 0.75rem;
  color: var(--phosphor2);
  display: flex;
  gap: 2rem;
}

/* ── Image viewer ── */
.image-wrap {
  position: relative;
  margin-bottom: 2.5rem;
  cursor: zoom-in;
  border: 1px solid var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.image-wrap::before {
  content: '[ RAW_SCAN ]';
  position: absolute;
  top: 0.5rem; left: 0.7rem;
  font-size: 0.65rem;
  color: var(--phosphor2);
  letter-spacing: 0.1em;
  z-index: 2;
}

.image-wrap::after {
  content: '⊕ ZOOM';
  position: absolute;
  bottom: 0.5rem; right: 0.7rem;
  font-size: 0.65rem;
  color: var(--amber);
  letter-spacing: 0.1em;
  z-index: 2;
}

.note-img {
  width: 100%;
  max-height: 420px;
  object-fit: cover;
  display: block;
  filter: brightness(0.92) contrast(1.1);
  transition: filter 0.2s;
}
.image-wrap:hover .note-img { filter: brightness(1) contrast(1.15); }

/* Lightbox */
.lightbox {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 2000;
  cursor: zoom-out;
  align-items: center;
  justify-content: center;
}
.lightbox.open { display: flex; }
.lightbox img {
  max-width: 95vw;
  max-height: 95vh;
  object-fit: contain;
  border: 1px solid var(--border);
}

/* ── Section ── */
.section {
  margin-bottom: 2rem;
  border: 1px solid var(--border);
  border-radius: 2px;
  overflow: hidden;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.4s, transform 0.4s;
}
.section.visible { opacity: 1; transform: none; }

.section-header {
  background: var(--bg2);
  padding: 0.55rem 1rem;
  display: flex;
  align-items: center;
  gap: 0.7rem;
  border-bottom: 1px solid var(--border);
}

.section-icon {
  font-size: 0.9rem;
  color: var(--amber);
}

.section-title {
  font-family: var(--font-ui);
  font-size: 0.85rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--amber);
}

.section-body {
  padding: 1.2rem 1.2rem;
  line-height: 1.8;
  font-size: 0.88rem;
}

/* intro special */
.section.intro .section-body {
  color: var(--phosphor);
  border-left: 3px solid var(--amber);
  font-size: 0.9rem;
}

/* math section */
.section.math .section-body { color: #b8e8c8; }

/* ── Unit analysis sub-section ── */
.section.units {
  margin-top: -1.2rem;
  margin-bottom: 2rem;
  border: 1px solid rgba(245,166,35,0.15);
  border-top: none;
  border-radius: 0 0 2px 2px;
  margin-left: 1.5rem;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.4s, transform 0.4s;
}
.section.units.visible { opacity: 1; transform: none; }
.section.units .section-header {
  background: rgba(245,166,35,0.05);
  border-bottom: 1px solid rgba(245,166,35,0.12);
}
.section.units .section-title {
  font-size: 0.72rem;
  color: var(--amber);
  opacity: 0.85;
}
.section.units .section-body {
  font-size: 0.82rem;
  color: #c8d8c8;
  line-height: 1.75;
}
.section.units .unit-block {
  background: rgba(0,0,0,0.2);
  border: 1px solid rgba(245,166,35,0.1);
  border-radius: 2px;
  padding: 0.6rem 0.9rem;
  margin: 0.5rem 0;
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: var(--amber);
  line-height: 1.7;
}
.section.units .chart-infer {
  background: rgba(57,232,122,0.04);
  border: 1px solid rgba(57,232,122,0.12);
  border-radius: 2px;
  padding: 0.6rem 0.9rem;
  margin: 0.5rem 0;
  font-size: 0.78rem;
  color: #8be8aa;
  line-height: 1.7;
}

/* ── Q&A append section ── */
.section.qa .section-body {
  color: #b8d8e8;
}
.qa-item {
  margin-bottom: 1.2rem;
  border-left: 2px solid var(--phosphor2);
  padding-left: 0.9rem;
}
.qa-item-q {
  font-weight: 600;
  color: var(--phosphor);
  margin-bottom: 0.3rem;
  font-size: 0.85rem;
}
.qa-item-a {
  font-size: 0.82rem;
  color: #8be8aa;
  line-height: 1.75;
}

.section-body ol {
  padding-left: 1.4rem;
}

.section-body ol li, .section-body ul li {
  margin-bottom: 0.5rem;
}

.section-body strong {
  color: var(--phosphor);
}

/* ── Quiz flashcards ── */
.quiz-list { display: flex; flex-direction: column; gap: 0.9rem; }

.card {
  border: 1px solid var(--dim);
  border-radius: 2px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.2s;
}
.card:hover { border-color: var(--phosphor2); }
.card.open  { border-color: var(--phosphor); }

.card-q {
  padding: 0.7rem 1rem;
  display: flex;
  gap: 0.8rem;
  align-items: flex-start;
  font-size: 0.85rem;
}

.card-num {
  color: var(--amber);
  min-width: 1.5rem;
  font-weight: bold;
}

.card-q-text { flex: 1; color: var(--phosphor); }

.card-toggle {
  color: var(--phosphor2);
  font-size: 0.7rem;
  min-width: 1.5rem;
  text-align: right;
  margin-top: 0.1rem;
  transition: transform 0.25s;
}
.card.open .card-toggle { transform: rotate(90deg); color: var(--phosphor); }

.card-a {
  display: none;
  padding: 0.7rem 1rem 0.9rem 3.3rem;
  font-size: 0.83rem;
  line-height: 1.75;
  color: #8be8aa;
  background: rgba(57,232,122,0.03);
  border-top: 1px solid var(--dim);
}
.card.open .card-a { display: block; }

/* ── Mnemonic ── */
.section.mnemonic .section-body {
  font-family: var(--font-ui);
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--amber);
  letter-spacing: 0.05em;
  text-align: center;
  padding: 1.5rem;
  text-shadow: 0 0 10px rgba(245,166,35,0.3);
}

/* ── Feynman FAB ── */
.fab {
  position: fixed;
  bottom: 2rem; right: 2rem;
  z-index: 500;
  background: var(--bg2);
  border: 1px solid var(--amber);
  color: var(--amber);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  padding: 0.7rem 1.1rem;
  cursor: pointer;
  border-radius: 2px;
  transition: background 0.2s, box-shadow 0.2s;
  box-shadow: 0 0 12px rgba(245,166,35,0.15);
}
.fab:hover {
  background: rgba(245,166,35,0.08);
  box-shadow: 0 0 20px rgba(245,166,35,0.3);
}

/* ── Feynman Modal ── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.88);
  z-index: 1500;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--bg2);
  border: 1px solid var(--amber);
  border-radius: 2px;
  padding: 2rem;
  max-width: 620px;
  width: 90%;
  position: relative;
}

.modal-label {
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  color: var(--amber);
  text-transform: uppercase;
  margin-bottom: 1rem;
}

.modal-question {
  font-family: var(--font-ui);
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--phosphor);
  line-height: 1.6;
  margin-bottom: 1.5rem;
}

.modal-input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--phosphor);
  font-family: var(--font-mono);
  font-size: 0.85rem;
  padding: 0.5rem 0;
  outline: none;
  margin-bottom: 1.2rem;
  caret-color: var(--phosphor);
}
.modal-input::placeholder { color: var(--dim); }

.modal-actions {
  display: flex;
  gap: 0.8rem;
  justify-content: flex-end;
}

.btn {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  padding: 0.5rem 1rem;
  border: 1px solid;
  border-radius: 2px;
  cursor: pointer;
  background: transparent;
  transition: background 0.2s;
}
.btn-reveal { border-color: var(--phosphor2); color: var(--phosphor2); }
.btn-reveal:hover { background: rgba(57,232,122,0.08); }
.btn-next   { border-color: var(--amber); color: var(--amber); }
.btn-next:hover { background: rgba(245,166,35,0.08); }
.btn-close  { border-color: var(--dim); color: var(--dim); }
.btn-close:hover { border-color: var(--phosphor2); color: var(--phosphor2); }

.modal-answer {
  display: none;
  font-size: 0.82rem;
  color: #8be8aa;
  line-height: 1.75;
  border-top: 1px solid var(--dim);
  margin-top: 0.5rem;
  padding-top: 0.8rem;
}
.modal-answer.show { display: block; }

/* scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

/* ── Theme / Settings buttons ── */
.theme-btn, .settings-btn {
  background: transparent;
  border: 1px solid var(--dim);
  color: var(--dim);
  font-family: var(--font-mono);
  font-size: 0.68rem;
  padding: 0.3rem 0.6rem;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s;
  letter-spacing: 0.08em;
}
.theme-btn { margin-left: auto; }
.theme-btn:hover, .settings-btn:hover { border-color: var(--phosphor2); color: var(--phosphor2); }
.settings-btn.active { border-color: var(--phosphor); color: var(--phosphor); }

/* ── Chat FAB ── */
.chat-fab {
  position: fixed;
  bottom: 2rem; right: 10.5rem;
  z-index: 500;
  background: var(--bg2);
  border: 1px solid var(--phosphor);
  color: var(--phosphor);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  padding: 0.7rem 1.1rem;
  cursor: pointer;
  border-radius: 2px;
  transition: background 0.2s, box-shadow 0.2s;
  box-shadow: 0 0 12px rgba(57,232,122,0.15);
}
.chat-fab:hover {
  background: rgba(57,232,122,0.08);
  box-shadow: 0 0 20px rgba(57,232,122,0.3);
}

/* ── Chat Panel ── */
.chat-panel {
  position: fixed;
  top: 0; right: -420px;
  width: 400px;
  height: 100vh;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  z-index: 800;
  display: flex;
  flex-direction: column;
  transition: right 0.3s ease;
}
.chat-panel.open { right: 0; }

.chat-panel-header {
  padding: 0.9rem 1rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.chat-panel-title {
  font-family: var(--font-ui);
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  color: var(--phosphor);
  text-transform: uppercase;
}
.chat-close-btn {
  background: transparent;
  border: none;
  color: var(--phosphor2);
  cursor: pointer;
  font-size: 0.85rem;
  font-family: var(--font-mono);
  padding: 0.2rem;
}
.chat-close-btn:hover { color: var(--phosphor); }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}
.chat-empty {
  color: var(--dim);
  font-size: 0.75rem;
  text-align: center;
  margin-top: 2rem;
  line-height: 1.8;
  letter-spacing: 0.05em;
}

.chat-msg {
  max-width: 88%;
  padding: 0.6rem 0.8rem;
  border-radius: 2px;
  font-size: 0.8rem;
  line-height: 1.65;
  word-break: break-word;
}
.chat-msg.user {
  align-self: flex-end;
  background: rgba(57,232,122,0.07);
  border: 1px solid var(--phosphor2);
  color: var(--phosphor);
}
.chat-msg.ai {
  align-self: flex-start;
  background: rgba(245,166,35,0.04);
  border: 1px solid rgba(245,166,35,0.25);
  color: #c8dac8;
  white-space: pre-wrap;
}

.chat-input-row {
  padding: 0.8rem 1rem;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 0.5rem;
  flex-shrink: 0;
}
.chat-input {
  flex: 1;
  background: transparent;
  border: 1px solid var(--dim);
  color: var(--phosphor);
  font-family: var(--font-mono);
  font-size: 0.78rem;
  padding: 0.45rem 0.7rem;
  outline: none;
  border-radius: 2px;
  caret-color: var(--phosphor);
}
.chat-input:focus { border-color: var(--phosphor2); }
.chat-input::placeholder { color: var(--dim); }
.chat-send-btn {
  background: transparent;
  border: 1px solid var(--phosphor2);
  color: var(--phosphor2);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  padding: 0.45rem 0.8rem;
  cursor: pointer;
  border-radius: 2px;
  transition: background 0.2s;
  white-space: nowrap;
}
.chat-send-btn:hover { background: rgba(57,232,122,0.08); }
.chat-send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* ── API Key Modal ── */
.apikey-modal {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.88);
  z-index: 2000;
  align-items: center;
  justify-content: center;
}
.apikey-modal.open { display: flex; }
.apikey-modal .modal { border-color: var(--phosphor); max-width: 480px; }
.apikey-input {
  width: 100%;
  background: transparent;
  border: 1px solid var(--dim);
  color: var(--phosphor);
  font-family: var(--font-mono);
  font-size: 0.78rem;
  padding: 0.5rem 0.7rem;
  outline: none;
  border-radius: 2px;
  margin-bottom: 0.6rem;
  caret-color: var(--phosphor);
}
.apikey-input:focus { border-color: var(--phosphor2); }
.apikey-hint {
  font-size: 0.68rem;
  color: var(--phosphor2);
  margin-bottom: 1.2rem;
  line-height: 1.6;
}
.apikey-status {
  font-size: 0.68rem;
  margin-bottom: 0.8rem;
  height: 1rem;
}
.apikey-status.ok  { color: var(--phosphor2); }
.apikey-status.err { color: #e87a7a; }

/* ── AI Score in Feynman ── */
.ai-feedback {
  display: none;
  margin-top: 0.8rem;
  padding: 0.7rem 0.9rem;
  border: 1px solid rgba(57,232,122,0.22);
  border-radius: 2px;
  font-size: 0.78rem;
  color: #b8e8c8;
  line-height: 1.72;
  background: rgba(57,232,122,0.03);
  white-space: pre-wrap;
  word-break: break-word;
}
.ai-feedback.show { display: block; }
.ai-feedback-label {
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  color: var(--phosphor2);
  margin-bottom: 0.5rem;
  text-transform: uppercase;
}

.btn-ai   { border-color: var(--phosphor); color: var(--phosphor); }
.btn-ai:hover { background: rgba(57,232,122,0.08); }
.btn-ai:disabled { opacity: 0.35; cursor: not-allowed; }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="header-top">
      <span class="tag">SERDES // IC DESIGN</span>
      <h1 class="title" id="note-title">—</h1>
      <button class="theme-btn" id="theme-btn">◐ THEME</button>
      <button class="settings-btn" id="settings-btn">⚙ API KEY</button>
    </div>
    <div class="date-line">
      <span id="note-date">—</span>
      <span id="note-src">—</span>
    </div>
  </div>

  <div id="img-wrap"></div>

  <div id="sections-container"></div>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <img id="lb-img" src="" alt="">
</div>

<!-- Chat FAB -->
<button class="chat-fab" id="chat-btn">[ AI 問答 ]</button>

<!-- Feynman FAB -->
<button class="fab" id="feynman-btn">[ 費曼測試 ]</button>

<!-- API Key Modal -->
<div class="apikey-modal" id="apikey-modal">
  <div class="modal">
    <div class="modal-label">⚙ ANTHROPIC API KEY 設定</div>
    <p class="apikey-hint">Key 僅存於本機 localStorage，不上傳任何伺服器。<br>取得金鑰：<strong style="color:var(--phosphor)">aistudio.google.com</strong> → Get API key（免費）</p>
    <input type="password" class="apikey-input" id="apikey-input" placeholder="AIza...">
    <div class="apikey-status" id="apikey-status"></div>
    <div class="modal-actions">
      <button class="btn btn-close" id="apikey-close">✕ 取消</button>
      <button class="btn btn-next" id="apikey-save">✓ 儲存</button>
    </div>
  </div>
</div>

<!-- Chat Panel -->
<div class="chat-panel" id="chat-panel">
  <div class="chat-panel-header">
    <span class="chat-panel-title">◈ AI CHAT — gemini-2.5-flash</span>
    <button class="chat-close-btn" id="chat-close">✕</button>
  </div>
  <div class="chat-messages" id="chat-messages">
    <div class="chat-empty">筆記內容已載入為系統上下文。<br>直接提問吧。</div>
  </div>

<script>
// ── NOTE_DATA injected by process_note.ps1 ──
const NOTE_DATA = {"date":"2026-04-05","title":"EQ-L2-P1","sections":[{"content":"傳輸線通道損耗 (Wireline Channel Loss) - 介電損耗主導與 ISI","type":"intro"},{"title":"數學推導","content":"這頁筆記推導了當傳輸線被**介電損耗 (Dielectric loss)** 主導時，單一位元脈波 (Pulse) 經過通道後的時域波形，藉此評估 ISI (符元間干擾) 的嚴重程度。\r\n\r\n**Step 1: 建立通道頻率響應模型**\r\n假設介電損耗主導，通道轉移函數的振幅隨頻率 $f$ 呈指數衰減：\r\n$G(f) = \\exp(-k_d \\cdot l \\cdot |f|)$ \r\n（註：筆記中寫 $f$，但在做傅立葉逆轉換時，物理上的頻譜必須具備共軛對稱性，因此隱含對絕對值 $|f|$ 積分）\r\n\r\n**Step 2: 求通道的脈衝響應 (Impulse Response) $G(t)$**\r\n將頻域轉回時域，利用傅立葉逆轉換：\r\n$G(t) = \\mathcal{F}^{-1}\\{G(f)\\} = \\int_{-\\infty}^{\\infty} \\exp(-k_d \\cdot l \\cdot |f|) \\cdot \\exp(j2\\pi ft) df$\r\n將積分拆分為正負頻率兩部分：\r\n$= \\int_{-\\infty}^{0} \\exp(f(k_d l + j2\\pi t)) df + \\int_{0}^{\\infty} \\exp(-f(k_d l - j2\\pi t)) df$\r\n解積分得到：\r\n$= \\frac{1}{k_d l + j2\\pi t} + \\frac{1}{k_d l - j2\\pi t} = \\frac{(k_d l - j2\\pi t) + (k_d l + j2\\pi t)}{(k_d l)^2 + (2\\pi t)^2}$\r\n$G(t) = \\frac{2 k_d \\cdot l}{k_d^2 l^2 + 4\\pi^2 t^2}$\r\n（這是一個羅倫茲分佈 Lorentzian distribution，特徵是拖著很長的尾巴）\r\n\r\n**Step 3: 求單一脈波響應 (Pulse Response) $y(t)$**\r\n輸入 $x(t)$ 是一個振幅為 $V_0$，寬度為 $T_b$ (1 個 bit 週期) 的方波。輸出為輸入與脈衝響應的卷積：\r\n$y(t) = x(t) * G(t) = \\int_{0}^{T_b} V_0 \\cdot \\frac{2 k_d l}{k_d^2 l^2 + 4\\pi^2 (t-\\tau)^2} d\\tau$\r\n令代換變數 $u = \\frac{2\\pi(t-\\tau)}{k_d l}$，則 $du = \\frac{-2\\pi}{k_d l} d\\tau \\Rightarrow d\\tau = \\frac{-k_d l}{2\\pi} du$\r\n積分式化簡為 $\\int \\frac{1}{1+u^2} du = \\tan^{-1}(u)$ 形式，代入上下界 $\\tau = 0$ 與 $\\tau = T_b$：\r\n$y(t) = \\frac{V_0}{\\pi} \\left[ \\tan^{-1}\\left(\\frac{2\\pi t}{k_d l}\\right) - \\tan^{-1}\\left(\\frac{2\\pi(t-T_b)}{k_d l}\\right) \\right]$\r\n\r\n**Step 4: 尋找脈波響應的最大峰值 $y_{1,max}$**\r\n為了找最大值，對 $t$ 微分並令 $\\frac{dy}{dt} = 0$。由波形對稱性可知，峰值必發生在脈波正中央，即 $t = \\frac{T_b}{2}$：\r\n$y_{1,max} = y\\left(\\frac{T_b}{2}\\right) = \\frac{V_0}{\\pi} \\left[ \\tan^{-1}\\left(\\frac{\\pi T_b}{k_d l}\\right) - \\tan^{-1}\\left(\\frac{-\\pi T_b}{k_d l}\\right) \\right]$\r\n利用 $\\tan^{-1}(-x) = -\\tan^{-1}(x)$ 的奇函數特性：\r\n$y_{1,max} = \\frac{2V_0}{\\pi} \\tan^{-1}\\left(\\frac{\\pi T_b}{k_d l}\\right)$\r\n（這個值代表經過通道後，原本高為 $V_0$ 的信號「最高還能剩多少」）","type":"math"},{"title":"單位解析","content":"**公式單位消去：**\r\n1. **衰減指數 $\\exp(-k_d \\cdot l \\cdot f)$**：指數內部必須為無單位 (dimensionless)。\r\n   - 頻率 $f$ 單位為 $[\\text{Hz}] = [1/\\text{s}]$\r\n   - 長度 $l$ 單位為 $[\\text{m}]$\r\n   - 故介電損耗常數 $k_d$ 的單位必須是 $[\\text{s/m}]$。\r\n   - $[-k_d \\cdot l \\cdot f] \\Rightarrow [\\text{s/m}] \\times [\\text{m}] \\times [1/\\text{s}] = [1]$ (無單位，合理)。\r\n2. **脈衝響應 $G(t) = \\frac{2 k_d l}{(k_d l)^2 + 4\\pi^2 t^2}$**：\r\n   - 分子 $[2 k_d l] \\Rightarrow [\\text{s/m}] \\times [\\text{m}] = [\\text{s}]$\r\n   - 分母 $[(k_d l)^2 + 4\\pi^2 t^2] \\Rightarrow [\\text{s}^2]$\r\n   - 整體 $[G(t)] = [\\text{s}] / [\\text{s}^2] = [1/\\text{s}]$。這在卷積積分中 $\\int G(t) d\\tau$ 會與 $d\\tau$ 的 $[\\text{s}]$ 消掉，符合系統理論預期。\r\n3. **輸出電壓 $y_{1,max} = \\frac{2V_0}{\\pi} \\tan^{-1}\\left(\\frac{\\pi T_b}{k_d l}\\right)$**：\r\n   - $\\tan^{-1}$ 內部參數：$[T_b] / [k_d l] \\Rightarrow [\\text{s}] / ([\\text{s/m}] \\times [\\text{m}]) = [\\text{s}]/[\\text{s}] = [1]$ (角度無單位，合理)。\r\n   - 外側乘數：$\\frac{2V_0}{\\pi} \\Rightarrow [\\text{V}]$。\r\n   - 最終 $y_{1,max}$ 單位為 $[\\text{V}]$，電壓推導無誤。\r\n\r\n**圖表單位推斷：**\r\n* 📈 **左下圖 (Input $x(t)$ / Output $y(t)$)**\r\n  - X 軸：時間 $t$ $[\\text{ps}]$ 或 $[\\text{UI}]$，典型範圍 $0 \\sim T_b$。\r\n  - Y 軸：電壓 $[\\text{mV}]$，典型範圍 $0 \\sim V_0$ (例如 $800\\text{mV}$)。\r\n* 📈 **中下圖 (Channel Loss vs. Freq)**\r\n  - X 軸：頻率 $f$ $[\\text{GHz}]$，關鍵標示點為 Nyquist frequency $\\frac{1}{2T_b}$。\r\n  - Y 軸：損耗振幅 $|G(f)|$ $[\\text{dB}]$。\r\n* 📈 **右下圖 (Eye Diagram 眼圖)**\r\n  - X 軸：時間 $[\\text{UI}]$，典型範圍顯示 1~2 個 Unit Interval。\r\n  - Y 軸：電壓 $[\\text{mV}]$，標示了最佳情況(全0或全1的穩態)以及最差情況(Eye opening)。筆記標示在特定 Loss 下眼高僅剩 $19.4\\%$。","type":"units"},{"title":"白話物理意義","content":"訊號在傳輸線上跑，因為介質會像海綿吸水一樣「吃掉」高頻能量，導致原本方正俐落的數位訊號「糊掉並向外擴散」，自己變矮的同時還踩到前後 bit 的地盤，這就是造成眼圖閉合的元凶 ISI。","type":"plain"},{"title":"生活化比喻","content":"想像你在濃霧中（介質）對著遠方快速閃爍手電筒發送摩斯密碼。霧氣不僅會讓光變暗（Loss），還會讓光暈開（Pulse widening）。如果你閃得太快（高傳輸率 $1/T_b$ 大），前一次閃光的殘影還沒散去，下一次閃光又亮了，遠方的人看到的就會是一團持續發亮、根本分不清間隔的爛泥（Eye fully closed）。","type":"analogy"},{"title":"面試必考點","items":[{"question":"在 Dielectric Loss 主導的通道中，Nyquist Frequency ($1/2T_b$) 的 Loss 達到多少 dB 時，眼圖會完全閉合 (fully closed)？","answer":"** 13.65 dB。如筆記最下方結論，當 Nyquist loss 達 13.65 dB 時，單一脈波的峰值 $y_{1,max}$ 衰減過多，且長尾巴累積的 Pre/Post-cursor ISI 總和剛好大於等於主游標能量，導致最差情況下的眼高 (Eye opening) 降為 0。"},{"question":"寫出 Dielectric Loss Dominant 通道的脈波時域響應形狀，並說明這對 EQ 設計有什麼影響？","answer":"** 時域響應為 $\\tan^{-1}$ 函數的相減（源自羅倫茲分佈的卷積）。其致命特徵是具有「衰減極慢的長尾巴 (Long Tail)」。這意味著 Post-cursor ISI 會綿延很多個 UI，因此在接收端通常需要 Tap 數目較多的 DFE (Decision Feedback Equalizer) 才能有效消除後續干擾。"},{"question":"為什麼我們評估 Channel Loss 時，特別愛看 Nyquist Frequency ($1/2T_b$) 這個點？","answer":"** 因為在數位通訊中，最高頻且最密集的訊號變化是「010101...」的交替圖樣，這時的基頻剛好就是 $\\frac{1}{2T_b}$ (即 Nyquist freq)。評估此頻率的衰減量，就能快速且保守地掌握通道對資料傳輸最嚴苛的低通濾波效應。"}],"type":"quiz"},{"content":"介電損耗看指數，時域拉成羅倫茲；\r\n一三六五 dB 值 (13.65)，眼圖閉合入土時。","type":"mnemonic"}],"imageUrl":"../images/done/EQ-L2-P1.jpg"};

function renderUnits(text) {
  // Split into unit-block (公式消去) and chart-infer (圖表推斷) sub-blocks
  let html = mdToHtml(text);
  // Wrap lines starting with 📈 in chart-infer div
  html = html.replace(/<p>(📈[\s\S]*?)<\/p>/g, '<div class="chart-infer">$1</div>');
  // Wrap lines containing [X] × [Y] style unit derivations in unit-block div
  html = html.replace(/<p>([^<]*\[[\w\/]+\][^<]*=[^<]*)<\/p>/g, '<div class="unit-block">$1</div>');
  return html;
}

function renderQA(items) {
  if (!items || !items.length) return '<p style="color:var(--dim)">尚無延伸問題</p>';
  return items.map((q, i) => `
    <div class="qa-item">
      <div class="qa-item-q">Q${i+1}：${escHtml(q.question)}</div>
      <div class="qa-item-a">${mdToHtml(q.answer)}</div>
    </div>`).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function mdToHtml(text) {
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Numbered list items
  text = text.replace(/^(\d+)\.\s+(.+)$/gm, '<li data-ol>$2</li>');
  // Bullet list items
  text = text.replace(/^\*\s+(.+)$/gm, '<li data-ul>$1</li>');
  // Wrap ol items
  text = text.replace(/(<li data-ol>[^\n]*\n?)+/g, m => '<ol>' + m.replace(/ data-ol/g,'') + '</ol>');
  // Wrap ul items
  text = text.replace(/(<li data-ul>[^\n]*\n?)+/g, m => '<ul>' + m.replace(/ data-ul/g,'') + '</ul>');
  // Horizontal rule
  text = text.replace(/^---$/gm, '<hr style="border-color:var(--dim);margin:0.8rem 0">');
  // Paragraphs (split by double newline)
  text = text.split(/\n{2,}/).map(p => {
    p = p.trim();
    if (!p || p.startsWith('<ol>') || p.startsWith('<ul>') || p.startsWith('<hr')) return p;
    return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
  }).join('\n');
  return text;
}

const GEMINI_MODEL = 'gemini-2.5-flash';

function getApiKey() { return localStorage.getItem('gemini_api_key') || ''; }
function setApiKey(k) { localStorage.setItem('gemini_api_key', k); }

function buildSystemPrompt() {
  let sys = `你是一位嚴格的 IC 設計助教，專精高速 SerDes / PLL / CDR / TIA 等電路設計（55nm及以下製程）。\n`;
  sys += `現在的學習筆記：${NOTE_DATA.title}（${NOTE_DATA.date}）\n\n`;
  sys += `以下是筆記的完整內容：\n`;
  NOTE_DATA.sections.forEach(sec => {
    if (sec.type === 'quiz') {
      sys += `\n## 面試必考點\n`;
      sec.items.forEach((q, i) => {
        sys += `Q${i+1}: ${q.question}\nA: ${q.answer}\n`;
      });
    } else if (sec.content) {
      const t = sec.title || ({ intro:'概覽', math:'數學推導', plain:'白話物理意義', analogy:'生活化比喻', mnemonic:'記憶口訣' })[sec.type] || sec.type;
      sys += `\n## ${t}\n${sec.content}\n`;
    }
  });
  sys += `\n請以繁體中文回答，精準且言簡意賅。`;
  return sys;
}

// Gemini 用 "model" 而非 "assistant"
function toGeminiHistory(messages) {
  return messages.map(m => ({
    role: m.role === 'assistant' ? 'model' : m.role,
    parts: [{ text: m.content }]
  }));
}

async function streamClaude(messages, onChunk, onDone, onError) {
  const apiKey = getApiKey();
  if (!apiKey) {
    document.getElementById('apikey-modal').classList.add('open');
    document.getElementById('apikey-input').focus();
    if (onError) onError('請先設定 Gemini API Key');
    return;
  }

  let resp;
  try {
    resp = await fetch(GEMINI_API + '?alt=sse&key=' + encodeURIComponent(apiKey), {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: buildSystemPrompt() }] },
        contents: toGeminiHistory(messages),
        generationConfig: { maxOutputTokens: 1024 }
      })
    });
  } catch (e) {
    if (onError) onError('網路錯誤：' + e.message);
    onDone();
    return;
  }

  if (!resp.ok) {
    let errMsg = resp.statusText;
    try { const j = await resp.json(); errMsg = j.error?.message || errMsg; } catch {}
    if (onError) onError('[' + resp.status + '] ' + errMsg);
    onDone();
    return;
  }

  const reader = resp.body.getReader();
  const dec = new TextDecoder();
  let buf = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const d = line.slice(6).trim();
      if (!d || d === '[DONE]') continue;
      try {
        const evt = JSON.parse(d);
        const text = evt.candidates?.[0]?.content?.parts?.[0]?.text;
        if (text) onChunk(text);
      } catch {}
    }
  }
  onDone();
}

const apikeyStatus  = document.getElementById('apikey-status');
const apikeyClose   = document.getElementById('apikey-close');
const apikeySave    = document.getElementById('apikey-save');

});

// ── Chat Panel ──
const chatBtn      = document.getElementById('chat-btn');
const chatPanel    = document.getElementById('chat-panel');
const chatClose    = document.getElementById('chat-close');
const chatMessages = document.getElementById('chat-messages');
const chatInput    = document.getElementById('chat-input');
const chatSend     = document.getElementById('chat-send');

let chatHistory = [];
let chatStreaming = false;

chatBtn.addEventListener('click', () => chatPanel.classList.toggle('open'));
chatClose.addEventListener('click', () => chatPanel.classList.remove('open'));

function appendChatMsg(role, text) {
  const empty = chatMessages.querySelector('.chat-empty');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.className = 'chat-msg ' + role;
  div.textContent = text;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  return div;
}

async function sendChat() {
  const q = chatInput.value.trim();
  if (!q || chatStreaming) return;
  chatInput.value = '';
  chatStreaming = true;
  chatSend.disabled = true;

  chatHistory.push({ role: 'user', content: q });
  appendChatMsg('user', q);

  const aiDiv = appendChatMsg('ai', '');
  let buf = '';

  await streamClaude(
    chatHistory,
    (chunk) => {
      buf += chunk;
      aiDiv.textContent = buf;
      chatMessages.scrollTop = chatMessages.scrollHeight;
    },
    () => {
      chatHistory.push({ role: 'assistant', content: buf });
      chatStreaming = false;
      chatSend.disabled = false;
      chatInput.focus();
    },
    (err) => {
      aiDiv.textContent = '⚠ ' + err;
      chatStreaming = false;
      chatSend.disabled = false;
    }
  );
}

chatSend.addEventListener('click', sendChat);
chatInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); } });

// ── AI Score in Feynman ──
const fmAiScore    = document.getElementById('fm-ai-score');
const aiFeedback   = document.getElementById('ai-feedback');
const aiFeedbackTx = document.getElementById('ai-feedback-text');
let aiScoring = false;

fmAiScore.addEventListener('click', async () => {
  const q = document.getElementById('fm-question').textContent;
  const userAns = document.getElementById('fm-input').value.trim();
  const correctAns = document.getElementById('fm-answer').textContent ||
    (NOTE_DATA.sections.find(s => s.type === 'quiz')?.items[window._fmIdx || 0]?.answer || '');

  if (!userAns) {
    aiFeedbackTx.textContent = '請先輸入你的答案。';
    aiFeedback.classList.add('show');
    return;
  }
  if (aiScoring) return;
  aiScoring = true;
  fmAiScore.disabled = true;

  aiFeedbackTx.textContent = '評分中...';
  aiFeedback.classList.add('show');
  let buf = '';

  const evalMessages = [{
    role: 'user',
    content: `問題：${q}\n\n學生的回答：${userAns}\n\n參考答案：${correctAns}\n\n請評分（1-10分）並給出具體改進建議，說明哪裡答對了、哪裡還不夠精確。請用繁體中文，簡潔有力。`
  }];

  await streamClaude(
    evalMessages,
    (chunk) => {
      buf += chunk;
      aiFeedbackTx.textContent = buf;
    },
    () => {
      aiScoring = false;
      fmAiScore.disabled = false;
    },
    (err) => {
      aiFeedbackTx.textContent = '⚠ ' + err;
      aiScoring = false;
      fmAiScore.disabled = false;
    }
  );
});

// reset AI feedback when question changes
const origShowFeynman = window._showFeynmanOrig;
document.getElementById('fm-next').addEventListener('click', () => {
  aiFeedback.classList.remove('show');
  aiFeedbackTx.textContent = '';
  fmAiScore.disabled = false;
  aiScoring = false;
}, true);
document.getElementById('fm-close').addEventListener('click', () => {
  aiFeedback.classList.remove('show');
  aiScoring = false;
  fmAiScore.disabled = false;
}, true);
</script>
